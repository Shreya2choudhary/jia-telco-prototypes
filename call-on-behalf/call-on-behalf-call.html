<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jia — Call on my behalf · Ask via Call</title>
<style>
  @font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'JioType', system-ui, sans-serif; background: #0A0A0B; color: #F2F2F2;
    display: flex; align-items: center; justify-content: center; }
  .device { width: 390px; height: 844px; background: #000; border-radius: 56px;
    overflow: hidden; position: relative; transform-origin: top center;
    border: 8px solid #0a0a0a; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
    display: flex; flex-direction: column; }
  .island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 124px; height: 36px; background: #000; border-radius: 999px; z-index: 30; }
  .statusbar { display: flex; justify-content: space-between; align-items: center;
    padding: 14px 30px 6px; font-size: 14px; font-weight: 700; color: #fff; height: 50px; flex-shrink: 0; }
  .device-back-link { position: absolute; top: 14px; left: 12px; z-index: 200;
    display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px 7px 10px; border-radius: 999px;
    background: rgba(28,28,30,0.85); color: #F2F2F2; border: 1px solid rgba(255,255,255,0.18);
    font-size: 12px; font-weight: 700; text-decoration: none; backdrop-filter: blur(10px); }

  /* Dialer screen */
  .dialer { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    padding: 28px 24px; background: radial-gradient(ellipse at top, #1a1422 0%, #050505 80%); color: #fff; text-align: center; }
  .dialer .av { width: 128px; height: 128px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #FFC86B, #F7AB20 60%, #b06f00 100%);
    color: #0E0E10; font-weight: 900; font-size: 60px; display: grid; place-items: center;
    box-shadow: 0 0 60px rgba(247,171,32,0.45); }
  .dialer h2 { font-size: 28px; font-weight: 700; }
  .dialer .num { font-size: 14px; color: rgba(255,255,255,0.55); }
  .dialer .hint { font-size: 13px; color: rgba(255,255,255,0.45); max-width: 240px; line-height: 1.5; }
  .dial-btn { width: 78px; height: 78px; border-radius: 50%; background: #2DD66A; border: none; cursor: pointer;
    display: grid; place-items: center; box-shadow: 0 6px 24px rgba(45,214,106,0.45); animation: mic-glow 1.6s ease-in-out infinite; }

  /* Call screen */
  .call-screen { flex: 1; display: flex; flex-direction: column;
    background: radial-gradient(ellipse at top, #1a1422 0%, #050505 80%); color: #fff; padding: 8px 24px 22px; }
  .top-meta { text-align: center; padding-top: 4px; flex-shrink: 0; }
  .top-meta .label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.55); letter-spacing: 0.14em; text-transform: uppercase; }
  .timer { color: rgba(255,255,255,0.85); font-size: 15px; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .pair { display: flex; gap: 32px; align-items: flex-end; }
  .person { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .person .name { font-size: 16px; font-weight: 700; color: #fff; }
  .person .badge { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.15); }
  .person.speaking .badge { background: rgba(247,171,32,0.16); color: #F7AB20; border-color: rgba(247,171,32,0.5); }
  .av-shreya { width: 96px; height: 96px; border-radius: 50%;
    background: linear-gradient(145deg, #FFB1C8, #E91E63 70%);
    color: #fff; font-weight: 900; font-size: 42px; display: grid; place-items: center;
    box-shadow: 0 0 32px rgba(233,30,99,0.4); transition: box-shadow 200ms; }
  .av-shreya.speaking { box-shadow: 0 0 56px rgba(233,30,99,0.85); animation: pulse-pink 1.4s ease-in-out infinite; }
  .av-jia { width: 96px; height: 96px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #FFC86B, #F7AB20 60%, #b06f00 100%);
    color: #0E0E10; font-weight: 900; font-size: 44px; display: grid; place-items: center;
    box-shadow: 0 0 32px rgba(247,171,32,0.45); }
  .av-jia.speaking { box-shadow: 0 0 60px rgba(247,171,32,0.85); animation: pulse-gold 1.0s ease-in-out infinite; }
  .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 30px; padding: 8px 6px 4px; flex-shrink: 0; }
  .action { display: flex; flex-direction: column; align-items: center; gap: 5px; background: none; border: none; color: #fff; cursor: pointer; font-family: inherit; }
  .action .icn { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.15); display: grid; place-items: center; transition: background 150ms; }
  .action.active .icn { background: #fff; color: #000; }
  .action .lab { font-size: 11px; color: rgba(255,255,255,0.95); }
  .end-row { display: flex; justify-content: center; padding: 6px 0 0; flex-shrink: 0; }
  .end-btn { width: 64px; height: 64px; border-radius: 50%; background: #FF3B30; border: none; cursor: pointer;
    display: grid; place-items: center; box-shadow: 0 6px 20px rgba(255,59,48,0.4); }

  /* Messages screen for the post-call confirmation */
  .thread-screen { flex: 1; display: flex; flex-direction: column; background: #1A1A1C; overflow: hidden; }
  .thread-header { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #1F1F22; border-bottom: 1px solid #2A2A2D; flex-shrink: 0; }
  .jia-avatar { width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(145deg, #FFC86B, #F7AB20); color: #0E0E10;
    font-weight: 900; font-size: 18px; display: grid; place-items: center; flex-shrink: 0; }
  .thread-title .name { font-size: 16px; font-weight: 700; color: #fff; }
  .thread-title .sub { font-size: 12px; color: #A8A8A8; display: flex; align-items: center; gap: 5px; margin-top: 1px; }
  .live-dot { width: 7px; height: 7px; border-radius: 999px; background: #4ED65A; }
  .thread-body { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 8px; }
  .thread-body::-webkit-scrollbar { width: 0; }
  .time-divider { text-align: center; font-size: 11px; font-weight: 600; color: #6E6E6E; padding: 8px 0; letter-spacing: 0.04em; text-transform: uppercase; }
  .bubble-row { display: flex; gap: 6px; align-items: flex-end; max-width: 86%; animation: in 320ms cubic-bezier(0.4,0,0.2,1) both; }
  .bubble-row.jia { align-self: flex-start; }
  .bubble-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .bubble-avatar { width: 28px; flex-shrink: 0; }
  .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.45; word-break: break-word; }
  .bubble.jia { background: #2A2A2C; color: #F2F2F2; border-radius: 18px 18px 18px 6px; }
  .bubble.user { background: #5C2DD6; color: #fff; border-radius: 18px 18px 6px 18px; }
  .typing { padding: 8px 14px; background: #2A2A2C; border-radius: 18px 18px 18px 6px; display: inline-flex; gap: 4px; align-items: center; }
  .typing span { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: bounce 1.4s infinite both; }
  .typing span:nth-child(2) { animation-delay: 0.15s; } .typing span:nth-child(3) { animation-delay: 0.3s; }
  .composer { padding: 10px 12px; background: #1F1F22; border-top: 1px solid #2A2A2D; flex-shrink: 0; }
  .composer-input { width: 100%; padding: 10px 14px; border-radius: 999px; background: #2A2A2C; border: none; color: #F2F2F2; font-size: 14px; outline: none; }
  .composer-input::placeholder { color: #6E6E6E; }

  /* Live "Jia ↔ Mom" call card embedded in the chat */
  .call-card { margin: 6px 0 6px 34px; max-width: 92%;
    background: linear-gradient(180deg, rgba(247,171,32,0.10), #1F1F22);
    border: 1.5px solid rgba(247,171,32,0.45); border-radius: 18px; overflow: hidden;
    animation: in 320ms cubic-bezier(0.4,0,0.2,1) both; }
  .call-card .head { padding: 12px 14px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .call-card .head .who { display: flex; align-items: center; gap: 6px; }
  .call-card .head .av { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-weight: 900; font-size: 13px; }
  .call-card .head .av.jia { background: linear-gradient(145deg, #FFC86B, #F7AB20); color: #0E0E10; }
  .call-card .head .av.mom { background: linear-gradient(145deg, #FFD2A1, #C97B27 70%); color: #fff; font-size: 12px; }
  .call-card .head .arrow { color: #6E6E6E; font-size: 14px; }
  .call-card .head .meta { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .call-card .head .meta .tag { font-size: 9.5px; font-weight: 800; color: #F7AB20; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
  .call-card .head .meta .timer { font-size: 11px; color: #A8A8A8; font-variant-numeric: tabular-nums; }
  .call-card .live-pip { width: 7px; height: 7px; border-radius: 50%; background: #FF3B30; animation: blink 1.0s ease-in-out infinite; }
  .call-card .body { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 6px; }
  .call-line { display: flex; gap: 8px; align-items: flex-start; animation: in 280ms cubic-bezier(0.4,0,0.2,1) both; }
  .call-line .who { font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0; padding-top: 2px; }
  .call-line.jia .who { color: #F7AB20; }
  .call-line.mom .who { color: #C97B27; }
  .call-line .text { font-size: 13px; color: #E8E8EA; line-height: 1.4; flex: 1; }
  .call-card .ended { padding: 8px 14px 12px; font-size: 11px; color: #4ED65A; font-weight: 700; display: flex; align-items: center; gap: 5px; border-top: 1px solid rgba(255,255,255,0.06); }

  /* Receipt card */
  .receipt-card { margin: 6px 0 6px 34px; max-width: 92%;
    background: #1C1C1E; border: 1.5px solid rgba(78,214,90,0.35); border-radius: 18px;
    padding: 14px; animation: in 320ms cubic-bezier(0.4,0,0.2,1) both; }
  .receipt-card .head { display: flex; align-items: center; gap: 10px; }
  .receipt-card .check { width: 30px; height: 30px; border-radius: 50%; background: rgba(78,214,90,0.18); color: #4ED65A; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; }
  .receipt-card .info .label { font-size: 10px; color: #4ED65A; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase; }
  .receipt-card .info .name { font-size: 14px; font-weight: 800; color: #F2F2F2; margin-top: 1px; }
  .receipt-card .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 12px; }
  .receipt-card .meta .row { background: #0E0E10; border: 1px solid #2A2A2D; border-radius: 10px; padding: 8px 10px; }
  .receipt-card .meta .k { color: #A8A8A8; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .receipt-card .meta .v { color: #F2F2F2; font-size: 13px; font-weight: 700; margin-top: 1px; }

  /* Skip-time pill (debug-y but keeps demo moving) */
  .skip-pill { position: absolute; top: 60px; right: 12px; z-index: 60;
    padding: 7px 12px 7px 10px; border-radius: 999px;
    background: linear-gradient(145deg, #FFC86B, #F7AB20); color: #0E0E10;
    border: none; font-size: 12px; font-weight: 800; cursor: pointer;
    box-shadow: 0 6px 20px rgba(247,171,32,0.35); display: inline-flex; align-items: center; gap: 4px; }

  @keyframes in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }
  @keyframes pulse-gold { 0%,100% { box-shadow: 0 0 56px rgba(247,171,32,0.85); } 50% { box-shadow: 0 0 80px rgba(247,171,32,0.4); } }
  @keyframes pulse-pink { 0%,100% { box-shadow: 0 0 48px rgba(233,30,99,0.75); } 50% { box-shadow: 0 0 70px rgba(233,30,99,0.35); } }
  @keyframes mic-glow { 0%,100% { box-shadow: 0 0 0 0 rgba(45,214,106,0.5); } 50% { box-shadow: 0 0 0 14px rgba(45,214,106,0); } }
  @keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Audio cache. Clips that haven't been generated yet will gracefully no-op.
const CLIPS = ['cob_jia_hello','cob_shreya_ask','cob_jia_confirm','cob_shreya_thanks','cob_jia_bye',
  'cob_jia_to_mom','cob_mom_reply'];
const CACHE = {};
CLIPS.forEach(n => { try { const a = new Audio(`audio/${n}.wav`); a.preload = 'auto'; CACHE[n] = a; } catch(_){} });
let CURRENT = null;
function playClip(name, fallbackMs) {
  return new Promise(resolve => {
    const a = CACHE[name];
    if (!a) { setTimeout(resolve, fallbackMs || 1400); return; }
    if (CURRENT && CURRENT !== a) { try { CURRENT.pause(); CURRENT.currentTime = 0; } catch(_){} }
    CURRENT = a; a.currentTime = 0;
    let resolved = false;
    const done = () => { if (resolved) return; resolved = true; a.onended = a.onerror = null; resolve(); };
    a.onended = done; a.onerror = () => { setTimeout(done, fallbackMs || 1400); };
    const p = a.play();
    if (p && p.catch) p.catch(() => setTimeout(done, fallbackMs || 1400));
    // Hard fallback if metadata is bad: cap at fallbackMs * 1.4
    setTimeout(() => { if (!resolved && a.paused) done(); }, (fallbackMs || 1400) * 2);
  });
}
function stopAudio() { if (CURRENT) { try { CURRENT.pause(); CURRENT.currentTime = 0; } catch(_){} CURRENT = null; } }
const wait = (ms) => new Promise(r => setTimeout(r, ms));

// Conversation Shreya ↔ Jia (the user's request to delegate the call).
const JIA_CALL_FLOW = [
  { who: 'jia',    clip: 'cob_jia_hello',    text: "Hi Shreya — how can I help?", ms: 1500 },
  { who: 'shreya', clip: 'cob_shreya_ask',   text: "Hey Jia, can you call my mum and remind her to take her BP medicines at 9 AM?", ms: 4200 },
  { who: 'jia',    clip: 'cob_jia_confirm',  text: "Of course — I'll call her at 9 AM and confirm with you here. Anything else?", ms: 3800 },
  { who: 'shreya', clip: 'cob_shreya_thanks',text: "No, that's it. Thanks!", ms: 1500 },
  { who: 'jia',    clip: 'cob_jia_bye',      text: "You're welcome — talk soon.", ms: 1500 },
];

// Conversation Jia ↔ Mum (the actual delegated call, played back as a transcript card).
const MOM_CALL_FLOW = [
  { who: 'jia', clip: 'cob_jia_to_mom', text: "Hi Auntie, this is Jia, Shreya's AI assistant. Just a quick reminder to take your BP medicines now — Shreya wanted me to check in. Have a wonderful day!", ms: 5500 },
  { who: 'mom', clip: 'cob_mom_reply',  text: "Oh, thank you beta — I'll take them right now.", ms: 2400 },
];

function App() {
  // Auto-fit to viewport
  useEffect(() => {
    const fit = () => {
      const dev = document.querySelector('.device'); if (!dev) return;
      const sw = (window.innerWidth - 24) / 390;
      const sh = (window.innerHeight - 24) / 844;
      dev.style.transform = `scale(${Math.min(1, sw, sh)})`;
    };
    fit(); window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  // Phases:
  //   dialer → connecting → call (Shreya↔Jia) → call-ended → messages-empty
  //   → (skip 9 AM) → messages-mom-call (live) → messages-confirmed
  const [phase, setPhase] = useState('dialer');
  const [activeSpeaker, setActiveSpeaker] = useState(null);
  const [callTime, setCallTime] = useState('00:00');
  const [statusTime] = useState(() => { const d = new Date(); return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0'); });
  const callStart = useRef(0);
  const cancelRef = useRef(false);
  const [momCallLines, setMomCallLines] = useState([]);
  const [momCallTimer, setMomCallTimer] = useState('00:00');
  const [momCallEnded, setMomCallEnded] = useState(false);
  const [confirmShown, setConfirmShown] = useState(false);
  const [thinking, setThinking] = useState(false);
  const threadRef = useRef(null);

  // Call timer for Shreya↔Jia call
  useEffect(() => {
    if (phase !== 'call' && phase !== 'connecting') return;
    if (phase === 'connecting') { setCallTime('connecting…'); return; }
    if (!callStart.current) callStart.current = Date.now();
    const t = setInterval(() => {
      const s = Math.floor((Date.now() - callStart.current) / 1000);
      const m = Math.floor(s / 60), r = s % 60;
      setCallTime(String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0'));
    }, 500);
    return () => clearInterval(t);
  }, [phase]);

  // Auto-scroll messages thread to bottom
  useEffect(() => {
    if (!threadRef.current) return;
    const el = threadRef.current;
    el.scrollTop = el.scrollHeight;
    const t = setTimeout(() => { if (threadRef.current) threadRef.current.scrollTop = threadRef.current.scrollHeight; }, 200);
    return () => clearTimeout(t);
  }, [momCallLines, confirmShown, thinking, phase]);

  // Mom-call timer
  useEffect(() => {
    if (phase !== 'mom-call') return;
    const start = Date.now();
    const t = setInterval(() => {
      const s = Math.floor((Date.now() - start) / 1000);
      const m = Math.floor(s / 60), r = s % 60;
      setMomCallTimer(String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0'));
    }, 500);
    return () => clearInterval(t);
  }, [phase]);

  function startCall() {
    setPhase('connecting');
    setTimeout(() => { setPhase('call'); callStart.current = Date.now(); runJiaCall(); }, 1400);
  }

  async function runJiaCall() {
    cancelRef.current = false;
    for (const turn of JIA_CALL_FLOW) {
      if (cancelRef.current) return;
      setActiveSpeaker(turn.who);
      await playClip(turn.clip, turn.ms);
      if (cancelRef.current) return;
      setActiveSpeaker(null);
      await wait(280);
    }
    if (cancelRef.current) return;
    await wait(450);
    setPhase('messages-empty');
    callStart.current = 0;
    setCallTime('00:00');
  }

  function endCall() {
    cancelRef.current = true; stopAudio();
    setActiveSpeaker(null);
    setPhase('messages-empty');
    callStart.current = 0;
    setCallTime('00:00');
  }

  function skipToMomCall() {
    setPhase('mom-call');
    setMomCallLines([]); setMomCallEnded(false);
    setTimeout(runMomCall, 600);
  }

  async function runMomCall() {
    cancelRef.current = false;
    // Brief "thinking" beat before the transcript starts arriving
    await wait(800);
    for (const turn of MOM_CALL_FLOW) {
      if (cancelRef.current) return;
      setMomCallLines(prev => [...prev, { who: turn.who, text: turn.text, id: Math.random() }]);
      // Play audio while line is on screen (graceful no-op without files)
      await playClip(turn.clip, turn.ms);
      if (cancelRef.current) return;
      await wait(220);
    }
    setMomCallEnded(true);
    await wait(900);
    setThinking(true);
    await wait(900);
    setThinking(false);
    setConfirmShown(true);
    setPhase('messages-confirmed');
  }

  function restart() {
    cancelRef.current = true; stopAudio();
    setActiveSpeaker(null); setMomCallLines([]); setMomCallEnded(false); setConfirmShown(false);
    setThinking(false); callStart.current = 0; setCallTime('00:00');
    setPhase('dialer');
  }

  return (
    <div className="device">
      <a href="index.html" className="device-back-link">← Back</a>
      <div className="island"/>
      <div className="statusbar">
        <span>{statusTime}</span>
        <span style={{display:'flex',gap:5,alignItems:'center'}}>
          <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><rect x="0" y="6" width="2.5" height="5" rx="0.6"/><rect x="3.5" y="3.5" width="2.5" height="7.5" rx="0.6"/><rect x="7" y="1" width="2.5" height="10" rx="0.6"/><rect x="10.5" y="-1" width="2.5" height="12" rx="0.6"/></svg>
          <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><path d="M7 1.5C4.4 1.5 2 2.6 0 4.7L7 10l7-5.3c-2-2.1-4.4-3.2-7-3.2z"/></svg>
          <svg width="22" height="10" viewBox="0 0 22 10" fill="currentColor"><rect x="0" y="0" width="20" height="10" rx="2.5" fill="none" stroke="currentColor" strokeWidth="0.8"/><rect x="1.5" y="1.5" width="14" height="7" rx="1.5"/><rect x="20.5" y="3.5" width="1" height="3" rx="0.4"/></svg>
        </span>
      </div>

      {phase === 'dialer' && (
        <div className="dialer">
          <div className="av">J</div>
          <div>
            <h2>Jia</h2>
            <div className="num">Personal assistant</div>
          </div>
          <div className="hint">Tap the green button to call Jia and ask her to ring your mum about her BP medicines.</div>
          <button className="dial-btn" onClick={startCall} aria-label="Call Jia">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M21 15.46l-5.27-.61a1.25 1.25 0 0 0-1.06.36l-2.16 2.17a16 16 0 0 1-7.06-7.07l2.18-2.16a1.25 1.25 0 0 0 .36-1.06L7.39 1.83A1.25 1.25 0 0 0 6.16 1H3a2 2 0 0 0-2 2 22 22 0 0 0 22 22 2 2 0 0 0 2-2v-3.16a1.25 1.25 0 0 0-1-1.38z"/></svg>
          </button>
        </div>
      )}

      {(phase === 'connecting' || phase === 'call') && (
        <div className="call-screen">
          <div className="top-meta">
            <div className="label">Call · Jia</div>
            <div className="timer">{callTime}</div>
          </div>
          <div className="stage">
            <div className="pair">
              <div className={`person ${activeSpeaker==='shreya' ? 'speaking' : ''}`}>
                <div className={`av-shreya ${activeSpeaker==='shreya' ? 'speaking' : ''}`}>S</div>
                <div className="name">You</div>
                <div className="badge">{activeSpeaker==='shreya' ? '🎙 Speaking' : 'On call'}</div>
              </div>
              <div className={`person ${activeSpeaker==='jia' ? 'speaking' : ''}`}>
                <div className={`av-jia ${activeSpeaker==='jia' ? 'speaking' : ''}`}>J</div>
                <div className="name">Jia</div>
                <div className="badge">{activeSpeaker==='jia' ? '🎙 Speaking' : (phase==='connecting' ? 'Connecting…' : 'On call')}</div>
              </div>
            </div>
          </div>
          <div className="actions">
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 2h6v10a3 3 0 0 1-6 0V2zM4 11a8 8 0 0 0 16 0M12 19v3"/></svg></span><span className="lab">mute</span></button>
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="6" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="18" cy="6" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/><circle cx="6" cy="18" r="1.5"/><circle cx="12" cy="18" r="1.5"/><circle cx="18" cy="18" r="1.5"/></svg></span><span className="lab">keypad</span></button>
            <button className="action active"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 10v4a3 3 0 0 0 3 3h2l5 4V3L8 7H6a3 3 0 0 0-3 3z"/><path d="M16 8a5 5 0 0 1 0 8M19 5a9 9 0 0 1 0 14"/></svg></span><span className="lab">speaker</span></button>
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M3 20a6 6 0 0 1 12 0M18 7v6M15 10h6"/></svg></span><span className="lab">add</span></button>
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M22 8l-6 4 6 4V8z"/></svg></span><span className="lab">FaceTime</span></button>
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3"/></svg></span><span className="lab">mic</span></button>
          </div>
          <div className="end-row">
            <button className="end-btn" onClick={endCall} aria-label="End call">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M21 15.46l-5.27-.61a1.25 1.25 0 0 0-1.06.36l-2.16 2.17a16 16 0 0 1-7.06-7.07l2.18-2.16a1.25 1.25 0 0 0 .36-1.06L7.39 1.83A1.25 1.25 0 0 0 6.16 1H3a2 2 0 0 0-2 2 22 22 0 0 0 22 22 2 2 0 0 0 2-2v-3.16a1.25 1.25 0 0 0-1-1.38z" transform="rotate(135 12 12)"/></svg>
            </button>
          </div>
        </div>
      )}

      {(phase === 'messages-empty' || phase === 'mom-call' || phase === 'messages-confirmed') && (
        <div className="thread-screen">
          <div className="thread-header">
            <div className="jia-avatar">J</div>
            <div className="thread-title" style={{flex:1}}>
              <div className="name">Jia</div>
              <div className="sub"><span className="live-dot"/>Personal assistant · Messages</div>
            </div>
          </div>
          {phase === 'messages-empty' && (
            <button className="skip-pill" onClick={skipToMomCall}>Skip to 9 AM →</button>
          )}
          <div className="thread-body" ref={threadRef}>
            {phase === 'messages-empty' && (
              <div style={{margin:'auto', textAlign:'center', color:'#6E6E6E', fontSize:13, padding:24, lineHeight:1.6}}>
                Your call with Jia ended. She'll ring your mum at 9 AM and update this thread when it's done.<br/><br/>
                <span style={{color:'#A8A8A8', fontSize:12}}>Use the pill above to fast-forward.</span>
              </div>
            )}
            {(phase === 'mom-call' || phase === 'messages-confirmed') && (
              <>
                <div className="time-divider">Today, 9:00 AM</div>
                <div className="bubble-row jia">
                  <div className="bubble-avatar"><div className="jia-avatar" style={{width:28,height:28,fontSize:12}}>J</div></div>
                  <div className="bubble jia">Calling your mum now to remind her about her BP medicines…</div>
                </div>
                <div className="call-card">
                  <div className="head">
                    <div className="who"><div className="av jia">J</div></div>
                    <span className="arrow">→</span>
                    <div className="who"><div className="av mom">M</div></div>
                    <div className="meta">
                      <div className="tag">{momCallEnded ? 'Call ended' : <><span className="live-pip"/>Live</>}</div>
                      <div className="timer">{momCallTimer}</div>
                    </div>
                  </div>
                  <div className="body">
                    {momCallLines.map(l => (
                      <div key={l.id} className={`call-line ${l.who}`}>
                        <span className="who">{l.who === 'jia' ? 'Jia' : 'Mum'}</span>
                        <span className="text">"{l.text}"</span>
                      </div>
                    ))}
                  </div>
                  {momCallEnded && (
                    <div className="ended">✓ Reminder delivered · mum acknowledged</div>
                  )}
                </div>
                {thinking && (
                  <div className="bubble-row jia">
                    <div className="bubble-avatar"><div className="jia-avatar" style={{width:28,height:28,fontSize:12}}>J</div></div>
                    <div className="typing"><span/><span/><span/></div>
                  </div>
                )}
                {confirmShown && (
                  <>
                    <div className="bubble-row jia">
                      <div className="bubble-avatar"><div className="jia-avatar" style={{width:28,height:28,fontSize:12}}>J</div></div>
                      <div className="bubble jia">Done! She said: <i>"Oh thank you beta, I'll take them right now."</i> 💛</div>
                    </div>
                    <div className="receipt-card">
                      <div className="head">
                        <div className="check">✓</div>
                        <div className="info">
                          <div className="label">Reminder delivered</div>
                          <div className="name">BP medicines · Mum</div>
                        </div>
                      </div>
                      <div className="meta">
                        <div className="row"><div className="k">When</div><div className="v">9:00 AM</div></div>
                        <div className="row"><div className="k">Duration</div><div className="v">{momCallTimer}</div></div>
                        <div className="row"><div className="k">Status</div><div className="v" style={{color:'#4ED65A'}}>Acknowledged</div></div>
                        <div className="row"><div className="k">Repeat</div><div className="v">Daily</div></div>
                      </div>
                    </div>
                    <div style={{marginTop:14, display:'flex', justifyContent:'center'}}>
                      <button onClick={restart} style={{padding:'8px 16px', borderRadius:999, background:'transparent', border:'1px solid #3A3A3D', color:'#A8A8A8', fontSize:12, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>↻ Replay demo</button>
                    </div>
                  </>
                )}
              </>
            )}
          </div>
          <div className="composer">
            <input className="composer-input" placeholder="Type a message" disabled/>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
