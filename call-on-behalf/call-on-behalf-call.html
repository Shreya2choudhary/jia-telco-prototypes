<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jia — Call on my behalf · Ask via Call</title>
<style>
  :root {
    --gold: #F7AB20;
    --gold-soft: #FFC86B;
    --user-blue: #4FC1FF;
  }
  @font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'JioType', system-ui, sans-serif; background: #0A0A0B; color: #F2F2F2;
    display: flex; align-items: center; justify-content: center; }
  .device { width: 390px; height: 844px; background: #000; border-radius: 56px;
    overflow: hidden; position: relative; transform-origin: top center;
    border: 8px solid #0a0a0a; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
    display: flex; flex-direction: column; }
  .island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 124px; height: 36px; background: #000; border-radius: 999px; z-index: 30; }
  .statusbar { display: flex; justify-content: space-between; align-items: center;
    padding: 14px 30px 6px; font-size: 14px; font-weight: 700; color: #fff; height: 50px; flex-shrink: 0; }
  .device-back-link { position: absolute; top: 14px; left: 12px; z-index: 200;
    display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px 7px 10px; border-radius: 999px;
    background: rgba(28,28,30,0.85); color: #F2F2F2; border: 1px solid rgba(255,255,255,0.18);
    font-size: 12px; font-weight: 700; text-decoration: none; backdrop-filter: blur(10px); }
  .home-indicator { height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .home-indicator::before { content: ''; width: 134px; height: 5px; border-radius: 999px; background: rgba(255,255,255,0.6); }

  /* ── Dialer ────────────────────────────────────────────── */
  .screen-dialer { flex: 1; display: flex; flex-direction: column; background: #000; padding: 0 0 16px; }
  .dialer-display { flex: 0 0 auto; padding: 12px 24px 28px; display: flex; align-items: center; justify-content: center; min-height: 110px; }
  .dialer-number { font-size: 44px; font-weight: 400; color: #fff; min-height: 56px; font-feature-settings: 'tnum'; }
  .dialer-cursor { display: inline-block; width: 2px; height: 38px; background: var(--gold); margin-left: 4px; vertical-align: middle; animation: blink 1s step-end infinite; }
  .dialer-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 76px); grid-auto-rows: 76px; gap: 14px 30px; justify-content: center; align-content: center; padding: 0 24px; }
  .dial-key { width: 76px; height: 76px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 50%;
    background: rgba(255,255,255,0.18); color: #fff; border: none; cursor: pointer; transition: background 100ms; font-family: inherit; padding: 0; }
  .dial-key:active { background: rgba(255,255,255,0.32); }
  .dial-key .digit { font-size: 30px; font-weight: 400; line-height: 1; }
  .dial-key .letters { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; margin-top: 3px; color: #fff; }
  .dial-key.symbol .digit { font-size: 32px; }
  .dial-key.symbol .letters { visibility: hidden; }
  .dialer-actions { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 4px 30px 0; }
  .call-btn { width: 70px; height: 70px; border-radius: 50%; background: #2DD66A; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(45,214,106,0.4); grid-column: 2; transition: transform 150ms; }
  .call-btn:active { transform: scale(0.95); }
  .call-btn svg { width: 32px; height: 32px; fill: white; }
  .delete-btn { grid-column: 3; justify-self: end; width: 36px; height: 36px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; opacity: 0.6; }
  .delete-btn:disabled { opacity: 0; pointer-events: none; }
  .delete-btn svg { width: 28px; height: 22px; }
  .dialer-hint { text-align: center; color: #6E6E6E; font-size: 12px; padding: 12px 24px 4px; }
  .dialer-hint .code { color: var(--gold); font-weight: 800; letter-spacing: 0.05em; }

  /* ── Call screen ──────────────────────────────────────── */
  .screen-call { flex: 1; display: flex; flex-direction: column; background: radial-gradient(ellipse at top, #0a0a0c 0%, #050505 80%); color: #fff; padding-top: 8px; }
  .call-header { padding: 12px 32px 0; text-align: center; flex-shrink: 0; }
  .call-name { font-size: 28px; font-weight: 500; color: #fff; }
  .call-state { margin-top: 6px; font-size: 16px; color: rgba(255,255,255,0.65); font-variant-numeric: tabular-nums; min-height: 20px; }
  .orb-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 20px; }
  .orb { position: relative; width: 220px; height: 220px; display: grid; place-items: center; }
  .orb-ring { position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--gold-soft), var(--gold) 60%, #b06f00 100%);
    box-shadow: 0 0 80px rgba(247,171,32,0.55), 0 0 160px rgba(247,171,32,0.3), inset 0 6px 30px rgba(255,220,150,0.6), inset 0 -6px 30px rgba(140,80,0,0.3);
    transition: transform 800ms ease, box-shadow 800ms ease;
    animation: orb-idle 4s ease-in-out infinite; }
  .orb-letter { position: relative; z-index: 2; font-family: 'JioType', system-ui; font-weight: 900;
    font-size: 96px; color: #0E0E10; letter-spacing: -0.04em; text-shadow: 0 2px 10px rgba(0,0,0,0.18); user-select: none; }
  .pulse { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(247,171,32,0.6); opacity: 0; pointer-events: none; }
  .orb.speaking .pulse { animation: pulse-out 1.4s ease-out infinite; }
  .orb.speaking .pulse:nth-child(2) { animation-delay: 0.45s; }
  .orb.speaking .pulse:nth-child(3) { animation-delay: 0.9s; }
  .orb.listening .orb-ring { background: radial-gradient(circle at 30% 30%, #aee0ff, var(--user-blue) 60%, #1a78b8 100%);
    box-shadow: 0 0 80px rgba(79,193,255,0.55), 0 0 160px rgba(79,193,255,0.3), inset 0 6px 30px rgba(220,240,255,0.6), inset 0 -6px 30px rgba(20,80,140,0.3); }
  .orb.listening .orb-letter { font-size: 72px; }
  .orb.listening .pulse { border-color: rgba(79,193,255,0.6); animation: pulse-out 1.2s ease-out infinite; }
  .orb.listening .pulse:nth-child(2) { animation-delay: 0.4s; }
  .orb.listening .pulse:nth-child(3) { animation-delay: 0.8s; }
  .actions { flex-shrink: 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 36px; padding: 12px 32px 8px; }
  .action { display: flex; flex-direction: column; align-items: center; gap: 5px; background: none; border: none; color: #fff; cursor: pointer; font-family: inherit; }
  .action .icn { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.15); display: grid; place-items: center; transition: background 150ms; }
  .action.active .icn { background: #fff; color: #000; }
  .action .lab { font-size: 11px; }
  .end-row { display: flex; justify-content: center; padding: 8px 0 12px; flex-shrink: 0; }
  .end-btn { width: 64px; height: 64px; border-radius: 50%; background: #FF3B30; border: none; cursor: pointer; display: grid; place-items: center; box-shadow: 0 6px 20px rgba(255,59,48,0.4); }

  /* ── Messages thread (post-call confirmation) ────────── */
  .thread-screen { flex: 1; display: flex; flex-direction: column; background: #1A1A1C; overflow: hidden; }
  .thread-header { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #1F1F22; border-bottom: 1px solid #2A2A2D; flex-shrink: 0; }
  .jia-avatar { width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(145deg, var(--gold-soft), var(--gold)); color: #0E0E10;
    font-weight: 900; font-size: 18px; display: grid; place-items: center; flex-shrink: 0; }
  .thread-title .name { font-size: 16px; font-weight: 700; color: #fff; }
  .thread-title .sub { font-size: 12px; color: #A8A8A8; display: flex; align-items: center; gap: 5px; margin-top: 1px; }
  .live-dot { width: 7px; height: 7px; border-radius: 999px; background: #4ED65A; }
  .thread-body { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 8px; }
  .thread-body::-webkit-scrollbar { width: 0; }
  .time-divider { text-align: center; font-size: 11px; font-weight: 600; color: #6E6E6E; padding: 8px 0; letter-spacing: 0.04em; text-transform: uppercase; }
  .bubble-row { display: flex; gap: 6px; align-items: flex-end; max-width: 86%; animation: in 320ms cubic-bezier(0.4,0,0.2,1) both; }
  .bubble-row.jia { align-self: flex-start; }
  .bubble-avatar { width: 28px; flex-shrink: 0; }
  .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.45; word-break: break-word; }
  .bubble.jia { background: #2A2A2C; color: #F2F2F2; border-radius: 18px 18px 18px 6px; }
  .typing { padding: 8px 14px; background: #2A2A2C; border-radius: 18px 18px 18px 6px; display: inline-flex; gap: 4px; align-items: center; }
  .typing span { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: bounce 1.4s infinite both; }
  .typing span:nth-child(2) { animation-delay: 0.15s; } .typing span:nth-child(3) { animation-delay: 0.3s; }
  .composer { padding: 10px 12px; background: #1F1F22; border-top: 1px solid #2A2A2D; flex-shrink: 0; }
  .composer-input { width: 100%; padding: 10px 14px; border-radius: 999px; background: #2A2A2C; border: none; color: #F2F2F2; font-size: 14px; outline: none; }
  .composer-input::placeholder { color: #6E6E6E; }
  .receipt-card { margin: 6px 0 6px 34px; max-width: 92%;
    background: #1C1C1E; border: 1.5px solid rgba(78,214,90,0.35); border-radius: 18px;
    padding: 14px; animation: in 320ms cubic-bezier(0.4,0,0.2,1) both; }
  .receipt-card .head { display: flex; align-items: center; gap: 10px; }
  .receipt-card .check { width: 30px; height: 30px; border-radius: 50%; background: rgba(78,214,90,0.18); color: #4ED65A; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; }
  .receipt-card .info .label { font-size: 10px; color: #4ED65A; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase; }
  .receipt-card .info .name { font-size: 14px; font-weight: 800; color: #F2F2F2; margin-top: 1px; }
  .receipt-card .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 12px; }
  .receipt-card .meta .row { background: #0E0E10; border: 1px solid #2A2A2D; border-radius: 10px; padding: 8px 10px; }
  .receipt-card .meta .k { color: #A8A8A8; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .receipt-card .meta .v { color: #F2F2F2; font-size: 13px; font-weight: 700; margin-top: 1px; }
  .skip-pill { position: absolute; top: 60px; right: 12px; z-index: 60;
    padding: 7px 12px 7px 10px; border-radius: 999px;
    background: linear-gradient(145deg, var(--gold-soft), var(--gold)); color: #0E0E10;
    border: none; font-size: 12px; font-weight: 800; cursor: pointer;
    box-shadow: 0 6px 20px rgba(247,171,32,0.35); display: inline-flex; align-items: center; gap: 4px; }

  @keyframes blink { 50% { opacity: 0; } }
  @keyframes in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }
  @keyframes orb-idle { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
  @keyframes pulse-out { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.55); opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Audio cache (graceful no-op if files missing — falls back to ms timing).
const CLIPS = ['cob_jia_hello','cob_shreya_ask','cob_jia_confirm','cob_shreya_thanks','cob_jia_bye'];
const CACHE = {};
CLIPS.forEach(n => { try { const a = new Audio(`audio/${n}.wav`); a.preload = 'auto'; CACHE[n] = a; } catch(_){} });
let CURRENT = null;
function playClip(name, fallbackMs) {
  return new Promise(resolve => {
    const a = CACHE[name];
    if (!a) { setTimeout(resolve, fallbackMs || 1400); return; }
    if (CURRENT && CURRENT !== a) { try { CURRENT.pause(); CURRENT.currentTime = 0; } catch(_){} }
    CURRENT = a; a.currentTime = 0;
    let resolved = false;
    const done = () => { if (resolved) return; resolved = true; a.onended = a.onerror = null; resolve(); };
    a.onended = done; a.onerror = () => setTimeout(done, fallbackMs || 1400);
    const p = a.play(); if (p && p.catch) p.catch(() => setTimeout(done, fallbackMs || 1400));
    setTimeout(() => { if (!resolved && a.paused) done(); }, (fallbackMs || 1400) * 2);
  });
}
function stopAudio() { if (CURRENT) { try { CURRENT.pause(); CURRENT.currentTime = 0; } catch(_){} CURRENT = null; } }
const wait = (ms) => new Promise(r => setTimeout(r, ms));

// Shreya↔Jia conversation. who: 'jia' | 'user' so the orb flips colour.
const FLOW = [
  { who: 'jia',  clip: 'cob_jia_hello',     ms: 1500 },
  { who: 'user', clip: 'cob_shreya_ask',    ms: 4200 },
  { who: 'jia',  clip: 'cob_jia_confirm',   ms: 3800 },
  { who: 'user', clip: 'cob_shreya_thanks', ms: 1500 },
  { who: 'jia',  clip: 'cob_jia_bye',       ms: 1500 },
];

const KEYS = [
  ['1', ''], ['2', 'ABC'], ['3', 'DEF'],
  ['4', 'GHI'], ['5', 'JKL'], ['6', 'MNO'],
  ['7', 'PQRS'], ['8', 'TUV'], ['9', 'WXYZ'],
  ['*', '', true], ['0', '+'], ['#', '', true],
];

function App() {
  // Auto-fit
  useEffect(() => {
    const fit = () => {
      const dev = document.querySelector('.device'); if (!dev) return;
      const sw = (window.innerWidth - 24) / 390;
      const sh = (window.innerHeight - 24) / 844;
      dev.style.transform = `scale(${Math.min(1, sw, sh)})`;
    };
    fit(); window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  // Phases: dialer → connecting → call → ended → messages-empty → messages-confirmed
  const [phase, setPhase] = useState('dialer');
  const [dialed, setDialed] = useState('#5555');
  const [activeSpeaker, setActiveSpeaker] = useState(null); // 'jia' | 'user' | null
  const [callTime, setCallTime] = useState('connecting…');
  const [statusTime] = useState(() => { const d = new Date(); return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0'); });
  const callStart = useRef(0);
  const cancelRef = useRef(false);
  const [thinking, setThinking] = useState(false);
  const [confirmShown, setConfirmShown] = useState(false);
  const threadRef = useRef(null);

  // Call timer
  useEffect(() => {
    if (phase !== 'call') return;
    if (!callStart.current) callStart.current = Date.now();
    const t = setInterval(() => {
      const s = Math.floor((Date.now() - callStart.current) / 1000);
      const m = Math.floor(s / 60), r = s % 60;
      setCallTime(String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0'));
    }, 500);
    return () => clearInterval(t);
  }, [phase]);

  // Auto-scroll
  useEffect(() => {
    if (!threadRef.current) return;
    threadRef.current.scrollTop = threadRef.current.scrollHeight;
  }, [thinking, confirmShown, phase]);

  function pressKey(k) { if (dialed.length < 8) setDialed(d => d + k); }
  function backspace() { setDialed(d => d.slice(0, -1)); }

  function startCall() {
    // For demo: any non-empty number connects to Jia. Auto-fill to #5555 if empty.
    if (!dialed) setDialed('#5555');
    setPhase('connecting');
    setCallTime('connecting…');
    setTimeout(() => { setPhase('call'); callStart.current = Date.now(); runCall(); }, 1400);
  }

  async function runCall() {
    cancelRef.current = false;
    for (const turn of FLOW) {
      if (cancelRef.current) return;
      setActiveSpeaker(turn.who);
      await playClip(turn.clip, turn.ms);
      if (cancelRef.current) return;
      setActiveSpeaker(null);
      await wait(280);
    }
    if (cancelRef.current) return;
    await wait(450);
    endToMessages();
  }

  function endCall() {
    cancelRef.current = true; stopAudio();
    setActiveSpeaker(null);
    endToMessages();
  }

  function endToMessages() {
    callStart.current = 0; setCallTime('connecting…');
    setPhase('messages-empty');
  }

  async function skipToConfirmation() {
    setPhase('messages-confirmed');
    setThinking(true);
    await wait(900);
    setThinking(false);
    setConfirmShown(true);
  }

  function restart() {
    cancelRef.current = true; stopAudio();
    setActiveSpeaker(null); setDialed('#5555'); setConfirmShown(false); setThinking(false);
    callStart.current = 0; setCallTime('connecting…');
    setPhase('dialer');
  }

  const orbClass = `orb ${activeSpeaker === 'jia' ? 'speaking' : ''} ${activeSpeaker === 'user' ? 'listening' : ''}`;

  return (
    <div className="device">
      <a href="index.html" className="device-back-link">← Back</a>
      <div className="island"/>
      <div className="statusbar">
        <span>{statusTime}</span>
        <span style={{display:'flex',gap:5,alignItems:'center'}}>
          <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><rect x="0" y="6" width="2.5" height="5" rx="0.6"/><rect x="3.5" y="3.5" width="2.5" height="7.5" rx="0.6"/><rect x="7" y="1" width="2.5" height="10" rx="0.6"/><rect x="10.5" y="-1" width="2.5" height="12" rx="0.6"/></svg>
          <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><path d="M7 1.5C4.4 1.5 2 2.6 0 4.7L7 10l7-5.3c-2-2.1-4.4-3.2-7-3.2z"/></svg>
          <svg width="22" height="10" viewBox="0 0 22 10" fill="currentColor"><rect x="0" y="0" width="20" height="10" rx="2.5" fill="none" stroke="currentColor" strokeWidth="0.8"/><rect x="1.5" y="1.5" width="14" height="7" rx="1.5"/><rect x="20.5" y="3.5" width="1" height="3" rx="0.4"/></svg>
        </span>
      </div>

      {phase === 'dialer' && (
        <div className="screen-dialer">
          <div className="dialer-display">
            <span className="dialer-number">{dialed}<span className="dialer-cursor"/></span>
          </div>
          <div className="dialer-grid">
            {KEYS.map(([d, l, sym], i) => (
              <button key={i} className={`dial-key ${sym ? 'symbol' : ''}`} onClick={() => pressKey(d)}>
                <span className="digit">{d}</span>
                <span className="letters">{l || ' '}</span>
              </button>
            ))}
          </div>
          <div className="dialer-actions">
            <button className="call-btn" onClick={startCall} aria-label="Call">
              <svg viewBox="0 0 24 24"><path d="M21 15.46l-5.27-.61a1.25 1.25 0 0 0-1.06.36l-2.16 2.17a16 16 0 0 1-7.06-7.07l2.18-2.16a1.25 1.25 0 0 0 .36-1.06L7.39 1.83A1.25 1.25 0 0 0 6.16 1H3a2 2 0 0 0-2 2 22 22 0 0 0 22 22 2 2 0 0 0 2-2v-3.16a1.25 1.25 0 0 0-1-1.38z"/></svg>
            </button>
            <button className="delete-btn" onClick={backspace} disabled={!dialed}>
              <svg viewBox="0 0 28 22" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 3 L26 3 L26 19 L9 19 L2 11 Z"/><path d="M14 8 L20 14 M20 8 L14 14"/></svg>
            </button>
          </div>
          <div className="dialer-hint">Dial <span className="code">#5555</span> to call Jia · or just tap the green button</div>
        </div>
      )}

      {(phase === 'connecting' || phase === 'call') && (
        <div className="screen-call">
          <div className="call-header">
            <div className="call-name">Jia</div>
            <div className="call-state">{phase === 'connecting' ? 'connecting…' : callTime}</div>
          </div>
          <div className="orb-area">
            <div className={orbClass}>
              <div className="orb-ring"/>
              <span className="pulse"/><span className="pulse"/><span className="pulse"/>
              <div className="orb-letter">{activeSpeaker === 'user' ? 'S' : 'J'}</div>
            </div>
          </div>
          <div className="actions">
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 2h6v10a3 3 0 0 1-6 0V2zM4 11a8 8 0 0 0 16 0M12 19v3"/></svg></span><span className="lab">mute</span></button>
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="6" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="18" cy="6" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/><circle cx="6" cy="18" r="1.5"/><circle cx="12" cy="18" r="1.5"/><circle cx="18" cy="18" r="1.5"/></svg></span><span className="lab">keypad</span></button>
            <button className="action active"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 10v4a3 3 0 0 0 3 3h2l5 4V3L8 7H6a3 3 0 0 0-3 3z"/><path d="M16 8a5 5 0 0 1 0 8M19 5a9 9 0 0 1 0 14"/></svg></span><span className="lab">speaker</span></button>
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M3 20a6 6 0 0 1 12 0M18 7v6M15 10h6"/></svg></span><span className="lab">add</span></button>
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M22 8l-6 4 6 4V8z"/></svg></span><span className="lab">FaceTime</span></button>
            <button className="action"><span className="icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3"/></svg></span><span className="lab">mic</span></button>
          </div>
          <div className="end-row">
            <button className="end-btn" onClick={endCall} aria-label="End call">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M21 15.46l-5.27-.61a1.25 1.25 0 0 0-1.06.36l-2.16 2.17a16 16 0 0 1-7.06-7.07l2.18-2.16a1.25 1.25 0 0 0 .36-1.06L7.39 1.83A1.25 1.25 0 0 0 6.16 1H3a2 2 0 0 0-2 2 22 22 0 0 0 22 22 2 2 0 0 0 2-2v-3.16a1.25 1.25 0 0 0-1-1.38z" transform="rotate(135 12 12)"/></svg>
            </button>
          </div>
        </div>
      )}

      {(phase === 'messages-empty' || phase === 'messages-confirmed') && (
        <div className="thread-screen">
          <div className="thread-header">
            <div className="jia-avatar">J</div>
            <div className="thread-title" style={{flex:1}}>
              <div className="name">Jia</div>
              <div className="sub"><span className="live-dot"/>Personal assistant · Messages</div>
            </div>
          </div>
          {phase === 'messages-empty' && (
            <button className="skip-pill" onClick={skipToConfirmation}>Skip to 9 AM →</button>
          )}
          <div className="thread-body" ref={threadRef}>
            {phase === 'messages-empty' && (
              <div style={{margin:'auto', textAlign:'center', color:'#6E6E6E', fontSize:13, padding:24, lineHeight:1.6}}>
                Your call with Jia ended. She'll ring your mum at 9 AM and update this thread when it's done.<br/><br/>
                <span style={{color:'#A8A8A8', fontSize:12}}>Use the pill above to fast-forward.</span>
              </div>
            )}
            {phase === 'messages-confirmed' && (
              <>
                <div className="time-divider">Today, 9:01 AM</div>
                {thinking ? (
                  <div className="bubble-row jia">
                    <div className="bubble-avatar"><div className="jia-avatar" style={{width:28,height:28,fontSize:12}}>J</div></div>
                    <div className="typing"><span/><span/><span/></div>
                  </div>
                ) : null}
                {confirmShown && (
                  <>
                    <div className="bubble-row jia">
                      <div className="bubble-avatar"><div className="jia-avatar" style={{width:28,height:28,fontSize:12}}>J</div></div>
                      <div className="bubble jia">Done — I called your mum and reminded her about her BP medicines. She said: <i>"Oh thank you beta, I'll take them right now."</i> 💛</div>
                    </div>
                    <div className="receipt-card">
                      <div className="head">
                        <div className="check">✓</div>
                        <div className="info">
                          <div className="label">Reminder delivered</div>
                          <div className="name">BP medicines · Mum</div>
                        </div>
                      </div>
                      <div className="meta">
                        <div className="row"><div className="k">When</div><div className="v">9:00 AM</div></div>
                        <div className="row"><div className="k">Duration</div><div className="v">00:38</div></div>
                        <div className="row"><div className="k">Status</div><div className="v" style={{color:'#4ED65A'}}>Acknowledged</div></div>
                        <div className="row"><div className="k">Repeat</div><div className="v">Daily</div></div>
                      </div>
                    </div>
                    <div style={{marginTop:14, display:'flex', justifyContent:'center'}}>
                      <button onClick={restart} style={{padding:'8px 16px', borderRadius:999, background:'transparent', border:'1px solid #3A3A3D', color:'#A8A8A8', fontSize:12, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>↻ Replay demo</button>
                    </div>
                  </>
                )}
              </>
            )}
          </div>
          <div className="composer">
            <input className="composer-input" placeholder="Type a message" disabled/>
          </div>
        </div>
      )}

      <div className="home-indicator"></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
