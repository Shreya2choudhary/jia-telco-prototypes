<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jia — Proactive Reminders · Messages</title>
<style>
  @font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'JioType', system-ui, sans-serif; background: #0A0A0B; color: #F2F2F2;
    display: flex; align-items: center; justify-content: center; }
  .device { width: 390px; height: 844px; background: #000; border-radius: 56px;
    overflow: hidden; position: relative; transform-origin: top center;
    border: 8px solid #0a0a0a; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
    display: flex; flex-direction: column; }
  .island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 124px; height: 36px; background: #000; border-radius: 999px; z-index: 30; }
  .statusbar { display: flex; justify-content: space-between; align-items: center;
    padding: 14px 30px 6px; font-size: 14px; font-weight: 700; color: #fff; height: 50px; flex-shrink: 0; }
  .thread-screen { flex: 1; display: flex; flex-direction: column; background: #1A1A1C; overflow: hidden; }
  .thread-header { display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: #1F1F22; border-bottom: 1px solid #2A2A2D;
    flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
  .jia-avatar { width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(145deg, #FFC86B, #F7AB20); color: #0E0E10;
    font-weight: 900; font-size: 18px; display: grid; place-items: center; flex-shrink: 0; }
  .thread-title { flex: 1; }
  .thread-title .name { font-size: 16px; font-weight: 700; color: #fff; }
  .thread-title .sub { font-size: 12px; color: #A8A8A8; display: flex; align-items: center; gap: 5px; margin-top: 1px; }
  .live-dot { width: 7px; height: 7px; border-radius: 999px; background: #4ED65A; }
  .thread-body { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 8px; }
  .thread-body::-webkit-scrollbar { width: 0; }
  .time-divider { text-align: center; font-size: 11px; font-weight: 600; color: #6E6E6E;
    padding: 8px 0; letter-spacing: 0.04em; text-transform: uppercase; }
  .bubble-row { display: flex; gap: 6px; align-items: flex-end; max-width: 86%; animation: in 320ms cubic-bezier(0.4,0,0.2,1) both; }
  .bubble-row.jia { align-self: flex-start; }
  .bubble-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .bubble-avatar { width: 28px; flex-shrink: 0; }
  .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.45;
    letter-spacing: -0.005em; word-break: break-word; }
  .bubble.jia { background: #2A2A2C; color: #F2F2F2; border-radius: 18px 18px 18px 6px; }
  .bubble.user { background: #5C2DD6; color: #fff; border-radius: 18px 18px 6px 18px; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0 8px 34px;
    animation: in 320ms cubic-bezier(0.4,0,0.2,1) both; }
  .chip { padding: 8px 14px; background: rgba(247,171,32,0.10); color: #F7AB20;
    border: 1.5px solid rgba(247,171,32,0.4); border-radius: 999px;
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .chip:hover { background: rgba(247,171,32,0.18); }
  .chip:disabled { opacity: 0.4; cursor: default; }
  .typing { padding: 8px 14px; background: #2A2A2C; border-radius: 18px 18px 18px 6px;
    display: inline-flex; gap: 4px; align-items: center; }
  .typing span { width: 6px; height: 6px; background: #888; border-radius: 50%;
    animation: bounce 1.4s infinite both; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  /* Rich task card — toggle + meta grid + Edit/Pause/Delete actions */
  .task-rich { margin: 6px 0 6px 34px; max-width: 92%;
    background: #1C1C1E; border: 1.5px solid rgba(247,171,32,0.45); border-radius: 20px;
    padding: 14px; animation: in 320ms cubic-bezier(0.4,0,0.2,1) both; }
  .task-rich.off { border-color: rgba(255,255,255,0.10); opacity: 0.85; }
  .task-rich-head { display: flex; gap: 10px; align-items: center; }
  .task-rich-icon { width: 36px; height: 36px; border-radius: 10px;
    background: rgba(247,171,32,0.14); color: #F7AB20;
    display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
  .task-rich-info { flex: 1; min-width: 0; }
  .task-rich-info .label { font-size: 10px; color: #F7AB20; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase; }
  .task-rich-info .name { font-size: 15px; font-weight: 800; color: #F2F2F2; margin-top: 2px; }
  .task-toggle { width: 42px; height: 24px; border-radius: 999px;
    background: #F7AB20; position: relative; cursor: pointer;
    border: none; padding: 0; flex-shrink: 0; transition: background 200ms; }
  .task-toggle .thumb { position: absolute; top: 2px; left: 20px;
    width: 20px; height: 20px; border-radius: 50%; background: #0E0E10; transition: left 200ms; }
  .task-rich.off .task-toggle { background: #3A3A3D; }
  .task-rich.off .task-toggle .thumb { left: 2px; background: #888; }
  .task-rich-meta { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .task-rich-row { background: #0E0E10; border: 1px solid #2A2A2D; border-radius: 10px; padding: 8px 10px; }
  .task-rich-row .k { color: #A8A8A8; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .task-rich-row .v { color: #F2F2F2; font-size: 13px; font-weight: 700; margin-top: 1px; }
  .task-rich-includes { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; font-size: 12px; color: #A8A8A8; line-height: 1.5; }
  .task-rich-includes b { color: #F2F2F2; font-weight: 700; }
  .task-rich-actions { display: flex; gap: 8px; margin-top: 12px; }
  .task-rich-actions button { flex: 1; appearance: none;
    border: 1px solid #3A3A3D; background: transparent; padding: 8px 10px;
    border-radius: 999px; font-family: inherit; font-size: 12px; font-weight: 700;
    color: #F2F2F2; cursor: pointer; transition: background 150ms, border-color 150ms; }
  .task-rich-actions button:hover { background: rgba(255,255,255,0.05); border-color: #F7AB20; }
  .task-rich-actions button.danger { color: #FF6B6B; border-color: rgba(255,107,107,0.3); }
  .task-rich-actions button.danger:hover { background: rgba(255,107,107,0.08); border-color: #FF6B6B; }

  /* Edit sheet (slides up from bottom of device) */
  .edit-sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.65);
    display: flex; align-items: flex-end; z-index: 80;
    animation: fade-in 200ms; }
  .edit-sheet { background: #1F1F22; width: 100%;
    border-radius: 24px 24px 0 0; padding: 0; max-height: 80%;
    display: flex; flex-direction: column; overflow: hidden;
    animation: slide-sheet 320ms cubic-bezier(0.4,0,0.2,1); }
  .edit-sheet-head { padding: 14px 18px 6px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .edit-sheet-head h3 { font-size: 17px; font-weight: 800; color: #fff; }
  .edit-sheet-close { width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.08); color: #fff; border: none;
    cursor: pointer; font-size: 18px; line-height: 1; }
  .edit-handle { width: 36px; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.2);
    margin: 8px auto 0; flex-shrink: 0; }
  .edit-body { padding: 8px 18px 14px; overflow-y: auto; flex: 1; }
  .edit-label { font-size: 11px; color: #A8A8A8; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; margin-top: 14px; margin-bottom: 6px; display: block; }
  .edit-input { width: 100%; padding: 10px 12px; border-radius: 10px;
    background: #0E0E10; border: 1px solid #2A2A2D; color: #F2F2F2; font-size: 14px;
    font-family: inherit; outline: none; }
  .edit-input:focus { border-color: #F7AB20; }
  .edit-textarea { resize: none; min-height: 70px; line-height: 1.5; }
  .seg-control { display: flex; gap: 6px; }
  .seg-control button { flex: 1; appearance: none; padding: 9px 12px;
    background: #0E0E10; border: 1px solid #2A2A2D; color: #A8A8A8;
    border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
  .seg-control button.on { background: rgba(247,171,32,0.12); color: #F7AB20; border-color: #F7AB20; }
  .edit-foot { display: flex; gap: 8px; padding: 12px 18px 16px;
    border-top: 1px solid #2A2A2D; flex-shrink: 0; background: #1F1F22; }
  .edit-foot button { flex: 1; appearance: none; padding: 12px;
    border-radius: 999px; font-family: inherit; font-size: 14px; font-weight: 800; cursor: pointer; }
  .edit-foot .btn-cancel { background: transparent; border: 1px solid #3A3A3D; color: #F2F2F2; }
  .edit-foot .btn-save { background: linear-gradient(145deg, #FFC86B, #F7AB20); border: none; color: #0E0E10;
    box-shadow: 0 6px 16px rgba(247,171,32,0.35); }
  @keyframes fade-in { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slide-sheet { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* Reminder delivery rich card with action chips */
  .reminder-card { margin: 6px 0 6px 34px; max-width: 90%;
    background: linear-gradient(180deg, rgba(247,171,32,0.10), #232325);
    border: 1.5px solid rgba(247,171,32,0.5); border-radius: 20px;
    overflow: hidden; animation: in 320ms cubic-bezier(0.4,0,0.2,1) both; }
  .reminder-card .body { padding: 14px 16px; }
  .reminder-card .tag { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #F7AB20; }
  .reminder-card .title { font-size: 18px; font-weight: 800; color: #fff; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .reminder-card .time { font-size: 13px; color: #C8C8CC; margin-top: 4px; }
  .reminder-card .actions { display: flex; border-top: 1px solid rgba(255,255,255,0.08); }
  .reminder-card .actions button { flex: 1; padding: 12px 8px; background: none; border: none;
    border-left: 1px solid rgba(255,255,255,0.08); cursor: pointer;
    font-size: 12px; font-weight: 700; color: #F7AB20; font-family: inherit; }
  .reminder-card .actions button:first-child { border-left: none; }
  .reminder-card .actions button:hover { background: rgba(255,255,255,0.04); }

  .composer { padding: 10px 12px; background: #1F1F22; border-top: 1px solid #2A2A2D; flex-shrink: 0; }
  .composer-input { width: 100%; padding: 10px 14px; border-radius: 999px;
    background: #2A2A2C; border: none; color: #F2F2F2; font-size: 14px;
    font-family: inherit; outline: none; }
  .composer-input::placeholder { color: #6E6E6E; }

  .trigger-pill { position: absolute; top: 60px; right: 12px; z-index: 60;
    padding: 7px 12px 7px 10px; border-radius: 999px;
    background: linear-gradient(145deg, #FFC86B, #F7AB20); color: #0E0E10;
    border: none; font-size: 12px; font-weight: 800; cursor: pointer;
    font-family: inherit; box-shadow: 0 6px 20px rgba(247,171,32,0.35);
    display: inline-flex; align-items: center; gap: 4px; }
  .device-back-link { position: absolute; top: 14px; left: 12px; z-index: 200;
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 12px 7px 10px; border-radius: 999px;
    background: rgba(28,28,30,0.85); color: #F2F2F2;
    border: 1px solid rgba(255,255,255,0.18); font-size: 12px; font-weight: 700;
    text-decoration: none; backdrop-filter: blur(10px); }
  @keyframes in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Use case 6 · Proactive Reminders — Messages surface
// Setup: greeting → "Remind me" → typed reminder → channel pick → done
// Delivery (trigger): rich reminder card with Taken / Snooze 5m / Snooze 10m chips

// Chip-driven setup. Each await-chip pauses for an actual user tap;
// the chip text becomes the user bubble.
const SETUP_FLOW = [
  { t: 'time',  text: 'Today, 10:24' },
  { t: 'jia',   text: "Hey Shreya 👋  How can I help?" },
  { t: 'await-chip', chips: ['Remind me', 'Brief me', 'Book an appointment', 'What can you do?'] },
  { t: 'typing', ms: 700 },
  { t: 'jia',   text: "Sure — what should I remind you about?" },
  { t: 'await-chip', chips: ['Take my BP meds', 'Pay electricity bill', 'Call mom'] },
  { t: 'typing', ms: 800 },
  { t: 'jia',   text: "Got it. What time?" },
  { t: 'await-chip', chips: ['8:00 AM', '9:00 AM', '10:00 AM'] },
  { t: 'typing', ms: 700 },
  { t: 'jia',   text: "And how often?" },
  { t: 'await-chip', chips: ['Daily for 3 months', 'Daily', 'Just tomorrow'] },
  { t: 'typing', ms: 800 },
  { t: 'jia',   text: "How would you like the reminder?" },
  { t: 'await-chip', chips: ['📞 Call me', '💬 Message me'] },
  { t: 'typing', ms: 600 },
  { t: 'jia',   text: "Done — I'll send a Messages reminder every morning at 9." },
  { t: 'task',  task: { title: 'BP medicines', time: '9:00 AM', cadence: 'Daily · 3 months', channel: 'Messages' } },
  { t: 'jia',   text: "You can pause, edit or delete this any time — just tap the card above." },
];

const DELIVERY_FLOW = [
  { t: 'time',  text: 'Tomorrow, 9:00 AM' },
  { t: 'jia',   text: "Good morning, Shreya 👋" },
  { t: 'reminder' },
];

const wait = (ms) => new Promise(r => setTimeout(r, ms));

function App() {
  useEffect(() => {
    const fit = () => {
      const dev = document.querySelector('.device'); if (!dev) return;
      const sw = (window.innerWidth - 24) / 390;
      const sh = (window.innerHeight - 24) / 844;
      dev.style.transform = `scale(${Math.min(1, sw, sh)})`;
    };
    fit(); window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  const [messages, setMessages] = useState([]);
  const [typing, setTyping] = useState(false);
  const [phase, setPhase] = useState('setup'); // setup | scheduled | delivering | acknowledged | snoozed
  const [taskOn, setTaskOn] = useState(true);
  const [taskData, setTaskData] = useState({
    title: 'BP medicines', time: '9:00 AM', cadence: 'Daily · 3 months', channel: 'Messages',
    note: 'Take my BP medicines',
  });
  const [editOpen, setEditOpen] = useState(false);
  const [editDraft, setEditDraft] = useState(null);
  const [taskDeleted, setTaskDeleted] = useState(false);

  function openEdit() { setEditDraft({ ...taskData }); setEditOpen(true); }
  function saveEdit() {
    setTaskData(editDraft); setEditOpen(false);
    setMessages(m => [...m, { t: 'time', text: 'Reminder updated', id: Date.now() }]);
  }
  function toggleTask() {
    setTaskOn(v => !v);
    setMessages(m => [...m, { t: 'time', text: taskOn ? 'Reminder paused' : 'Reminder resumed', id: Date.now() }]);
  }
  function deleteTask() {
    setTaskDeleted(true);
    setMessages(m => [...m, { t: 'time', text: 'Reminder deleted', id: Date.now() },
      { t: 'jia', text: "Got it — your reminder has been deleted. You can set up a new one any time.", id: Date.now() + 1 }]);
    setPhase('done');
  }
  const cancelRef = useRef(false);
  const threadRef = useRef(null);

  useEffect(() => {
    if (threadRef.current) threadRef.current.scrollTop = threadRef.current.scrollHeight;
  }, [messages, typing]);

  // Chip gate — flow pauses on 'await-chip' until user taps a chip.
  const pendingChipRef = useRef(null);
  function waitForChip() {
    return new Promise(resolve => { pendingChipRef.current = resolve; });
  }
  function handleChipTap(label) {
    if (pendingChipRef.current) {
      const resolve = pendingChipRef.current;
      pendingChipRef.current = null;
      resolve(label);
    }
  }

  async function runFlow(flow, finalPhase) {
    cancelRef.current = false;
    for (const step of flow) {
      if (cancelRef.current) return;
      if (step.t === 'typing') { setTyping(true); await wait(step.ms || 700); setTyping(false); continue; }
      if (step.t === 'wait') { await wait(step.ms || 600); continue; }
      if (step.t === 'await-chip') {
        const chipId = Date.now() + Math.random();
        setMessages(m => [...m, { t: 'chips', chips: step.chips, id: chipId, active: true }]);
        const picked = await waitForChip();
        if (cancelRef.current) return;
        setMessages(m => m.map(msg => msg.id === chipId ? { ...msg, active: false } : msg));
        setMessages(m => [...m, { t: 'user', text: picked, id: Date.now() + Math.random() }]);
        await wait(280);
        continue;
      }
      setMessages(m => [...m, { ...step, id: Date.now() + Math.random() }]);
      await wait(360);
    }
    setPhase(finalPhase);
  }

  useEffect(() => { runFlow(SETUP_FLOW, 'scheduled'); /* eslint-disable-next-line */ }, []);

  function triggerDelivery() {
    setPhase('delivering');
    runFlow(DELIVERY_FLOW, 'delivered');
  }

  function onReminderAction(action) {
    if (action === 'taken') {
      setMessages(m => [...m, { t: 'user', text: '✅ Taken', id: Date.now() }]);
      setTimeout(() => {
        setMessages(m => [...m, { t: 'jia', text: 'Wonderful — see you tomorrow! 💛', id: Date.now() }]);
        setPhase('acknowledged');
      }, 400);
    } else {
      const min = action === 'snooze5' ? 5 : 10;
      setMessages(m => [...m, { t: 'user', text: `Snooze ${min} min`, id: Date.now() }]);
      setTimeout(() => {
        setMessages(m => [...m, { t: 'jia', text: `Okay — I'll remind you again in ${min} minutes.`, id: Date.now() }]);
        setMessages(m => [...m, { t: 'time', text: `Snoozed · next reminder in ${min} min`, id: Date.now() + 1 }]);
        setPhase('snoozed');
      }, 400);
    }
  }

  function statusTime() {
    const d = new Date();
    return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  return (
    <div className="device">
      <a href="index.html" className="device-back-link">← Back</a>
      <div className="island"/>
      <div className="statusbar">
        <span>{statusTime()}</span>
        <span style={{display:'flex',gap:5,alignItems:'center'}}>
          <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><rect x="0" y="6" width="2.5" height="5" rx="0.6"/><rect x="3.5" y="3.5" width="2.5" height="7.5" rx="0.6"/><rect x="7" y="1" width="2.5" height="10" rx="0.6"/><rect x="10.5" y="-1" width="2.5" height="12" rx="0.6"/></svg>
          <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><path d="M7 1.5C4.4 1.5 2 2.6 0 4.7L7 10l7-5.3c-2-2.1-4.4-3.2-7-3.2z"/></svg>
          <svg width="22" height="10" viewBox="0 0 22 10" fill="currentColor"><rect x="0" y="0" width="20" height="10" rx="2.5" fill="none" stroke="currentColor" strokeWidth="0.8"/><rect x="1.5" y="1.5" width="14" height="7" rx="1.5"/><rect x="20.5" y="3.5" width="1" height="3" rx="0.4"/></svg>
        </span>
      </div>

      {phase === 'scheduled' && (
        <button className="trigger-pill" onClick={triggerDelivery}>
          Trigger 9 AM →
        </button>
      )}

      <div className="thread-screen">
        <div className="thread-header">
          <div className="jia-avatar">J</div>
          <div className="thread-title">
            <div className="name">Jia</div>
            <div className="sub"><span className="live-dot"/>Personal assistant · Messages</div>
          </div>
        </div>
        <div className="thread-body" ref={threadRef}>
          {messages.map(m => {
            if (m.t === 'time') return <div key={m.id} className="time-divider">{m.text}</div>;
            if (m.t === 'jia' || m.t === 'user') {
              const isJia = m.t === 'jia';
              return (
                <div key={m.id} className={`bubble-row ${isJia ? 'jia' : 'user'}`}>
                  <div className="bubble-avatar">
                    {isJia && <div className="jia-avatar" style={{width: 28, height: 28, fontSize: 12}}>J</div>}
                  </div>
                  <div className={`bubble ${isJia ? 'jia' : 'user'}`}>{m.text}</div>
                </div>
              );
            }
            if (m.t === 'chips') {
              return (
                <div key={m.id} className="chips">
                  {m.chips.map((c, i) => (
                    <button key={i} className="chip" disabled={!m.active}
                      onClick={() => m.active && handleChipTap(c)}>{c}</button>
                  ))}
                </div>
              );
            }
            if (m.t === 'task') {
              if (taskDeleted) return null;
              return (
                <div key={m.id} className={`task-rich ${taskOn ? '' : 'off'}`}>
                  <div className="task-rich-head">
                    <div className="task-rich-icon">💊</div>
                    <div className="task-rich-info">
                      <div className="label">Reminder</div>
                      <div className="name">{taskData.title}</div>
                    </div>
                    <button className="task-toggle" role="switch" aria-checked={taskOn} onClick={toggleTask}>
                      <span className="thumb"/>
                    </button>
                  </div>
                  <div className="task-rich-meta">
                    <div className="task-rich-row"><div className="k">Time</div><div className="v">{taskData.time}</div></div>
                    <div className="task-rich-row"><div className="k">Cadence</div><div className="v">{taskData.cadence}</div></div>
                    <div className="task-rich-row"><div className="k">Channel</div><div className="v">{taskData.channel}</div></div>
                    <div className="task-rich-row"><div className="k">Status</div>
                      <div className="v" style={{ color: taskOn ? '#4ED65A' : '#888' }}>{taskOn ? 'Active' : 'Paused'}</div>
                    </div>
                  </div>
                  <div className="task-rich-includes">
                    <b>Note:</b> {taskData.note}
                  </div>
                  <div className="task-rich-actions">
                    <button onClick={openEdit}>Edit</button>
                    <button onClick={toggleTask}>{taskOn ? 'Pause' : 'Resume'}</button>
                    <button className="danger" onClick={deleteTask}>Delete</button>
                  </div>
                </div>
              );
            }
            if (m.t === 'reminder') {
              return (
                <div key={m.id} className="reminder-card">
                  <div className="body">
                    <div className="tag">9:00 AM Reminder</div>
                    <div className="title">💊 Take your BP medicines</div>
                    <div className="time">Daily · for the next 3 months</div>
                  </div>
                  {phase === 'delivering' || phase === 'delivered' ? (
                    <div className="actions">
                      <button onClick={() => onReminderAction('taken')}>✅ Taken</button>
                      <button onClick={() => onReminderAction('snooze5')}>Snooze 5m</button>
                      <button onClick={() => onReminderAction('snooze10')}>Snooze 10m</button>
                    </div>
                  ) : null}
                </div>
              );
            }
            return null;
          })}
          {typing && (
            <div className="bubble-row jia">
              <div className="bubble-avatar"><div className="jia-avatar" style={{width: 28, height: 28, fontSize: 12}}>J</div></div>
              <div className="typing"><span/><span/><span/></div>
            </div>
          )}
        </div>
        <div className="composer">
          <input className="composer-input" placeholder="Type a message" disabled/>
        </div>
      </div>

      {editOpen && editDraft && (
        <div className="edit-sheet-backdrop" onClick={() => setEditOpen(false)}>
          <div className="edit-sheet" onClick={e => e.stopPropagation()}>
            <div className="edit-handle"/>
            <div className="edit-sheet-head">
              <h3>Edit reminder</h3>
              <button className="edit-sheet-close" onClick={() => setEditOpen(false)} aria-label="Close">×</button>
            </div>
            <div className="edit-body">
              <label className="edit-label">What to remind you about</label>
              <input className="edit-input" type="text"
                value={editDraft.note}
                onChange={e => setEditDraft({ ...editDraft, note: e.target.value })}/>

              <label className="edit-label">Time</label>
              <input className="edit-input" type="text"
                value={editDraft.time}
                onChange={e => setEditDraft({ ...editDraft, time: e.target.value })}/>

              <label className="edit-label">Cadence</label>
              <div className="seg-control">
                {['Daily · 3 months', 'Daily', 'Weekdays', 'Once'].map(c => (
                  <button key={c} className={editDraft.cadence === c ? 'on' : ''}
                    onClick={() => setEditDraft({ ...editDraft, cadence: c })}>{c}</button>
                ))}
              </div>

              <label className="edit-label">Channel</label>
              <div className="seg-control">
                {['Messages', 'Call'].map(c => (
                  <button key={c} className={editDraft.channel === c ? 'on' : ''}
                    onClick={() => setEditDraft({ ...editDraft, channel: c })}>{c}</button>
                ))}
              </div>
            </div>
            <div className="edit-foot">
              <button className="btn-cancel" onClick={() => setEditOpen(false)}>Cancel</button>
              <button className="btn-save" onClick={saveEdit}>Save changes</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
