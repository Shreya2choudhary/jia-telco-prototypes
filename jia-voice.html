<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jia — Voice Assistant</title>
<style>
  @font-face { font-family: 'JioType'; font-weight: 500; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 700; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 900; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #F7AB20;
    --gold-soft: #FFC86B;
    --gold-tint: rgba(247,171,32,0.12);
    --ink: #F2F2F2;
    --ink-2: #A8A8A8;
    --ink-3: #6E6E6E;
    --bg-deep: #0A0A0B;
    --bg-call: #050505;
    --line: rgba(255,255,255,0.10);
    --user-blue: #4FC1FF;
  }

  html, body {
    height: 100%; width: 100%;
    font-family: 'JioType', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0A0A0B; color: var(--ink); overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100dvh; padding: 16px;
  }

  /* ── iOS device frame ─────────────────────────────────── */
  .device {
    width: 390px; height: 844px;
    border-radius: 54px;
    background: #000;
    border: 6px solid #1a1a1a;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06) inset;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
    transform-origin: center center;
  }
  @media (max-height: 880px) {
    body { padding: 8px; }
  }
  /* Dynamic island */
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 122px; height: 36px; border-radius: 999px;
    background: #000;
    z-index: 100;
    transition: all 350ms cubic-bezier(0.4, 0.0, 0.2, 1);
    display: flex; align-items: center; justify-content: center;
  }
  .island.expanded {
    width: 240px; height: 38px;
    background: #001a08;
    padding: 0 14px;
    gap: 10px;
  }
  .island-pill {
    display: none; align-items: center; gap: 8px;
    color: #2dd66a; font-size: 13px; font-weight: 700; width: 100%;
    justify-content: space-between;
  }
  .island.expanded .island-pill { display: flex; }
  .island-pill .left { display: flex; align-items: center; gap: 6px; }
  .island-pill .left svg { width: 14px; height: 14px; }
  .island-pill .timer { font-variant-numeric: tabular-nums; }

  /* iOS status bar */
  .status-bar {
    height: 54px; flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 16px 32px 0;
    color: #fff; font-size: 17px; font-weight: 600;
    font-feature-settings: 'tnum';
    z-index: 5; position: relative;
  }
  .status-bar .left { width: 64px; }
  .status-bar .right { width: 64px; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }

  /* ── Screen container ─────────────────────────────────── */
  .screen {
    flex: 1; display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .home-indicator {
    height: 34px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    background: transparent;
  }
  .home-indicator::before {
    content: ''; width: 134px; height: 5px; border-radius: 999px; background: rgba(255,255,255,0.6);
  }

  .screen-dialer, .screen-call { display: none; flex-direction: column; height: 100%; }
  .screen.show-dialer .screen-dialer { display: flex; }
  .screen.show-call .screen-call { display: flex; }

  /* ── Dialer ──────────────────────────────────────────── */
  .screen-dialer { background: #000; padding: 0 0 16px; }
  .dialer-display {
    flex: 0 0 auto; padding: 12px 24px 28px;
    display: flex; align-items: center; justify-content: center;
    min-height: 110px;
  }
  .dialer-number {
    font-size: 44px; font-weight: 400; letter-spacing: 0;
    color: #fff; min-height: 56px;
    font-feature-settings: 'tnum';
  }
  .dialer-cursor {
    display: inline-block; width: 2px; height: 38px; background: var(--gold);
    margin-left: 4px; vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .dialer-grid {
    flex: 1; display: grid;
    grid-template-columns: repeat(3, 76px);
    grid-auto-rows: 76px;
    gap: 14px 30px;
    justify-content: center; align-content: center;
    padding: 0 24px;
  }
  .dial-key {
    width: 76px; height: 76px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.18); color: #fff;
    border: none; cursor: pointer;
    transition: background 100ms;
    font-family: inherit; padding: 0;
  }
  .dial-key:active { background: rgba(255,255,255,0.32); }
  .dial-key .digit { font-size: 30px; font-weight: 400; line-height: 1; letter-spacing: 0; }
  .dial-key .letters {
    font-size: 9px; font-weight: 600; letter-spacing: 0.18em;
    margin-top: 3px; color: #fff;
  }
  .dial-key.symbol .digit { font-size: 32px; }
  .dial-key.symbol .letters { visibility: hidden; }

  .dialer-actions {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 4px 30px 0;
  }
  .dialer-actions .spacer { content: ''; }
  .call-btn {
    width: 70px; height: 70px; border-radius: 50%;
    background: #2DD66A; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(45,214,106,0.4);
    transition: transform 150ms;
    grid-column: 2;
  }
  .call-btn:active { transform: scale(0.95); }
  .call-btn svg { width: 32px; height: 32px; fill: white; }
  .delete-btn {
    grid-column: 3; justify-self: end;
    width: 36px; height: 36px; border: none; background: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; opacity: 0.6;
  }
  .delete-btn:disabled { opacity: 0; pointer-events: none; }
  .delete-btn svg { width: 28px; height: 22px; }

  /* ── Call screen ─────────────────────────────────────── */
  .screen-call {
    background: radial-gradient(ellipse at top, #0a0a0c 0%, #050505 80%);
    color: #fff; padding-top: 8px;
  }
  .call-header { padding: 12px 32px 0; text-align: center; flex-shrink: 0; }
  .call-name { font-size: 28px; font-weight: 500; letter-spacing: -0.01em; color: #fff; }
  .call-state { margin-top: 6px; font-size: 16px; color: rgba(255,255,255,0.65); font-weight: 400;
    font-variant-numeric: tabular-nums; min-height: 20px; }

  /* ── Orb visualizer ──────────────────────────────────── */
  .orb-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; padding: 20px;
  }
  .orb {
    position: relative;
    width: 220px; height: 220px;
    display: grid; place-items: center;
  }
  .orb-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--gold-soft), var(--gold) 60%, #b06f00 100%);
    box-shadow:
      0 0 80px rgba(247,171,32,0.55),
      0 0 160px rgba(247,171,32,0.3),
      inset 0 6px 30px rgba(255,220,150,0.6),
      inset 0 -6px 30px rgba(140,80,0,0.3);
    transition: transform 800ms ease, box-shadow 800ms ease;
    animation: orb-idle 4s ease-in-out infinite;
  }
  .orb-letter {
    position: relative; z-index: 2;
    font-family: 'JioType', system-ui; font-weight: 900;
    font-size: 96px; color: #0E0E10;
    letter-spacing: -0.04em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.18);
    user-select: none;
  }
  /* Pulse ripples (3 layered rings) */
  .pulse {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid rgba(247,171,32,0.6);
    opacity: 0; pointer-events: none;
  }
  .orb.speaking .pulse { animation: pulse-out 1.4s ease-out infinite; }
  .orb.speaking .pulse:nth-child(2) { animation-delay: 0.45s; }
  .orb.speaking .pulse:nth-child(3) { animation-delay: 0.9s; }
  /* User-listening state — blue accent ring */
  .orb.listening .orb-ring {
    background: radial-gradient(circle at 30% 30%, #aee0ff, var(--user-blue) 60%, #1a78b8 100%);
    box-shadow:
      0 0 80px rgba(79,193,255,0.55),
      0 0 160px rgba(79,193,255,0.3),
      inset 0 6px 30px rgba(220,240,255,0.6),
      inset 0 -6px 30px rgba(20,80,140,0.3);
  }
  .orb.listening .orb-letter { font-size: 72px; }
  .orb.listening .pulse {
    border-color: rgba(79,193,255,0.6);
    animation: pulse-out 1.2s ease-out infinite;
  }
  .orb.listening .pulse:nth-child(2) { animation-delay: 0.4s; }
  .orb.listening .pulse:nth-child(3) { animation-delay: 0.8s; }
  /* Speaking surge — when boundary fires we spike */
  .orb.surge .orb-ring { transform: scale(1.05); transition: transform 90ms ease-out; }

  @keyframes orb-idle {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.02); }
  }
  @keyframes pulse-out {
    0%   { transform: scale(1);    opacity: 0.7; }
    100% { transform: scale(1.55); opacity: 0; }
  }

  /* ── Call action grid ─────────────────────────────────── */
  .actions {
    flex-shrink: 0;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px 36px; padding: 12px 32px 8px;
  }
  .action-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: none; border: none; cursor: pointer; color: #fff;
    font-family: inherit; padding: 4px;
  }
  .action-btn .ring {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: grid; place-items: center;
    transition: background 150ms;
  }
  .action-btn:hover .ring { background: rgba(255,255,255,0.26); }
  .action-btn.active .ring { background: #fff; color: #000; }
  .action-btn .ring svg { width: 30px; height: 30px; stroke: #fff; fill: none; stroke-width: 1.7;
    stroke-linecap: round; stroke-linejoin: round; }
  .action-btn.active .ring svg { stroke: #000; }
  .action-btn .label { font-size: 11px; color: #fff; opacity: 0.95; font-weight: 500; }

  /* End call button */
  .end-call-row {
    display: flex; justify-content: center; padding: 0 32px 12px; flex-shrink: 0;
  }
  .end-btn {
    width: 70px; height: 70px; border-radius: 50%;
    background: #FF3B30; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(255,59,48,0.4);
  }
  .end-btn:active { transform: scale(0.95); }
  .end-btn svg { width: 30px; height: 30px; fill: white; }

  /* Mic glow when waiting for user */
  .action-btn.glow .ring {
    animation: mic-glow 1.4s ease-in-out infinite;
    background: rgba(247,171,32,0.95);
  }
  .action-btn.glow .ring svg { stroke: #0E0E10; }
  .action-btn.glow .label { color: var(--gold); font-weight: 700; }
  @keyframes mic-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(247,171,32,0.6); }
    50%      { box-shadow: 0 0 0 14px rgba(247,171,32,0); }
  }

  /* ── Loading / call-end overlay ───────────────────────── */
  .call-ended-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 50;
    color: #fff; text-align: center; padding: 32px;
  }
  .call-ended-overlay.show { display: flex; animation: fade-in 220ms ease; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .restart-btn {
    margin-top: 8px;
    padding: 12px 28px; border-radius: 999px;
    background: var(--gold); border: none; color: #0E0E10;
    font-family: inherit; font-weight: 700; font-size: 16px;
    cursor: pointer;
  }

  .small-hint {
    position: absolute; bottom: -36px; left: 0; right: 0; text-align: center;
    color: var(--ink-3); font-size: 12px; font-weight: 500;
    pointer-events: none;
  }
</style>
</head>

<script>
// ════════════════════════════════════════════════════════════════════
// Jia Voice — iOS dialer + audio-only call
// ════════════════════════════════════════════════════════════════════

// ─── DOM ────────────────────────────────────────────────────────────
const screen        = document.getElementById('screen');
const dialerNumber  = document.getElementById('dialerNumber');
const dialerGrid    = document.getElementById('dialerGrid');
const callBtn       = document.getElementById('callBtn');
const deleteBtn     = document.getElementById('deleteBtn');
const callState     = document.getElementById('callState');
const orb           = document.getElementById('orb');
const orbLetter     = document.getElementById('orbLetter');
const micBtn        = document.getElementById('micBtn');
const endBtn        = document.getElementById('endBtn');
const island        = document.getElementById('island');
const islandTimer   = document.getElementById('islandTimer');
const endedOverlay  = document.getElementById('endedOverlay');
const endedDuration = document.getElementById('endedDuration');
const restartBtn    = document.getElementById('restartBtn');
const clockEl       = document.getElementById('clock');

// ─── Auto-scale device to fit viewport ─────────────────────────────
function fitDevice() {
  const dev = document.querySelector('.device');
  const pad = 16;
  const sw = (window.innerWidth - pad) / 390;
  const sh = (window.innerHeight - pad) / 856;
  const s = Math.min(1, sw, sh);
  dev.style.transform = `scale(${s})`;
  dev.style.transformOrigin = 'center center';
}
fitDevice();
window.addEventListener('resize', fitDevice);

// ─── Live clock ─────────────────────────────────────────────────────
function tickClock() {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  clockEl.textContent = h + ':' + (m < 10 ? '0'+m : m);
}
tickClock(); setInterval(tickClock, 30_000);

// ─── Dialer keypad ──────────────────────────────────────────────────
const KEYS = [
  ['1', ''],     ['2', 'A B C'], ['3', 'D E F'],
  ['4', 'G H I'],['5', 'J K L'], ['6', 'M N O'],
  ['7', 'P Q R S'],['8', 'T U V'],['9', 'W X Y Z'],
  ['*', ''], ['0', '+'], ['#', ''],
];
KEYS.forEach(([d, l]) => {
  const b = document.createElement('button');
  b.className = 'dial-key' + (d === '*' || d === '#' ? ' symbol' : '');
  b.innerHTML = `<span class="digit">${d}</span><span class="letters">${l || '&nbsp;'}</span>`;
  b.addEventListener('click', () => pressKey(d));
  dialerGrid.appendChild(b);
});

let dialed = '';
function pressKey(d) {
  if (dialed.length >= 12) return;
  dialed += d;
  renderDialed();
}
function renderDialed() {
  dialerNumber.textContent = dialed;
  deleteBtn.disabled = dialed.length === 0;
}
deleteBtn.addEventListener('click', () => {
  dialed = dialed.slice(0, -1);
  renderDialed();
});

// Auto-type "#5555" on load (cinematic intro)
(async function autoType() {
  await new Promise(r => setTimeout(r, 700));
  const seq = '#5555';
  for (const c of seq) {
    pressKey(c);
    // visual press effect
    const keys = [...dialerGrid.querySelectorAll('.dial-key')];
    const found = keys.find(k => k.querySelector('.digit').textContent === c);
    if (found) {
      found.style.background = 'rgba(255,255,255,0.36)';
      setTimeout(() => found.style.background = '', 140);
    }
    await new Promise(r => setTimeout(r, 240));
  }
})();

// ─── Pre-generated Sarvam audio (Anushka = Jia, Manisha = Shreya) ──
const AUDIO_CACHE = {};
const AUDIO_CLIPS = [
  'jia_greeting', 'shreya_weather', 'jia_weather',
  'shreya_cricket', 'jia_cricket', 'shreya_thanks', 'jia_bye',
];
function preloadAudio() {
  AUDIO_CLIPS.forEach(name => {
    const a = new Audio(`audio/${name}.wav`);
    a.preload = 'auto';
    AUDIO_CACHE[name] = a;
  });
}
preloadAudio();

let currentAudio = null;
function playClip(name, { onPulse } = {}) {
  return new Promise(resolve => {
    const a = AUDIO_CACHE[name] || new Audio(`audio/${name}.wav`);
    if (currentAudio && currentAudio !== a) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(_){} }
    currentAudio = a;
    a.currentTime = 0;
    let pulseInt = null;
    const cleanup = () => { if (pulseInt) clearInterval(pulseInt); a.onended = a.onerror = null; resolve(); };
    a.onended = cleanup;
    a.onerror = cleanup;
    const p = a.play();
    if (p && p.catch) p.catch(cleanup);
    if (onPulse) pulseInt = setInterval(onPulse, 320);
  });
}
function stopAudio() {
  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(_){} currentAudio = null; }
}

// ─── Orb visualizer ─────────────────────────────────────────────────
function setOrbState(state) {
  // states: 'idle', 'speaking' (Jia), 'listening' (user/Shreya)
  orb.classList.remove('speaking', 'listening', 'surge');
  if (state === 'speaking') orb.classList.add('speaking');
  if (state === 'listening') orb.classList.add('listening');
  orbLetter.textContent = state === 'listening' ? 'S' : 'J';
}
function orbSurge() {
  orb.classList.add('surge');
  setTimeout(() => orb.classList.remove('surge'), 90);
}

// ─── Mic glow control ───────────────────────────────────────────────
function setMicGlow(on) {
  if (on) micBtn.classList.add('glow');
  else    micBtn.classList.remove('glow');
}

// ─── Conversation script (canned audio clips) ───────────────────────
const SCRIPT = [
  // [speaker, audio_clip_name]
  ['jia',    'jia_greeting'],
  ['shreya', 'shreya_weather'],
  ['jia',    'jia_weather'],
  ['shreya', 'shreya_cricket'],
  ['jia',    'jia_cricket'],
  ['shreya', 'shreya_thanks'],
  ['jia',    'jia_bye'],
  ['__end__'],
];

// ─── Call state machine ─────────────────────────────────────────────
let callTimer = null;
let callStartedAt = 0;
let scriptIndex = 0;
let waitingForUser = false;
let callActive = false;

function fmtDuration(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const r = s % 60;
  return (m < 10 ? '0' + m : m) + ':' + (r < 10 ? '0' + r : r);
}

function startCallTimer() {
  callStartedAt = Date.now();
  if (callTimer) clearInterval(callTimer);
  callTimer = setInterval(() => {
    const t = fmtDuration(Date.now() - callStartedAt);
    callState.textContent = t;
    islandTimer.textContent = t;
  }, 500);
}

function stopCallTimer() {
  if (callTimer) clearInterval(callTimer);
  callTimer = null;
}

async function startCall() {
  scriptIndex = 0;
  callActive = true;
  waitingForUser = false;
  endedOverlay.classList.remove('show');
  // Switch to call screen
  screen.classList.remove('show-dialer');
  screen.classList.add('show-call');
  island.classList.add('expanded');

  // Connecting state
  callState.textContent = 'connecting…';
  islandTimer.textContent = '00:00';
  setOrbState('idle');
  setMicGlow(false);

  await new Promise(r => setTimeout(r, 1400));
  if (!callActive) return;

  // Connected
  startCallTimer();
  await advance();
}

async function advance() {
  if (!callActive) return;
  const turn = SCRIPT[scriptIndex];
  if (!turn || turn[0] === '__end__') {
    return endCall(true);
  }
  const [speaker, clipName] = turn;

  if (speaker === 'jia') {
    setOrbState('speaking');
    setMicGlow(false);
    await playClip(clipName, { onPulse: () => orbSurge() });
    if (!callActive) return;
    setOrbState('idle');
    scriptIndex++;
    const next = SCRIPT[scriptIndex];
    if (next && next[0] === 'shreya') {
      waitingForUser = true;
      setMicGlow(true);
    } else {
      await new Promise(r => setTimeout(r, 600));
      if (callActive) advance();
    }
  } else if (speaker === 'shreya') {
    waitingForUser = false;
    setMicGlow(false);
    setOrbState('listening');
    await playClip(clipName, { onPulse: () => orbSurge() });
    if (!callActive) return;
    setOrbState('idle');
    scriptIndex++;
    await new Promise(r => setTimeout(r, 500));
    if (callActive) advance();
  }
}

micBtn.addEventListener('click', () => {
  if (!waitingForUser || !callActive) return;
  waitingForUser = false;
  setMicGlow(false);
  advance();
});

endBtn.addEventListener('click', () => endCall(false));

function endCall(natural) {
  if (!callActive) return;
  callActive = false;
  stopAudio();
  setOrbState('idle');
  setMicGlow(false);
  const dur = fmtDuration(Date.now() - callStartedAt);
  stopCallTimer();
  // Show ended overlay briefly
  endedDuration.textContent = 'Duration ' + dur;
  endedOverlay.classList.add('show');
  // Optionally: after 3s auto-return to dialer
  setTimeout(() => {
    if (!callActive) returnToDialer();
  }, 2400);
}

function returnToDialer() {
  endedOverlay.classList.remove('show');
  screen.classList.remove('show-call');
  screen.classList.add('show-dialer');
  island.classList.remove('expanded');
}

restartBtn.addEventListener('click', () => {
  endedOverlay.classList.remove('show');
  // Skip dialer, restart call directly
  startCall();
});

// ─── Wire call button ───────────────────────────────────────────────
callBtn.addEventListener('click', () => {
  if (!dialed) return;
  // Warm up audio playback (gesture-bound) so subsequent plays are unblocked
  try {
    const warm = AUDIO_CACHE['jia_greeting'];
    if (warm) { warm.muted = true; warm.play().then(() => { warm.pause(); warm.muted = false; warm.currentTime = 0; }).catch(()=>{}); }
  } catch(_){}
  startCall();
});
</script>
