<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jia — Onboarding (Messages)</title>
<style>
  @font-face { font-family: 'JioType'; font-weight: 300; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Light.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 500; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 700; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 900; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'JioType', system-ui, sans-serif; background: #0A0A0B; color: #F2F2F2; }
  #root { min-height: 100vh; }

  @keyframes jia-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes jia-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  @keyframes pulse-out-overlay {
    0%   { transform: scale(1);    opacity: 0.7; }
    100% { transform: scale(1.6);  opacity: 0; }
  }
  div::-webkit-scrollbar { display: none; }
  input, button { font-family: inherit; }
  body::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<a href="index.html" id="proto-back-link" aria-label="Back to use case landing"
   style="position: fixed; top: 14px; left: 14px; z-index: 99999;
          padding: 8px 14px 8px 12px; border-radius: 999px;
          background: rgba(28,28,30,0.88); color: #A8A8A8;
          border: 1px solid #2A2A2A; font-size: 12px; font-weight: 700;
          text-decoration: none;
          font-family: 'JioType', system-ui, sans-serif; letter-spacing: 0.02em;
          display: inline-flex; align-items: center; gap: 5px;
          backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
          transition: color 150ms, border-color 150ms, background 150ms;"
   onmouseover="this.style.color='#F7AB20'; this.style.borderColor='rgba(247,171,32,0.5)';"
   onmouseout="this.style.color='#A8A8A8'; this.style.borderColor='#2A2A2A';">← Back</a>

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
// ════════════════════════════════════════════════════════════════════
// Jia RCS — single-file prototype. Mirrors the reference design.
// ════════════════════════════════════════════════════════════════════
const { useState, useEffect, useRef, useCallback } = React;

// ──────────────────────────────────────────────────────────────────
// Tokens (dark gold theme — matches reference exactly)
// ──────────────────────────────────────────────────────────────────
const GOLD        = '#F7AB20';
const GOLD_SOFT   = '#FFC86B';
const GOLD_TINT   = 'rgba(247,171,32,0.12)';
const GOLD_BORDER = 'rgba(247,171,32,0.45)';
const INK         = '#F2F2F2';
const INK_2       = '#A8A8A8';
const INK_3       = '#6E6E6E';
const LINE        = '#2A2A2A';
const BG          = '#1C1C1E';
const BG_DEEP     = '#0E0E10';

const USER_NAME = 'Shreya';

function genId() { return Math.random().toString(36).slice(2, 9); }
function cap(s) { return s ? s[0].toUpperCase() + s.slice(1) : s; }

// ──────────────────────────────────────────────────────────────────
// Icons
// ──────────────────────────────────────────────────────────────────
const Ic = ({ d, size = 20, color = INK, stroke = 1.75, fill = 'none' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color}
    strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const Icons = {
  phone: <Ic d={<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>}/>,
  sparkles: <Ic d={<><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></>} color={GOLD}/>,
  calendar: <Ic d={<><rect x="3" y="4.5" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>}/>,
  checklist: <Ic d={<><path d="M9 5h11M9 12h11M9 19h11"/><path d="M3 5l1.5 1.5L7 4M3 12l1.5 1.5L7 11M3 19l1.5 1.5L7 18"/></>}/>,
  help: <Ic d={<><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17.02l.01-.01"/></>}/>,
  check: <Ic d={<path d="M5 12l5 5L20 7"/>} color="#0E0E10" stroke={2.5}/>,
  checkSmall: <Ic size={14} d={<path d="M5 12l5 5L20 7"/>} color={GOLD} stroke={2.5}/>,
  clock: <Ic d={<><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></>}/>,
  mapPin: <Ic d={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>}/>,
  bell: <Ic d={<><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>}/>,
  sun: <Ic d={<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></>} color={GOLD}/>,
  cloud: <Ic d={<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>}/>,
  news: <Ic d={<><path d="M4 4h12a2 2 0 0 1 2 2v12a2 2 0 0 0 2 2H6a2 2 0 0 1-2-2V4z"/><path d="M8 8h6M8 12h6M8 16h4"/></>}/>,
  chevron: <Ic size={16} d={<path d="M9 6l6 6-6 6"/>} color={INK_2}/>,
  user: <Ic d={<><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></>}/>,
  stethoscope: <Ic d={<><path d="M6 3v7a4 4 0 0 0 8 0V3"/><path d="M6 3H4M14 3h2M10 14v3a4 4 0 0 0 8 0v-1"/><circle cx="18" cy="15" r="2"/></>} color={GOLD}/>,
  utensils: <Ic d={<><path d="M3 2v7a3 3 0 0 0 6 0V2M6 12v10M14 22V11a4 4 0 0 1 4-4V2"/></>} color={GOLD}/>,
  star: <Ic d={<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>} color={GOLD} fill={GOLD}/>,
  navigation: <Ic d={<path d="M3 11l19-9-9 19-2-8-8-2z"/>} color={GOLD}/>,
  cricket: <Ic d={<><circle cx="12" cy="12" r="10"/><path d="M2.5 12h19M12 2.5v19"/></>} color={GOLD}/>,
  trophy: <Ic d={<><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M3 4h4v3a3 3 0 0 1-3 3M21 4h-4v3a3 3 0 0 0 3 3"/></>} color={GOLD}/>,
};

// ──────────────────────────────────────────────────────────────────
// Jia avatar — gold "J" medallion
// ──────────────────────────────────────────────────────────────────
function JiaAvatar({ size = 28 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: 999, flexShrink: 0,
      background: `linear-gradient(145deg, ${GOLD_SOFT}, ${GOLD})`,
      display: 'grid', placeItems: 'center', color: '#0E0E10',
      fontFamily: 'JioType, system-ui', fontWeight: 900,
      fontSize: size * 0.48, letterSpacing: '-0.02em',
      boxShadow: '0 2px 6px rgba(247,171,32,0.35)',
    }}>J</div>
  );
}

// ──────────────────────────────────────────────────────────────────
// Header
// ──────────────────────────────────────────────────────────────────
function ChatHeader({ onReset }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 8px 8px 4px', background: BG_DEEP,
      borderBottom: `1px solid ${LINE}`,
      position: 'sticky', top: 0, zIndex: 5,
    }}>
      <button onClick={onReset} aria-label="Back" style={{
        width: 40, height: 40, borderRadius: 999, border: 'none',
        background: 'none', display: 'grid', placeItems: 'center', cursor: 'pointer',
      }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={INK} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <JiaAvatar size={36}/>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: INK, letterSpacing: '-0.01em', lineHeight: 1.2 }}>Jia</div>
        <div style={{ fontSize: 12, color: INK_2, display: 'flex', alignItems: 'center', gap: 5 }}>
          <span style={{ width: 7, height: 7, borderRadius: 999, background: '#4ED65A', display: 'inline-block' }}/>
          AI Secretary · RCS
        </div>
      </div>
      <button aria-label="Verify" style={{
        width: 40, height: 40, borderRadius: 999, border: 'none',
        background: 'none', display: 'grid', placeItems: 'center', cursor: 'pointer',
      }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={GOLD} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l8 4v6c0 5-3.5 9-8 10-4.5-1-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>
      </button>
      <button aria-label="More" style={{
        width: 40, height: 40, borderRadius: 999, border: 'none',
        background: 'none', display: 'grid', placeItems: 'center', cursor: 'pointer',
      }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill={INK}><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
      </button>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────
// Bubbles
// ──────────────────────────────────────────────────────────────────
function AssistantBubble({ text, showAvatar, corner }) {
  const radius = ({
    full: '18px',
    top: '18px 18px 18px 6px',
    mid: '6px 18px 18px 6px',
    bot: '6px 18px 18px 18px',
  })[corner] || '18px';
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, maxWidth: '82%' }}>
      <div style={{ width: 28, flexShrink: 0 }}>
        {showAvatar && <JiaAvatar size={28}/>}
      </div>
      <div style={{
        background: '#2A2A2C', color: INK,
        borderRadius: radius, padding: '10px 14px',
        fontSize: 15, lineHeight: 1.4, letterSpacing: '-0.005em',
        whiteSpace: 'pre-wrap', wordBreak: 'break-word',
      }}>{text}</div>
    </div>
  );
}

function UserBubble({ text, corner }) {
  const radius = ({
    full: '18px',
    top: '18px 18px 6px 18px',
    mid: '18px 6px 6px 18px',
    bot: '18px 6px 18px 18px',
  })[corner] || '18px';
  return (
    <div style={{ display: 'flex', justifyContent: 'flex-end', maxWidth: '82%', marginLeft: 'auto' }}>
      <div style={{
        background: `linear-gradient(145deg, ${GOLD_SOFT}, ${GOLD})`,
        color: '#0E0E10',
        borderRadius: radius, padding: '10px 14px',
        fontSize: 15, fontWeight: 600, lineHeight: 1.4, letterSpacing: '-0.005em',
        whiteSpace: 'pre-wrap', wordBreak: 'break-word',
        boxShadow: '0 2px 8px rgba(247,171,32,0.25)',
      }}>{text}</div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────
// Typing indicator
// ──────────────────────────────────────────────────────────────────
function TypingIndicator() {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6 }}>
      <JiaAvatar size={28}/>
      <div style={{
        background: '#2A2A2C',
        borderRadius: '18px 18px 18px 6px', padding: '12px 16px',
        display: 'flex', gap: 4,
      }}>
        {[0,1,2].map(i => (
          <span key={i} style={{
            width: 7, height: 7, borderRadius: 999, background: '#A8A8A8',
            animation: `jia-bounce 1.2s ${i * 0.15}s ease-in-out infinite`,
          }}/>
        ))}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────
// Chips
// ──────────────────────────────────────────────────────────────────
function Chips({ chips, onTap }) {
  if (!chips || chips.length === 0) return null;
  return (
    <div style={{
      display: 'flex', gap: 8, flexWrap: 'wrap',
      paddingLeft: 34, paddingRight: 8, marginTop: 4,
    }}>
      {chips.map((c, i) => (
        <button key={i} onClick={() => onTap(c)} style={{
          padding: '7px 14px', background: 'transparent',
          border: `1.5px solid ${GOLD_BORDER}`, color: GOLD,
          borderRadius: 999, fontSize: 13, fontWeight: 700,
          cursor: 'pointer', fontFamily: 'inherit',
          transition: 'background 150ms, transform 100ms',
          letterSpacing: '-0.005em',
        }}
        onMouseEnter={e => e.currentTarget.style.background = GOLD_TINT}
        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
        onMouseDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
        onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
        >{c}</button>
      ))}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────
// Capabilities carousel card
// ──────────────────────────────────────────────────────────────────
function CarouselCard({ icon, tag, title, description, onClick }) {
  return (
    <button onClick={onClick} style={{
      flexShrink: 0,
      width: 204, minHeight: 260,
      background: BG, border: `1px solid ${LINE}`, borderRadius: 20,
      padding: 16, textAlign: 'left', cursor: 'pointer',
      display: 'flex', flexDirection: 'column', gap: 12,
      boxShadow: '0 1px 2px rgba(0,0,0,0.04)',
      transition: 'transform 150ms, box-shadow 150ms, border-color 150ms',
      fontFamily: 'inherit',
    }}
    onMouseEnter={e => { e.currentTarget.style.borderColor = GOLD_BORDER; e.currentTarget.style.boxShadow = '0 4px 12px rgba(201,150,43,0.12)'; }}
    onMouseLeave={e => { e.currentTarget.style.borderColor = LINE; e.currentTarget.style.boxShadow = '0 1px 2px rgba(0,0,0,0.04)'; }}
    onMouseDown={e => { e.currentTarget.style.transform = 'scale(0.98)'; }}
    onMouseUp={e => { e.currentTarget.style.transform = 'scale(1)'; }}
    >
      <div style={{
        width: 44, height: 44, borderRadius: 12,
        background: GOLD_TINT, display: 'grid', placeItems: 'center',
      }}>{icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{
          fontSize: 10, fontWeight: 700, letterSpacing: '0.08em',
          color: GOLD, textTransform: 'uppercase', marginBottom: 6,
        }}>{tag}</div>
        <div style={{ fontSize: 16, fontWeight: 700, color: INK, lineHeight: 1.25, marginBottom: 6, letterSpacing: '-0.01em' }}>{title}</div>
        <div style={{ fontSize: 13, color: INK_2, lineHeight: 1.4 }}>{description}</div>
      </div>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 4,
        fontSize: 13, fontWeight: 700, color: GOLD,
      }}>Try it {Icons.chevron}</div>
    </button>
  );
}

// ──────────────────────────────────────────────────────────────────
// Restaurant card (NEW — Bandra restaurants flow)
// ──────────────────────────────────────────────────────────────────
function RestaurantCard({ name, cuisine, rating, distance, price, hero, accent, onCall, onDirections }) {
  return (
    <div style={{
      flexShrink: 0, width: 224,
      background: BG, border: `1px solid ${LINE}`, borderRadius: 20,
      overflow: 'hidden', display: 'flex', flexDirection: 'column',
      transition: 'border-color 150ms',
    }}
    onMouseEnter={e => e.currentTarget.style.borderColor = GOLD_BORDER}
    onMouseLeave={e => e.currentTarget.style.borderColor = LINE}>
      {/* Hero */}
      <div style={{
        height: 110, background: accent || GOLD_TINT,
        display: 'grid', placeItems: 'center',
        position: 'relative', borderBottom: `1px solid ${LINE}`,
        backgroundImage: `radial-gradient(circle at 30% 30%, ${GOLD_SOFT}55, transparent 60%), linear-gradient(135deg, ${accent || '#3a2a14'}, #1c1c1e)`,
      }}>
        <div style={{ fontSize: 44, filter: 'drop-shadow(0 2px 6px rgba(0,0,0,0.4))' }}>{hero}</div>
        <div style={{
          position: 'absolute', top: 10, right: 10,
          background: 'rgba(14,14,16,0.85)', backdropFilter: 'blur(4px)',
          padding: '4px 8px', borderRadius: 999,
          display: 'flex', alignItems: 'center', gap: 4,
          fontSize: 11, fontWeight: 700, color: INK,
        }}>
          {Icons.star}<span>{rating}</span>
        </div>
      </div>
      {/* Body */}
      <div style={{ padding: 14, flex: 1, display: 'flex', flexDirection: 'column', gap: 4 }}>
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', color: GOLD, textTransform: 'uppercase' }}>{cuisine}</div>
        <div style={{ fontSize: 15, fontWeight: 700, color: INK, letterSpacing: '-0.01em', lineHeight: 1.25 }}>{name}</div>
        <div style={{ fontSize: 12, color: INK_2, display: 'flex', alignItems: 'center', gap: 6, marginTop: 2 }}>
          <span>{distance}</span><span style={{ color: INK_3 }}>·</span><span>{price}</span>
        </div>
      </div>
      {/* CTAs */}
      <div style={{ display: 'flex', borderTop: `1px solid ${LINE}` }}>
        <button onClick={onCall} style={{
          flex: 1, padding: '11px 8px', background: 'none', border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
          fontSize: 12, fontWeight: 700, color: GOLD, fontFamily: 'inherit',
        }}>{React.cloneElement(Icons.phone, { color: GOLD, size: 14 })} Call</button>
        <button onClick={onDirections} style={{
          flex: 1, padding: '11px 8px', background: 'none', border: 'none',
          borderLeft: `1px solid ${LINE}`, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
          fontSize: 12, fontWeight: 700, color: GOLD, fontFamily: 'inherit',
        }}>{React.cloneElement(Icons.navigation, { color: GOLD, size: 14 })} Directions</button>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────
// Weather card (NEW)
// ──────────────────────────────────────────────────────────────────
function WeatherCard({ city, temp, condition, hi, lo, hourly = [] }) {
  return (
    <div style={{
      background: BG, border: `1.5px solid ${GOLD_BORDER}`, borderRadius: 20, overflow: 'hidden',
    }}>
      <div style={{
        background: `linear-gradient(135deg, ${GOLD_TINT}, ${BG} 65%)`,
        padding: 16, display: 'flex', alignItems: 'center', gap: 14,
      }}>
        <div style={{ fontSize: 48 }}>☀️</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', color: GOLD, textTransform: 'uppercase', marginBottom: 2 }}>Right now · {city}</div>
          <div style={{ fontSize: 30, fontWeight: 900, color: INK, letterSpacing: '-0.03em', lineHeight: 1 }}>{temp}</div>
          <div style={{ fontSize: 13, color: INK_2, marginTop: 4 }}>{condition}</div>
          <div style={{ fontSize: 12, color: INK_3, marginTop: 2 }}>H: {hi}° · L: {lo}°</div>
        </div>
      </div>
      {hourly.length > 0 && (
        <div style={{
          display: 'flex', justifyContent: 'space-between',
          padding: '12px 16px', borderTop: `1px solid ${LINE}`,
        }}>
          {hourly.map((h, i) => (
            <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <div style={{ fontSize: 11, color: INK_3, fontWeight: 600 }}>{h.t}</div>
              <div style={{ fontSize: 18 }}>{h.icon}</div>
              <div style={{ fontSize: 12, color: INK, fontWeight: 700 }}>{h.temp}°</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────
// Cricket card (NEW)
// ──────────────────────────────────────────────────────────────────
function CricketCard({ league, status, teamA, teamB, scoreA, oversA, scoreB, oversB, ball }) {
  return (
    <div style={{
      background: BG, border: `1.5px solid ${GOLD_BORDER}`, borderRadius: 20, overflow: 'hidden',
    }}>
      <div style={{
        padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 8,
        borderBottom: `1px solid ${LINE}`, background: GOLD_TINT,
      }}>
        <div style={{ color: GOLD }}>{Icons.trophy}</div>
        <div style={{ flex: 1, fontSize: 12, fontWeight: 700, color: INK, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{league}</div>
        <div style={{
          fontSize: 10, fontWeight: 800, color: '#FF5050', letterSpacing: '0.08em',
          display: 'flex', alignItems: 'center', gap: 4,
        }}>
          <span style={{ width: 7, height: 7, borderRadius: 999, background: '#FF5050' }}/>LIVE
        </div>

function Carousel({ children }) {
  const ref = useRef(null);
  return (
    <div style={{ marginLeft: 34 }}>
      <div ref={ref} style={{
        display: 'flex', gap: 10, overflowX: 'auto', overflowY: 'visible',
        padding: '2px 16px 8px 0',
        scrollSnapType: 'x mandatory',
        scrollbarWidth: 'none',
        WebkitOverflowScrolling: 'touch',
      }}
      onWheel={e => { if (Math.abs(e.deltaX) < Math.abs(e.deltaY) && ref.current) { ref.current.scrollLeft += e.deltaY; e.preventDefault(); } }}
      >
        {React.Children.map(children, (child, i) => (
          <div key={i} style={{ scrollSnapAlign: 'start' }}>{child}</div>
        ))}
      </div>
    </div>
  );
}

function Composer({ value, onChange, onSubmit, disabled, placeholder }) {
  const ref = useRef(null);

    e.preventDefault();
    if (!value.trim() || disabled) return;
    onSubmit(value.trim());
  };
  return (
    <form onSubmit={handleSubmit} style={{
      display: 'flex', alignItems: 'center', gap: 8,
      padding: '8px 10px 10px', background: BG_DEEP,
      borderTop: `1px solid ${LINE}`,
    }}>
      <button type="button" aria-label="Add" style={{
        width: 40, height: 40, borderRadius: 999, border: 'none',

      }}>
        <input ref={ref}
          value={value} onChange={e => onChange(e.target.value)}
          placeholder={placeholder || "Type a message"} disabled={disabled}
          style={{
            flex: 1, border: 'none', background: 'none', outline: 'none',
            fontSize: 15, color: INK, fontFamily: 'inherit',
            minWidth: 0, padding: '6px 0',
          }}/>

function PickCard({ title, sub, options, multi, onPick, onSkip, picked = [] }) {
  const isPicked = (id) => multi ? picked.includes(id) : picked === id;
  return (
    <div style={{
      background: BG, border: `1px solid ${LINE}`, borderRadius: 20, overflow: 'hidden',
    }}>
      <div style={{ padding: '14px 16px 10px' }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: INK, letterSpacing: '-0.01em' }}>{title}</div>
        {sub && <div style={{ fontSize: 12, color: INK_2, marginTop: 3 }}>{sub}</div>}
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, padding: '0 16px 14px' }}>
        {options.map(opt => {
          const sel = isPicked(opt.id);
          return (
            <button key={opt.id} onClick={() => onPick(opt.id)} style={{
              padding: '8px 13px', borderRadius: 999,
              background: sel ? `linear-gradient(145deg, ${GOLD_SOFT}, ${GOLD})` : 'transparent',
              border: `1.5px solid ${sel ? GOLD : GOLD_BORDER}`,
              color: sel ? '#0E0E10' : GOLD,
              fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
              letterSpacing: '-0.005em',
            }}>{opt.label}</button>
          );
        })}
      </div>
      {(multi || onSkip) && (
        <div style={{ display: 'flex', borderTop: `1px solid ${LINE}` }}>
          {onSkip && (
            <button onClick={onSkip} style={{
              flex: 1, padding: '12px', background: 'none', border: 'none', cursor: 'pointer',
              fontSize: 13, fontWeight: 700, color: INK_2, fontFamily: 'inherit',
            }}>Skip</button>
          )}
          {multi && (
            <button onClick={() => onPick('__done__')} style={{
              flex: 1, padding: '12px', background: 'none', border: 'none',
              borderLeft: onSkip ? `1px solid ${LINE}` : 'none', cursor: 'pointer',
              fontSize: 13, fontWeight: 700, color: GOLD, fontFamily: 'inherit',
            }}>Done · {picked.length} picked</button>
          )}
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────
function renderCard(name, props = {}, onChip) {
  if (name === 'welcome') {
    return <WelcomeCard
      onPrimary={() => onChip('__onb_lets_go__')}
      onSecondary={() => onChip('__onb_maybe_later__')}/>;
  }
  if (name === 'consent') {
    return <ConsentCard onAgree={() => onChip('__onb_agree__')}/>;
  }

// Multi-turn flow advance (bills + doctor)
function advanceFlow(ctx, text) {
  const f = ctx.flow;
  if (!f) return null;
  const lower = text.toLowerCase();

  // ── Doctor ──────────────────────────────────────────────────
  if (f.name === 'doctor') {
    if (f.step === 1) {
      let slot = null;
      if (/morning/.test(lower)) slot = { label: 'Morning', detail: '10:30 AM' };
      else if (/evening/.test(lower)) slot = { label: 'Evening', detail: '6:30 PM' };
      else if (/any/.test(lower))    slot = { label: 'Any time', detail: '11:00 AM' };
      if (!slot) return null;
      f.data.slot = slot; f.step = 2;
      return [
        { kind: 'typing', ms: 700 },
        { kind: 'text', text: `${slot.label} works. General physician or a specialist?`,
          chips: ['General physician', 'Dermatologist', 'Dentist'] },
      ];
    }
    if (f.step === 2) {
      let type = /general|gp|physician/.test(lower) ? 'General physician'
               : /derm/.test(lower) ? 'Dermatologist'
               : /dent/.test(lower) ? 'Dentist'
               : /cardio/.test(lower) ? 'Cardiologist'
               : text.trim();
      f.data.type = type; f.step = 3;
      return [
        { kind: 'typing', ms: 800 },
        { kind: 'text', text: `Found 3 nearby ${type.toLowerCase()}s with open slots. Go with your regular, Dr. Anita Rao at Lilavati?`,
          chips: ['Yes, Dr. Anita Rao', 'Show all 3'] },
      ];
    }
    if (f.step === 3) {
      if (/show all|all 3|other/.test(lower) && !/yes|anita/.test(lower)) {
        f.step = 3.5;
        return [
          { kind: 'typing', ms: 700 },
          { kind: 'text', text: "Three available within your slot:",
            chips: ['Dr. Anita Rao · Lilavati', 'Dr. Sameer Kulkarni · Holy Family', 'Dr. Priya Shah · Nanavati Max'] },
        ];
      }
      f.data.doctor = /kulkarni/.test(lower) ? 'Dr. Sameer Kulkarni'
                    : /priya|shah/.test(lower) ? 'Dr. Priya Shah'
                    : 'Dr. Anita Rao';
      f.data.place  = /kulkarni/.test(lower) ? 'Holy Family Hospital'
                    : /priya|shah/.test(lower) ? 'Nanavati Max'
                    : 'Lilavati Hospital';
      f.step = 4;
      return [
        { kind: 'typing', ms: 700 },
        { kind: 'text', text: 'Locked. Confirm the booking?',
          chips: ['Yes, confirm', 'Cancel'] },
      ];
    }
    if (f.step === 3.5) {
      f.data.doctor = /kulkarni/.test(lower) ? 'Dr. Sameer Kulkarni'
                    : /priya|shah/.test(lower) ? 'Dr. Priya Shah'
                    : 'Dr. Anita Rao';
      f.data.place  = /kulkarni/.test(lower) ? 'Holy Family Hospital'
                    : /priya|shah/.test(lower) ? 'Nanavati Max'
                    : 'Lilavati Hospital';
      f.step = 4;
      return [
        { kind: 'typing', ms: 700 },
        { kind: 'text', text: `Good choice — ${f.data.doctor}, ${f.data.place}. Confirm the booking for ${f.data.when}, ${f.data.slot.detail}?`,
          chips: ['Yes, confirm', 'Cancel'] },
      ];
    }
    if (f.step === 4) {
      if (/cancel|no/.test(lower)) {
        ctx.flow = null;
        return [{ kind: 'text', text: "Okay — nothing booked. Want to try a different time?" }];
      }
      if (!/confirm|yes|go ahead|do it|sure/.test(lower)) return null;
      const booking = { ...f.data };
      ctx.flow = null;
      return [
        { kind: 'typing', ms: 1000 },
        { kind: 'text', text: 'Done. Your appointment is booked.' },
        { kind: 'card', card: 'taskDoctor', cardProps: booking, chips: ['Set a reminder', 'Share with family', 'Add to calendar'] },
      ];
    }
  }

  if (f.name === 'bill') {
    if (f.step === 1) {
      let type = /elect/.test(lower) ? 'Electricity' : /broad|wifi|internet/.test(lower) ? 'Broadband' : /mobile|recharge|phone/.test(lower) ? 'Mobile recharge' : null;
      if (!type) return null;
      f.data.type = type;
      f.step = 2;
      const blurb = type === 'Mobile recharge'
        ? `Your Jio number ending 4421 — recharge with your usual ₹399 plan (28 days, unlimited)?`
        : type === 'Electricity'
          ? `Adani Electricity — outstanding is ₹2,847, due in 4 days. Pay now from JioPay?`
          : `JioFiber 999 plan — ₹1,177 due tomorrow. Pay now?`;
      return [{ kind: 'typing', ms: 700 }, { kind: 'text', text: blurb }];
    }
    if (f.step === 2) {
      if (/no|cancel|remind/.test(lower) && !/yes/.test(lower)) {
        ctx.flow = null;
        return [{ kind: 'text', text: "Okay — I'll remind you tomorrow morning." }];
      }
      if (!/yes|pay|go|sure|399|2847|1177/.test(lower)) return null;
      const amount = f.data.type === 'Electricity' ? '₹2,847' : f.data.type === 'Broadband' ? '₹1,177' : '₹399';
      const merchant = f.data.type === 'Electricity' ? 'Adani Electricity' : f.data.type === 'Broadband' ? 'JioFiber' : 'Jio Recharge';
      ctx.flow = null;
      return [
        { kind: 'typing', ms: 1100 },
        { kind: 'text', text: 'Paid.' },
        { kind: 'card', card: 'taskBill', cardProps: { amount, merchant, type: f.data.type }, chips: ['Download receipt', 'Set autopay', 'Anything else?'] },
      ];
    }
  }
  return null;
}

// Brain dispatcher
function jiaRespond(ctx, userText) {
  const flowReply = advanceFlow(ctx, userText);
  if (flowReply) return flowReply;
  for (const s of SCENARIOS) {
    if (s.match.test(userText)) return s.reply(ctx, userText);
  }
  // Friendly fallback that keeps the demo moving (no "not wired up")
  return [
    { kind: 'typing', ms: 600 },
    { kind: 'text', text: "Got it — let me think about that. In the meantime, want to try one of these?",
      chips: ['What can you do?', 'Daily briefing', 'Suggest restaurants near me'] },
  ];
}

// Initial assistant messages — onboarding wizard auto-plays via useEffect, start empty
function initialMessages() {
  return [];
}

const ONBOARDING_CAPS = [
  { id: 'companion', tag: 'For you',        title: 'Your AI Companion',     description: 'Random questions, drafts, advice — anytime.',                    icon: 'help' },
  { id: 'callbehalf',tag: 'On your behalf', title: 'Calls on Your Behalf',  description: 'Book, follow up, sort issues — I\u2019ll make the call so you don\u2019t.', icon: 'phone' },
  { id: 'briefing',  tag: 'Daily',          title: 'Reminders & Briefings', description: 'Medicine, meetings, bills — and a tidy daily snapshot.',         icon: 'calendar' },
  { id: 'screening', tag: 'Calls',          title: 'Call Intelligence',     description: 'Recaps, key points, follow-ups from your calls.',                icon: 'sparkles' },
];
const LANG_LABELS = { en:'English', hi:'\u0939\u093f\u0928\u094d\u0926\u0940', mr:'\u092e\u0930\u093e\u0920\u0940', ta:'\u0ba4\u0bae\u0bbf\u0bb4\u0bcd', bn:'\u09ac\u09be\u0982\u09b2\u09be', gu:'\u0a97\u0ac1\u0a9c\u0ab0\u0abe\u0aa4\u0ac0', kn:'\u0c95\u0ca8\u0ccd\u0ca8\u0ca1' };

// ──────────────────────────────────────────────────────────────────
// Message list
// ──────────────────────────────────────────────────────────────────
function MessageList({ messages, typing, onChip }) {
  const scrollRef = useRef(null);
  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages.length, typing]);

  return (
    <div ref={scrollRef} style={{
      flex: 1, overflowY: 'auto', padding: '8px 12px 12px',
      display: 'flex', flexDirection: 'column', gap: 3,
      background: BG_DEEP,
    }}>
      <DateDivider label="Today, 9:42 AM"/>
      {messages.map((m, i) => {
        const prev = messages[i - 1];
        const next = messages[i + 1];
        const samePrev = prev && prev.role === m.role && prev.kind === 'text' && m.kind === 'text';
        const sameNext = next && next.role === m.role && next.kind === 'text' && m.kind === 'text';
        const corner = samePrev && sameNext ? 'mid' : samePrev ? 'bot' : sameNext ? 'top' : 'full';
        const showAvatar = m.role === 'assistant' && (!sameNext || next.kind !== 'text');

        return (
          <div key={m.id || i} style={{
            animation: 'jia-in 280ms ease-out both',
            marginTop: samePrev ? 2 : 8,
          }}>
            {m.kind === 'text' && m.role === 'assistant' && (
              <>
                <AssistantBubble text={m.text} showAvatar={showAvatar} corner={corner}/>
                {m.chips && <Chips chips={m.chips} onTap={onChip}/>}
              </>
            )}
            {m.kind === 'text' && m.role === 'user' && (
              <UserBubble text={m.text} corner={corner}/>
            )}
            {m.kind === 'carousel' && (
              <>
                <Carousel>
                  {m.items.map(it => (
                    <CarouselCard key={it.id}
                      icon={React.cloneElement(Icons[it.icon] || Icons.help, { color: GOLD })}
                      tag={it.tag} title={it.title} description={it.description}
                      onClick={() => onChip(it.prompt)}/>
                  ))}
                </Carousel>
                {m.chips && <Chips chips={m.chips} onTap={onChip}/>}
              </>
            )}
            {m.kind === 'restaurants' && (
              <>
                <Carousel>
                  {m.items.map(r => (
                    <RestaurantCard key={r.id}
                      name={r.name} cuisine={r.cuisine} rating={r.rating}
                      distance={r.distance} price={r.price} hero={r.hero} accent={r.accent}
                      onCall={() => onChip(`Call ${r.name}`)}
                      onDirections={() => onChip(`Directions to ${r.name}`)}/>
                  ))}
                </Carousel>
                {m.chips && <Chips chips={m.chips} onTap={onChip}/>}
              </>
            )}
            {m.kind === 'card' && (
              <>
                <div style={{ display: 'flex', gap: 6, alignItems: 'flex-end' }}>
                  <div style={{ width: 28, flexShrink: 0 }}>
                    {showAvatar && <JiaAvatar size={28}/>}
                  </div>
                  <div style={{ flex: 1, minWidth: 0, maxWidth: '86%' }}>
                    {renderCard(m.card, m.cardProps || {}, onChip)}
                  </div>
                </div>
                {m.chips && <Chips chips={m.chips} onTap={onChip}/>}
              </>
            )}
          </div>
        );
      })}
      {typing && (
        <div style={{ marginTop: 8, animation: 'jia-in 200ms ease-out' }}>
          <TypingIndicator/>
        </div>
      )}
      <div style={{ height: 4 }}/>
    </div>
  );
}

  return (
    <div style={{

// ──────────────────────────────────────────────────────────────────
// App
// ──────────────────────────────────────────────────────────────────
function JiaApp() {
  const [messages, setMessages] = useState([]);
  const [typing, setTyping] = useState(false);
  const [input, setInput] = useState('');
  const [disabled, setDisabled] = useState(false);
  const [overlay, setOverlay] = useState(null);
  const [composerPlaceholder, setComposerPlaceholder] = useState('RCS message');
  const [composerEnabled, setComposerEnabled] = useState(false);
  const ctxRef = useRef({ flow: null, profile: {}, onboarded: false });
  const pendingRef = useRef(null);
  const startedRef = useRef(false);

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  const playReply = useCallback(async (reply) => {
    setDisabled(true);
    for (const item of reply) {
      if (item.kind === 'typing') {
        setTyping(true); await sleep(item.ms || 800); setTyping(false);
        continue;
      }
      if (item.kind === 'calling') {
        setOverlay({ place: item.place, phase: 'calling' });
        await sleep(2400);
        setOverlay({ place: item.place, phase: 'connected' });
        await sleep(1700);
        setOverlay({ place: item.place, phase: 'booked' });
        await sleep(1300);
        setOverlay(null);
        continue;
      }
      setMessages(prev => [...prev, { ...item, role: 'assistant', id: genId() }]);
      await sleep(280);
    }
    setDisabled(false);
  }, []);

  function waitForUserInput() {
    return new Promise(resolve => { pendingRef.current = resolve; });
  }

  const runOnboarding = useCallback(async () => {
    await sleep(500);
    // Step 1: welcome intro + capabilities tour
    await playReply([
      { kind: 'typing', ms: 700 },
      { kind: 'text', text: "Hi! I'm Jia, your AI Secretary \u2728" },
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: "Right here in messages \u2014 no app, no login." },
      { kind: 'typing', ms: 700 },
      { kind: 'text', text: "Here's a quick peek at what I can do \u2014 swipe through \ud83d\udc47" },
      { kind: 'carousel', items: ONBOARDING_CAPS },
      { kind: 'typing', ms: 600 },
      { kind: 'card', card: 'welcome' },
    ]);

    const startChoice = await waitForUserInput();
    setMessages(prev => [...prev, { kind: 'text', role: 'user',
      text: startChoice === '__onb_lets_go__' ? "Let's go" : 'Maybe later', id: genId() }]);

    if (startChoice === '__onb_maybe_later__') {
      await playReply([
        { kind: 'typing', ms: 600 },
        { kind: 'text', text: "No worries \u2014 message me anytime, I'll pick up from here." },
      ]);
      ctxRef.current.onboarded = true;
      return;
    }

    // Step 2: consent
    await playReply([
      { kind: 'typing', ms: 700 },
      { kind: 'text', text: "Lovely. First, a quick word on your data \ud83d\udc47" },
      { kind: 'card', card: 'consent' },
    ]);
    await waitForUserInput();
    setMessages(prev => [...prev, { kind: 'text', role: 'user', text: 'I agree', id: genId() }]);

    // Step 3: name
    await playReply([
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: "Quick set-up \u2014 4 small things." },
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: "1 of 4 \u00b7 What should I call you? Just type your first name \ud83d\udc47" },
    ]);
    setComposerEnabled(true);
    setComposerPlaceholder('Type your name\u2026');
    const name = (await waitForUserInput()).trim();
    setComposerEnabled(false);
    setComposerPlaceholder('RCS message');
    ctxRef.current.profile.name = name;

    // Step 4: nickname
    await playReply([
      { kind: 'typing', ms: 700 },
      { kind: 'text', text: `Nice to meet you, ${name} \ud83d\udc4b` },
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: "2 of 4 \u00b7 What would you like to call me? Pick one or type your own.",
        chips: ['Jia', 'Mira', 'Buddy', 'Saathi'] },
    ]);
    setComposerEnabled(true);
    setComposerPlaceholder('Type a nickname\u2026');
    const nickname = (await waitForUserInput()).trim();
    setComposerEnabled(false);
    setComposerPlaceholder('RCS message');
    ctxRef.current.profile.nickname = nickname;

    // Step 5: tone
    await playReply([
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: `Got it \u2014 I'm ${nickname} \ud83d\ude0a` },
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: "3 of 4 \u00b7 How should I sound?" },
      { kind: 'card', card: 'pickTone' },
    ]);
    const toneChip = await waitForUserInput();
    const tone = (toneChip || '').split(':')[1] || 'warm';
    ctxRef.current.profile.tone = tone;
    const toneLabels = { warm: 'Warm \ud83e\udd17', crisp: 'Crisp \u26a1', formal: 'Formal \ud83c\udfa9', playful: 'Playful \u2728' };
    setMessages(prev => [...prev, { kind: 'text', role: 'user', text: toneLabels[tone] || cap(tone), id: genId() }]);

    // Step 6: languages (multi-select with live updating card)
    await playReply([
      { kind: 'typing', ms: 700 },
      { kind: 'text', text: `${cap(tone)} it is.` },
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: "4 of 4 \u00b7 Languages you're comfortable in? Pick up to 3." },
      { kind: 'card', card: 'pickLanguages', cardProps: { picked: [] } },
    ]);
    const picked = [];
    while (true) {
      const chip = await waitForUserInput();
      if (chip === '__onb_langs_done__') break;
      if (chip && chip.startsWith('__onb_lang_toggle__:')) {
        const lang = chip.split(':')[1];
        const idx = picked.indexOf(lang);
        if (idx >= 0) picked.splice(idx, 1);
        else if (picked.length < 3) picked.push(lang);
        const snapshot = [...picked];
        setMessages(prev => prev.map(m =>
          (m.kind === 'card' && m.card === 'pickLanguages')
            ? { ...m, cardProps: { picked: snapshot } }
            : m
        ));
      }
    }
    ctxRef.current.profile.languages = picked;
    const langSummary = picked.map(p => LANG_LABELS[p] || p).join(', ') || 'Skip';
    setMessages(prev => [...prev, { kind: 'text', role: 'user', text: langSummary, id: genId() }]);

    // Step 7: done
    await playReply([
      { kind: 'typing', ms: 800 },
      { kind: 'text', text: `All set, ${name}. \u2728` },
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: "I'll be right here whenever you need me \u2014 just message anytime." },
    ]);
    ctxRef.current.onboarded = true;
    setComposerEnabled(true);
    setComposerPlaceholder('Message Jia\u2026');
  }, [playReply]);

  // Run wizard once on mount
  useEffect(() => {
    if (!startedRef.current) {
      startedRef.current = true;
      runOnboarding();
    }
  }, [runOnboarding]);

  const handleUserMessage = useCallback(async (text, opts = {}) => {
    if (!text || !text.trim() || disabled) return;
    // If wizard is awaiting → resolve with the input
    if (pendingRef.current) {
      const resolve = pendingRef.current;
      pendingRef.current = null;
      if (!opts.silent) {
        setMessages(prev => [...prev, { kind: 'text', role: 'user', text: text.trim(), id: genId() }]);
      }
      setInput('');
      resolve(text.trim());
      return;
    }
    // Else: regular handling (post-onboarding)
    if (!opts.silent) {
      setMessages(prev => [...prev, { kind: 'text', role: 'user', text: text.trim(), id: genId() }]);
    }
    setInput('');
    setDisabled(true);
    await sleep(280);
    setTyping(true);
    const reply = jiaRespond(ctxRef.current, text.trim());
    setTyping(false);
    await playReply(reply);
  }, [disabled, playReply]);

  const handleChipTap = useCallback((chip) => {
    if (chip && chip.startsWith('__onb_')) {
      const resolve = pendingRef.current;
      if (resolve) { pendingRef.current = null; resolve(chip); }
      return;
    }
    handleUserMessage(chip);
  }, [handleUserMessage]);

  const handleReset = () => {
    ctxRef.current = { flow: null, profile: {}, onboarded: false };
    setMessages([]); setInput(''); setDisabled(false); setTyping(false);
    setComposerEnabled(false); setComposerPlaceholder('RCS message');
    pendingRef.current = null; startedRef.current = false;
    setTimeout(() => { startedRef.current = true; runOnboarding(); }, 100);
  };

  return (
    <div style={{
      minHeight: '100vh', width: '100%', background: '#0A0A0B',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '12px 16px', boxSizing: 'border-box',
      fontFamily: "'JioType', system-ui, sans-serif",
    }}>
      <AndroidDevice width={390} height={760} dark={true}>
        <div style={{
          height: '100%', display: 'flex', flexDirection: 'column',
          background: BG_DEEP, overflow: 'hidden', position: 'relative',
          fontFamily: "'JioType', system-ui, sans-serif",
        }}>
          <ChatHeader onReset={handleReset}/>
          <MessageList messages={messages} typing={typing} onChip={handleChipTap}/>
          <Composer value={input} onChange={setInput} onSubmit={handleUserMessage}
            disabled={!composerEnabled || disabled} placeholder={composerPlaceholder}/>
          {overlay && <CallingOverlay place={overlay.place} phase={overlay.phase}/>}
        </div>
      </AndroidDevice>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<JiaApp/>);
</script>
