<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jia — Onboarding · Call + Messages</title>
<style>
  @font-face { font-family: 'JioType'; font-weight: 500; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 700; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
  @font-face { font-family: 'JioType'; font-weight: 900; font-style: normal; font-display: swap;
    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%;
    font-family: 'JioType', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0A0A0B; color: #F2F2F2; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 12px; }
  div::-webkit-scrollbar { display: none; }

  /* ── Animations ────────────────────────────────────────── */
  @keyframes jia-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes jia-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  @keyframes pulse-out {
    0%   { transform: scale(1);    opacity: 0.7; }
    100% { transform: scale(1.55); opacity: 0; }
  }
  @keyframes orb-idle {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.02); }
  }
  @keyframes mic-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(247,171,32,0.6); }
    50%      { box-shadow: 0 0 0 14px rgba(247,171,32,0); }
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse-out-overlay {
    0%   { transform: scale(1);    opacity: 0.7; }
    100% { transform: scale(1.6);  opacity: 0; }
  }

  /* ── iOS frame ──────────────────────────────────────────── */
  .device {
    width: 390px; height: 844px;
    border-radius: 54px;
    background: #000;
    border: 6px solid #1a1a1a;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06) inset;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
    transform-origin: center center;
  }

  /* Dynamic island */
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 122px; height: 36px; border-radius: 999px;
    background: #000; z-index: 100;
    transition: all 350ms cubic-bezier(0.4, 0.0, 0.2, 1);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .island.expanded {
    width: 240px; height: 38px; background: #001a08; padding: 0 14px;
  }
  .island-pill {
    display: none; align-items: center; gap: 8px;
    color: #2dd66a; font-size: 13px; font-weight: 700; width: 100%; justify-content: space-between;
  }
  .island.expanded .island-pill { display: flex; }
  .island-pill .left { display: flex; align-items: center; gap: 6px; }
  .island-pill .left svg { width: 14px; height: 14px; }
  .island-pill .timer { font-variant-numeric: tabular-nums; }

  /* Status bar */
  .status-bar {
    height: 54px; flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 16px 32px 0;
    color: #fff; font-size: 17px; font-weight: 600;
    z-index: 5; position: relative; pointer-events: none;
  }
  .status-bar.dark-bg { color: #fff; }
  .status-bar .left { width: 64px; }
  .status-bar .right { width: 64px; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }

  .home-indicator {
    height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    background: transparent;
  }
  .home-indicator::before {
    content: ''; width: 134px; height: 5px; border-radius: 999px; background: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Tokens ─────────────────────────────────────────────────────────
const GOLD        = '#F7AB20';
const GOLD_SOFT   = '#FFC86B';
const GOLD_TINT   = 'rgba(247,171,32,0.12)';
const GOLD_BORDER = 'rgba(247,171,32,0.45)';
const INK         = '#F2F2F2';
const INK_2       = '#A8A8A8';
const INK_3       = '#6E6E6E';
const LINE        = '#2A2A2A';
const BG          = '#1C1C1E';
const BG_DEEP     = '#0E0E10';
const USER_NAME   = 'Shreya';

const genId = () => Math.random().toString(36).slice(2, 9);

// ── Pre-generated Sarvam audio (Anushka = Jia, Manisha = Shreya) ──
const AUDIO_CACHE = {};
const AUDIO_CLIPS = [
  'onb_jia_greeting',
  'onb_shreya_what_can',
  'onb_jia_setup_rcs',
  'onb_jia_cap1', 'onb_jia_cap2', 'onb_jia_cap3', 'onb_jia_cap4',
  'onb_jia_ask_next',
  'onb_shreya_later',
  'onb_jia_bye',
];
function preloadAudio() {
  AUDIO_CLIPS.forEach(name => {
    const a = new Audio(`audio/${name}.wav`);
    a.preload = 'auto';
    AUDIO_CACHE[name] = a;
  });
}
preloadAudio();
let currentAudio = null;
function playClip(name, { onPulse } = {}) {
  return new Promise(resolve => {
    const a = AUDIO_CACHE[name] || new Audio(`audio/${name}.wav`);
    if (currentAudio && currentAudio !== a) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(_){} }
    currentAudio = a;
    a.currentTime = 0;
    let pulseInt = null;
    const cleanup = () => { if (pulseInt) clearInterval(pulseInt); a.onended = a.onerror = null; resolve(); };
    a.onended = cleanup; a.onerror = cleanup;
    const p = a.play();
    if (p && p.catch) p.catch(cleanup);
    if (onPulse) pulseInt = setInterval(onPulse, 320);
  });
}
function stopAudio() {
  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(_){} currentAudio = null; }
}

// ── Auto-scale ─────────────────────────────────────────────────────
function useFitToViewport() {
  useEffect(() => {
    const fit = () => {
      const dev = document.querySelector('.device');
      if (!dev) return;
      const sw = (window.innerWidth - 24) / 390;
      const sh = (window.innerHeight - 24) / 856;
      const s = Math.min(1, sw, sh);
      dev.style.transform = `scale(${s})`;
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);
}

// ── iOS chrome ────────────────────────────────────────────────────
function StatusBar({ time }) {
  return (
    <div className="status-bar">
      <div className="left">{time}</div>
      <div className="right">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="white">
          <rect x="0" y="9" width="3" height="5" rx="1"/>
          <rect x="5" y="6" width="3" height="8" rx="1"/>
          <rect x="10" y="3" width="3" height="11" rx="1"/>
          <rect x="15" y="0" width="3" height="14" rx="1" opacity="0.4"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white">
          <path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5z"/>
          <path d="M8 8a4.5 4.5 0 0 0-3.18 1.32l1.06 1.06A3 3 0 0 1 8 9.5a3 3 0 0 1 2.12.88l1.06-1.06A4.5 4.5 0 0 0 8 8z"/>
          <path d="M8 4.5A8 8 0 0 0 2.34 6.84l1.06 1.06A6.5 6.5 0 0 1 8 6a6.5 6.5 0 0 1 4.6 1.9l1.06-1.06A8 8 0 0 0 8 4.5z"/>
          <path d="M8 1a11.5 11.5 0 0 0-8.13 3.37l1.07 1.07A10 10 0 0 1 8 2.5a10 10 0 0 1 7.06 2.94l1.07-1.07A11.5 11.5 0 0 0 8 1z"/>
        </svg>
        <svg width="26" height="12" viewBox="0 0 26 12">
          <rect x="0.5" y="0.5" width="22" height="11" rx="2.5" fill="none" stroke="white" strokeOpacity="0.5"/>
          <rect x="2" y="2" width="19" height="8" rx="1.2" fill="white"/>
          <rect x="23" y="4" width="2" height="4" rx="0.6" fill="white" fillOpacity="0.5"/>
        </svg>
      </div>
    </div>
  );
}

function DynamicIsland({ expanded, dropped, timer, onClick }) {
  // When dropped: show a brief "Call ended" state in red, then collapse
  return (
    <div className={'island' + (expanded ? ' expanded' : '')} onClick={onClick}
      style={dropped ? { background: '#3a1417' } : {}}>
      <div className="island-pill" style={dropped ? { color: '#ff8a90' } : {}}>
        <span className="left">
          <svg viewBox="0 0 24 24" fill={dropped ? '#ff8a90' : '#2dd66a'}>
            {dropped
              ? <path d="M21 15.46l-5.27-.61a1.25 1.25 0 0 0-1.06.36l-2.16 2.17a16 16 0 0 1-7.06-7.07l2.18-2.16a1.25 1.25 0 0 0 .36-1.06L7.39 1.83A1.25 1.25 0 0 0 6.16 1H3a2 2 0 0 0-2 2 22 22 0 0 0 22 22 2 2 0 0 0 2-2v-3.16a1.25 1.25 0 0 0-1-1.38z" transform="rotate(135 12 12)"/>
              : <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            }
          </svg>
          {dropped ? 'Call ended' : 'Jia'}
        </span>
        {!dropped && <span className="timer">{timer}</span>}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// DIALER SCREEN
// ─────────────────────────────────────────────────────────────────
function DialerScreen({ onCall }) {
  const [dialed, setDialed] = useState('');
  const [pressed, setPressed] = useState(null);
  const KEYS = [
    ['1', ''],     ['2', 'A B C'], ['3', 'D E F'],
    ['4', 'G H I'],['5', 'J K L'], ['6', 'M N O'],
    ['7', 'P Q R S'],['8', 'T U V'],['9', 'W X Y Z'],
    ['*', ''], ['0', '+'], ['#', ''],
  ];
  const press = (d) => {
    setDialed(prev => prev.length >= 12 ? prev : prev + d);
    setPressed(d);
    setTimeout(() => setPressed(p => p === d ? null : p), 140);
  };

  // Auto-type #5555
  useEffect(() => {
    let cancel = false;
    (async () => {
      await new Promise(r => setTimeout(r, 700));
      const seq = '#5555';
      for (const c of seq) {
        if (cancel) return;
        press(c);
        await new Promise(r => setTimeout(r, 240));
      }
    })();
    return () => { cancel = true; };
  }, []);

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: '#000', paddingBottom: 16 }}>
      <div style={{ flex: '0 0 auto', padding: '12px 24px 28px', display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 110 }}>
        <div style={{ fontSize: 44, fontWeight: 400, color: '#fff', minHeight: 56, fontVariantNumeric: 'tabular-nums' }}>{dialed}</div>
      </div>
      <div style={{
        flex: 1, display: 'grid',
        gridTemplateColumns: 'repeat(3, 76px)', gridAutoRows: '76px',
        gap: '14px 30px', justifyContent: 'center', alignContent: 'center',
        padding: '0 24px',
      }}>
        {KEYS.map(([d, l]) => (
          <button key={d}
            onClick={() => press(d)}
            style={{
              width: 76, height: 76,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              borderRadius: '50%',
              background: pressed === d ? 'rgba(255,255,255,0.36)' : 'rgba(255,255,255,0.18)',
              color: '#fff',
              border: 'none', cursor: 'pointer', fontFamily: 'inherit', padding: 0,
              transition: 'background 100ms',
            }}>
            <span style={{ fontSize: d === '*' || d === '#' ? 32 : 30, fontWeight: 400, lineHeight: 1 }}>{d}</span>
            <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.18em', marginTop: 3, color: '#fff', visibility: (d === '*' || d === '#') ? 'hidden' : 'visible' }}>{l || '\u00a0'}</span>
          </button>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', padding: '4px 30px 0' }}>
        <span/>
        <button onClick={() => { if (dialed) onCall(); }}
          style={{
            width: 70, height: 70, borderRadius: '50%', background: '#2DD66A', border: 'none',
            cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 6px 20px rgba(45,214,106,0.4)',
            gridColumn: 2,
          }}>
          <svg viewBox="0 0 24 24" width="32" height="32" fill="white">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </button>
        <button onClick={() => setDialed(d => d.slice(0, -1))} disabled={!dialed}
          style={{
            gridColumn: 3, justifySelf: 'end',
            width: 36, height: 36, border: 'none', background: 'none', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', opacity: dialed ? 0.6 : 0,
          }}>
          <svg viewBox="0 0 28 22" width="28" height="22" fill="white">
            <path d="M9 0H26a2 2 0 0 1 2 2v18a2 2 0 0 1-2 2H9L0 11 9 0z" opacity="0.4"/>
            <path d="M13 7l8 8M21 7l-8 8" stroke="white" strokeWidth="2" strokeLinecap="round" fill="none"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// CALL SCREEN (audio-only)
// ─────────────────────────────────────────────────────────────────
function Orb({ state }) {
  // state: 'idle' | 'speaking' | 'listening'
  const ringStyle = {
    position: 'absolute', inset: 0, borderRadius: '50%',
    background: state === 'listening'
      ? 'radial-gradient(circle at 30% 30%, #aee0ff, #4FC1FF 60%, #1a78b8 100%)'
      : 'radial-gradient(circle at 30% 30%, #FFC86B, #F7AB20 60%, #b06f00 100%)',
    boxShadow: state === 'listening'
      ? '0 0 80px rgba(79,193,255,0.55), 0 0 160px rgba(79,193,255,0.3), inset 0 6px 30px rgba(220,240,255,0.6), inset 0 -6px 30px rgba(20,80,140,0.3)'
      : '0 0 80px rgba(247,171,32,0.55), 0 0 160px rgba(247,171,32,0.3), inset 0 6px 30px rgba(255,220,150,0.6), inset 0 -6px 30px rgba(140,80,0,0.3)',
    animation: 'orb-idle 4s ease-in-out infinite',
  };
  const pulseStyle = {
    position: 'absolute', inset: 0, borderRadius: '50%',
    border: `2px solid ${state === 'listening' ? 'rgba(79,193,255,0.6)' : 'rgba(247,171,32,0.6)'}`,
    opacity: 0, pointerEvents: 'none',
  };
  return (
    <div style={{ position: 'relative', width: 220, height: 220, display: 'grid', placeItems: 'center' }}>
      {state === 'speaking' && [0,1,2].map(i => (
        <span key={i} style={{ ...pulseStyle, animation: `pulse-out 1.4s ${i*0.45}s ease-out infinite` }}/>
      ))}
      {state === 'listening' && [0,1,2].map(i => (
        <span key={i} style={{ ...pulseStyle, animation: `pulse-out 1.2s ${i*0.4}s ease-out infinite` }}/>
      ))}
      <div style={ringStyle}/>
      <div style={{
        position: 'relative', zIndex: 2,
        fontFamily: 'JioType, system-ui', fontWeight: 900,
        fontSize: state === 'listening' ? 72 : 96, color: '#0E0E10',
        letterSpacing: '-0.04em', textShadow: '0 2px 10px rgba(0,0,0,0.18)',
        userSelect: 'none',
      }}>{state === 'listening' ? 'S' : 'J'}</div>
    </div>
  );
}

function ActionBtn({ icon, label, glow, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
      background: 'none', border: 'none', cursor: 'pointer', color: '#fff',
      fontFamily: 'inherit', padding: 4,
    }}>
      <span style={{
        width: 64, height: 64, borderRadius: '50%',
        background: glow ? 'rgba(247,171,32,0.95)' : active ? '#fff' : 'rgba(255,255,255,0.18)',
        display: 'grid', placeItems: 'center',
        animation: glow ? 'mic-glow 1.4s ease-in-out infinite' : 'none',
        transition: 'background 150ms',
      }}>
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
          stroke={glow ? '#0E0E10' : active ? '#000' : '#fff'} strokeWidth="1.7"
          strokeLinecap="round" strokeLinejoin="round">{icon}</svg>
      </span>
      <span style={{ fontSize: 11, color: glow ? GOLD : '#fff', opacity: 0.95, fontWeight: glow ? 700 : 500 }}>{label}</span>
    </button>
  );
}

function CallScreen({ orbState, micGlow, callTimer, onMicTap, onEnd }) {
  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      background: 'radial-gradient(ellipse at top, #0a0a0c 0%, #050505 80%)',
      color: '#fff', paddingTop: 8,
    }}>
      <div style={{ padding: '12px 32px 0', textAlign: 'center', flexShrink: 0 }}>
        <div style={{ fontSize: 28, fontWeight: 500, letterSpacing: '-0.01em', color: '#fff' }}>Jia</div>
        <div style={{ marginTop: 6, fontSize: 16, color: 'rgba(255,255,255,0.65)', fontWeight: 400, fontVariantNumeric: 'tabular-nums', minHeight: 20 }}>{callTimer}</div>
      </div>
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', padding: 20 }}>
        <Orb state={orbState}/>
      </div>
      <div style={{
        flexShrink: 0, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
        gap: '12px 36px', padding: '12px 32px 8px',
      }}>
        <ActionBtn icon={<><path d="M9 2h6v10a3 3 0 0 1-6 0V2zM4 11a8 8 0 0 0 16 0M12 19v3"/></>} label="mute"/>
        <ActionBtn icon={<>{[6,12,18].flatMap(y => [6,12,18].map(x => <circle key={x+'-'+y} cx={x} cy={y} r="1.5" fill="#fff" stroke="none"/>))}</>} label="keypad"/>
        <ActionBtn active icon={<><path d="M3 10v4a3 3 0 0 0 3 3h2l5 4V3L8 7H6a3 3 0 0 0-3 3z"/><path d="M16 8a5 5 0 0 1 0 8M19 5a9 9 0 0 1 0 14"/></>} label="audio"/>
        <ActionBtn icon={<><circle cx="9" cy="8" r="3.5"/><path d="M3 20a6 6 0 0 1 12 0M18 7v6M15 10h6"/></>} label="add"/>
        <ActionBtn icon={<><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M22 8l-6 4 6 4V8z"/></>} label="FaceTime"/>
        <ActionBtn glow={micGlow} onClick={onMicTap}
          icon={<><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3"/></>}
          label="speak"/>
      </div>
      <div style={{ display: 'flex', justifyContent: 'center', padding: '0 32px 12px', flexShrink: 0 }}>
        <button onClick={onEnd} style={{
          width: 70, height: 70, borderRadius: '50%', background: '#FF3B30', border: 'none',
          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 6px 20px rgba(255,59,48,0.4)',
        }}>
          <svg width="30" height="30" viewBox="0 0 24 24" fill="white">
            <path d="M21 15.46l-5.27-.61a1.25 1.25 0 0 0-1.06.36l-2.16 2.17a16 16 0 0 1-7.06-7.07l2.18-2.16a1.25 1.25 0 0 0 .36-1.06L7.39 1.83A1.25 1.25 0 0 0 6.16 1H3a2 2 0 0 0-2 2 22 22 0 0 0 22 22 2 2 0 0 0 2-2v-3.16a1.25 1.25 0 0 0-1-1.38z" transform="rotate(135 12 12)"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// RCS COMPONENTS (lifted from jia-rcs.html — restaurants flow)
// ─────────────────────────────────────────────────────────────────
function JiaAvatar({ size = 28 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: 999, flexShrink: 0,
      background: `linear-gradient(145deg, ${GOLD_SOFT}, ${GOLD})`,
      display: 'grid', placeItems: 'center', color: '#0E0E10',
      fontFamily: 'JioType, system-ui', fontWeight: 900,
      fontSize: size * 0.48, letterSpacing: '-0.02em',
      boxShadow: '0 2px 6px rgba(247,171,32,0.35)',
    }}>J</div>
  );
}

function RcsHeader({ onBack, callActive }) {
  return (

// ── Scenarios for RCS interaction in onboarding ──
// "Continue setup" now triggers the INLINE wizard (no redirect to a separate
// RCS prototype). The wizard runs as a continuation of the same Messages thread.
const SCENARIOS = [
  {
    match: /^(set up|continue setup|continue in messages|set me up)/i,
    reply: () => [
      { kind: 'typing', ms: 500 },
      { kind: 'text', text: "Sweet — let's get you set up right here." },
      { kind: 'start-wizard' },   // hand off to runWizard()
    ],
  },
  {
    match: /^(maybe later|skip|no thanks?|cancel)/i,
    reply: () => [
      { kind: 'typing', ms: 400 },
      { kind: 'text', text: "No worries — message me anytime, I'll pick up from here." },
    ],
  },
];

function jiaRespond(text) {
  for (const s of SCENARIOS) {
    if (s.match.test(text)) return s.reply(text);
  }
  return [
    { kind: 'typing', ms: 500 },
    { kind: 'text', text: "Got it. Want me to walk you through proper setup in messages?",
      chips: ['Continue setup', 'Maybe later'] },
  ];
}

}

// Card factory
function renderRcsCard(card, props, onChip) {
  if (card === 'taskBooking') {
    return <TaskCompleteCard
      title="Table reserved"
      subtitle={`${props.place} · ${props.partySize} guests`}
      details={[
        { icon: ICON.cal,  label: 'When',  value: props.when },
        { icon: ICON.pin,  label: 'Where', value: props.address },
        { icon: ICON.user, label: 'Confirmation', value: props.ref || ('BST-' + Math.floor(1000 + Math.random()*9000)) },
      ]}
      ctas={['Add to calendar', 'Share', 'Cancel']}
      onCta={onChip}/>;
  }
  if (card === 'consent') {
    return <ConsentCard onAgree={() => onChip('__onb_agree__')}/>;
  }
  if (card === 'pickTone') {
    return <PickCard
      title="How should I sound?" sub="You can change this anytime."
      options={[
        { id: 'warm',    label: 'Warm 🤗' },
        { id: 'crisp',   label: 'Crisp ⚡' },
        { id: 'formal',  label: 'Formal 🎩' },
        { id: 'playful', label: 'Playful ✨' },
      ]}
      onPick={(id) => onChip('__onb_tone__:' + id)}
      onSkip={() => onChip('__onb_tone__:warm')}
      picked={props.picked}/>;
  }
  if (card === 'pickLanguages') {
    return <PickCard
      title="Languages you're comfortable in?" sub="Pick up to 3. I'll match your style."
      multi
      options={[
        { id: 'en', label: 'English' },
        { id: 'hi', label: 'हिन्दी' },
        { id: 'mr', label: 'मराठी' },
        { id: 'ta', label: 'தமிழ்' },
        { id: 'bn', label: 'বাংলা' },
        { id: 'gu', label: 'ગુજરાતી' },
        { id: 'kn', label: 'ಕನ್ನಡ' },
      ]}
      onPick={(id) => onChip(id === '__done__' ? '__onb_langs_done__' : '__onb_lang_toggle__:' + id)}
      onSkip={() => onChip('__onb_langs_done__')}
      picked={props.picked || []}/>;
  }
  return null;
}

function RcsScreen({ messages, typing, input, onInputChange, onSubmit, onChip, onBack, disabled, callActive, composerPlaceholder }) {
  const scrollRef = useRef(null);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, typing]);

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column', background: BG_DEEP, overflow: 'hidden',
      animation: 'slide-up 380ms cubic-bezier(0.4, 0.0, 0.2, 1) both',
    }}>
      <RcsHeader onBack={onBack} callActive={callActive}/>
      <div ref={scrollRef} style={{
        flex: 1, overflowY: 'auto', padding: '8px 12px 12px',
        display: 'flex', flexDirection: 'column', gap: 3,
      }}>
        <DateDivider label="Today, 9:42 AM"/>
        {messages.map((m, i) => {
          const prev = messages[i-1], next = messages[i+1];
          const samePrev = prev && prev.role === m.role && prev.kind === 'text' && m.kind === 'text';
          const sameNext = next && next.role === m.role && next.kind === 'text' && m.kind === 'text';
          const corner = samePrev && sameNext ? 'mid' : samePrev ? 'bot' : sameNext ? 'top' : 'full';
          const showAvatar = m.role === 'assistant' && (!sameNext || next.kind !== 'text');
          return (
            <div key={m.id} style={{ animation: 'jia-in 280ms ease-out both', marginTop: samePrev ? 2 : 8 }}>
              {m.kind === 'text' && m.role === 'assistant' && (
                <>
                  <AssistantBubble text={m.text} showAvatar={showAvatar} corner={corner}/>
                  {m.chips && <Chips chips={m.chips} onTap={onChip}/>}
                </>
              )}
              {m.kind === 'text' && m.role === 'user' && (
                <UserBubble text={m.text} corner={corner}/>
              )}
              {m.kind === 'carousel' && (
                <>
                  <div style={{ marginLeft: 34 }}>
                    <div style={{
                      display: 'flex', gap: 10, overflowX: 'auto', overflowY: 'visible',
                      padding: '2px 16px 8px 0', scrollSnapType: 'x mandatory', scrollbarWidth: 'none',
                      WebkitOverflowScrolling: 'touch',
                    }}>
                      {(m.items || []).map(it => (
                        <div key={it.id} style={{ scrollSnapAlign: 'start' }}>
                          <CapabilityCard tag={it.tag} title={it.title} description={it.description} icon={it.icon}/>
                        </div>
                      ))}
                    </div>
                  </div>
                  {m.chips && <Chips chips={m.chips} onTap={onChip}/>}
                </>
              )}
              {m.kind === 'card' && (
                <>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'flex-end' }}>
                    <div style={{ width: 28, flexShrink: 0 }}>
                      {showAvatar && <JiaAvatar size={28}/>}
                    </div>
                    <div style={{ flex: 1, minWidth: 0, maxWidth: '86%' }}>
                      {renderRcsCard(m.card, m.cardProps || {}, onChip)}
                    </div>
                  </div>
                  {m.chips && <Chips chips={m.chips} onTap={onChip}/>}
                </>
              )}
            </div>
          );
        })}
        {typing && <div style={{ marginTop: 8, animation: 'jia-in 200ms ease-out' }}><TypingIndicator/></div>}
      </div>
      <Composer value={input} onChange={onInputChange} onSubmit={onSubmit} disabled={disabled} placeholder={composerPlaceholder}/>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// CONVERSATION SCRIPT (call, then handoff to RCS)
// ─────────────────────────────────────────────────────────────────
// Onboarding call script — Jia greets, user asks "what can you do",
// Jia explains 4 caps with an RCS notification mid-call, then asks
// "what shall I do" → user "I'll let you know" → Jia bye → call drops.
const CALL_SCRIPT = [
  ['jia',     'onb_jia_greeting'],
  ['shreya',  'onb_shreya_what_can'],
  ['jia',     'onb_jia_setup_rcs'],
  ['notify-rcs'],                  // RCS notification + silently pre-populate RCS messages
  ['jia',     'onb_jia_cap1'],
  ['jia',     'onb_jia_cap2'],
  ['jia',     'onb_jia_cap3'],
  ['jia',     'onb_jia_cap4'],
  ['jia',     'onb_jia_ask_next'],
  ['shreya',  'onb_shreya_later'],
  ['jia',     'onb_jia_bye'],
  ['endcall'],                     // call ends naturally after bye
];

const INITIAL_RCS = [
  { id: 'r1', role: 'assistant', kind: 'text',
    text: "Sharing these so you can follow along while we chat 🙌" },
  { id: 'r2', role: 'assistant', kind: 'text',
    text: "Here's a quick peek at what I can do — swipe through 👇" },
  { id: 'r3', role: 'assistant', kind: 'carousel', items: ONBOARDING_CAPS },
  { id: 'r4', role: 'assistant', kind: 'text',
    text: "When you're ready, I can walk you through proper setup in messages.",
    chips: ['Continue setup', 'Maybe later'] },
];

// ─────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────
function App() {
  useFitToViewport();
  const [phase, setPhase]         = useState('dialer');     // 'dialer' | 'connecting' | 'call' | 'pip' | 'ended'
  const [orbState, setOrbState]   = useState('idle');
  const [micGlow, setMicGlow]     = useState(false);
  const [scriptIdx, setScriptIdx] = useState(0);
  const [waitingUser, setWaitingUser] = useState(false);
  const [callTime, setCallTime]   = useState('connecting…');
  const [statusTime, setStatusTime] = useState(() => {
    const d = new Date();
    return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
  });
  // RCS state
  const [rcsMessages, setRcsMessages] = useState([]);
  const [rcsTyping,   setRcsTyping]   = useState(false);
  const [rcsInput,    setRcsInput]    = useState('');
  const [rcsDisabled, setRcsDisabled] = useState(false);
  const [overlay,     setOverlay]     = useState(null);
  const [callDropped, setCallDropped] = useState(false);
  const [showEndedPill, setShowEndedPill] = useState(false);
  const [notification, setNotification] = useState(null); // { title, body }
  const [rcsViewed, setRcsViewed] = useState(false); // track if user has opened RCS at least once
  // Wizard (inline setup) state — fires when user taps "Continue setup" mid-call
  const [composerEnabled, setComposerEnabled] = useState(false);
  const [composerPlaceholder, setComposerPlaceholder] = useState('Type a message');
  const pendingRef = useRef(null);             // resolves when user inputs (chip / typed text)
  const wizardActiveRef = useRef(false);       // true while inline wizard is running
  const callStartRef = useRef(0);
  const timerRef     = useRef(null);
  const phaseRef     = useRef(phase);
  useEffect(() => { phaseRef.current = phase; }, [phase]);

  // status bar clock
  useEffect(() => {
    const t = setInterval(() => {
      const d = new Date();
      setStatusTime(d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0'));
    }, 30_000);
    return () => clearInterval(t);
  }, []);

  // call duration timer
  useEffect(() => {
    if (phase === 'call' || phase === 'pip') {
      if (!callStartRef.current) callStartRef.current = Date.now();
      timerRef.current = setInterval(() => {
        const s = Math.floor((Date.now() - callStartRef.current) / 1000);
        const m = Math.floor(s / 60), r = s % 60;
        setCallTime(String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0'));
      }, 500);
      return () => clearInterval(timerRef.current);
    }
  }, [phase]);

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  // Silently push the initial RCS messages (no typing animation — they're pre-shared)
  const pushInitialRcs = useCallback(async () => {
    setRcsMessages([]);
    for (const msg of INITIAL_RCS) {
      setRcsMessages(prev => [...prev, { ...msg, id: genId() }]);
      await sleep(120);
    }
  }, []);

  // Show the RCS notification banner during the call.
  // Stays visible until user taps it or the call ends.
  const showRcsNotification = useCallback(() => {
    setNotification({ title: 'Jia · RCS', body: 'New visual: Capability tour 👇' });
  }, []);

  const advanceCallRef = useRef(null);

  // Recursive call advancer
  const advanceCall = useCallback(async (idx) => {
    if (phaseRef.current === 'ended') return;
    const turn = CALL_SCRIPT[idx];
    if (!turn) return;
    const [type, payload] = turn;

    if (type === 'endcall') {
      // Natural call end after Jia's bye
      await sleep(900);
      if (phaseRef.current === 'ended') return;
      setOrbState('idle'); setMicGlow(false);
      setNotification(null);
      stopAudio();
      // If user is currently in PIP (RCS view), keep them there but mark call dropped
      // If user is on the call screen, fall through to ended state
      if (phaseRef.current === 'pip') {
        setCallDropped(true);
        setShowEndedPill(true);
        if (timerRef.current) clearInterval(timerRef.current);
        // Auto-dismiss the pill after a few seconds
        setTimeout(() => setShowEndedPill(false), 3000);
      } else {
        setPhase('ended');
        if (timerRef.current) clearInterval(timerRef.current);
      }
      setScriptIdx(idx + 1);
      return;
    }
    if (type === 'notify-rcs') {
      // Show notification banner + silently push RCS messages
      pushInitialRcs();
      showRcsNotification();
      setScriptIdx(idx + 1);
      await sleep(200);
      if (phaseRef.current !== 'ended') advanceCall(idx + 1);
      return;
    }
    if (type === 'jia') {
      setOrbState('speaking'); setMicGlow(false);
      await playClip(payload);
      if (phaseRef.current === 'ended') return;
      setOrbState('idle');
      const next = CALL_SCRIPT[idx + 1];
      if (next && next[0] === 'shreya') {
        // Wait for user mic tap
        setWaitingUser(true); setMicGlow(true);
        setScriptIdx(idx + 1);
      } else {
        setScriptIdx(idx + 1);
        await sleep(500);
        if (phaseRef.current !== 'ended') advanceCall(idx + 1);
      }
      return;
    }
    if (type === 'shreya') {
      setMicGlow(false); setWaitingUser(false);
      setOrbState('listening');
      await playClip(payload);
      if (phaseRef.current === 'ended') return;
      setOrbState('idle');
      setScriptIdx(idx + 1);
      await sleep(400);
      if (phaseRef.current !== 'ended') advanceCall(idx + 1);
    }
  }, [pushInitialRcs, showRcsNotification]);
  advanceCallRef.current = advanceCall;

  const startCall = useCallback(() => {
    setPhase('connecting');
    callStartRef.current = 0;
    setCallTime('connecting…');
    setScriptIdx(0); setMicGlow(false); setOrbState('idle');
    setRcsMessages([]); setRcsTyping(false); setOverlay(null);
    setCallDropped(false); setShowEndedPill(false);
    setNotification(null); setRcsViewed(false);
    try {
      const warm = AUDIO_CACHE['onb_jia_greeting'];
      if (warm) { warm.muted = true; warm.play().then(() => { warm.pause(); warm.muted = false; warm.currentTime = 0; }).catch(()=>{}); }
    } catch(_) {}
    setTimeout(() => {
      setPhase('call');
      callStartRef.current = Date.now();
      advanceCallRef.current(0);
    }, 1400);
  }, []);

  const onMicTap = useCallback(() => {
    if (!waitingUser) return;
    setWaitingUser(false); setMicGlow(false);
    advanceCallRef.current(scriptIdx);
  }, [waitingUser, scriptIdx]);

  const endCall = useCallback(() => {
    stopAudio();
    setPhase('ended');
    setMicGlow(false); setOrbState('idle');
    setOverlay(null);
  }, []);

  // Tap dynamic island in PIP → re-expand to call (only if call still active)
  const expandCall = () => {
    if (phase !== 'pip' || callDropped) return;
    setPhase('call');
    const next = CALL_SCRIPT[scriptIdx];
    if (next && next[0] === 'shreya') {
      setWaitingUser(true);
      setMicGlow(true);
    }
  };
  const restartDemo = () => {
    callStartRef.current = 0;
    setCallTime('connecting…');
    setRcsMessages([]); setOverlay(null); setRcsTyping(false);
    setCallDropped(false); setShowEndedPill(false);
    setPhase('dialer');
  };

  // Push the assistant reply (text/card/typing) — does NOT include the
  // wizard trigger anymore; the wizard runs inline via runWizard().
  const playRcsReply = useCallback(async (reply) => {
    setRcsDisabled(true);
    for (const item of reply) {
      if (item.kind === 'typing') {
        setRcsTyping(true); await sleep(item.ms || 800); setRcsTyping(false);
        continue;
      }
      if (item.kind === 'start-wizard') {
        // tail of the redirect-pretend reply: kick off the inline wizard
        await sleep(200);
        runWizard();
        continue;
      }
      setRcsMessages(prev => [...prev, { ...item, role: 'assistant', id: genId() }]);
      await sleep(280);
    }
    setRcsDisabled(false);
  }, []);

  // Wizard helper: pause until the next user input (typed text or chip).
  const waitForUserInput = () => new Promise(resolve => { pendingRef.current = resolve; });

  // Inline onboarding wizard — runs in the same RCS thread, mid-call.
  const runWizard = useCallback(async () => {
    if (wizardActiveRef.current) return;
    wizardActiveRef.current = true;
    // Silence any in-progress Jia narration so the user can focus on the wizard.
    stopAudio();
    setOrbState('idle'); setMicGlow(false);

    // Step 1: consent
    await playRcsReply([
      { kind: 'typing', ms: 700 },
      { kind: 'text', text: "Lovely. First, a quick word on your data 👇" },
      { kind: 'card', card: 'consent' },
    ]);
    await waitForUserInput();
    setRcsMessages(prev => [...prev, { kind: 'text', role: 'user', text: 'I agree', id: genId() }]);

    // Step 2: name
    await playRcsReply([
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: "Quick set-up — 4 small things." },
      { kind: 'typing', ms: 500 },
      { kind: 'text', text: "1 of 4 · What should I call you? Just type your first name 👇" },
    ]);
    setComposerEnabled(true);
    setComposerPlaceholder('Type your name…');
    const name = (await waitForUserInput()).trim() || 'Friend';
    setComposerEnabled(false);
    setComposerPlaceholder('Type a message');

    // Step 3: nickname
    await playRcsReply([
      { kind: 'typing', ms: 700 },
      { kind: 'text', text: `Nice to meet you, ${name} 👋` },
      { kind: 'typing', ms: 500 },
      { kind: 'text', text: "2 of 4 · What would you like to call me? Pick one or type your own.",
        chips: ['Jia', 'Mira', 'Buddy', 'Saathi'] },
    ]);
    setComposerEnabled(true);
    setComposerPlaceholder('Type a nickname…');
    const nickname = (await waitForUserInput()).trim() || 'Jia';
    setComposerEnabled(false);
    setComposerPlaceholder('Type a message');

    // Step 4: tone
    await playRcsReply([
      { kind: 'typing', ms: 600 },
      { kind: 'text', text: `Got it — I'm ${nickname} 😊` },
      { kind: 'typing', ms: 500 },
      { kind: 'text', text: "3 of 4 · How should I sound?" },
      { kind: 'card', card: 'pickTone' },
    ]);
    const toneChip = await waitForUserInput();
    const tone = (toneChip || '').split(':')[1] || 'warm';
    const toneLabels = { warm: 'Warm 🤗', crisp: 'Crisp ⚡', formal: 'Formal 🎩', playful: 'Playful ✨' };
    setRcsMessages(prev => [...prev, { kind: 'text', role: 'user', text: toneLabels[tone] || cap(tone), id: genId() }]);

    // Step 5: languages
    await playRcsReply([
      { kind: 'typing', ms: 700 },
      { kind: 'text', text: `${cap(tone)} it is.` },
      { kind: 'typing', ms: 500 },
      { kind: 'text', text: "4 of 4 · Languages you're comfortable in? Pick up to 3." },
      { kind: 'card', card: 'pickLanguages', cardProps: { picked: [] } },
    ]);
    const picked = [];
    while (true) {
      const chip = await waitForUserInput();
      if (chip === '__onb_langs_done__') break;
      if (chip && chip.startsWith('__onb_lang_toggle__:')) {
        const lang = chip.split(':')[1];
        const idx = picked.indexOf(lang);
        if (idx >= 0) picked.splice(idx, 1);
        else if (picked.length < 3) picked.push(lang);
        const snapshot = [...picked];
        setRcsMessages(prev => prev.map(m =>
          (m.kind === 'card' && m.card === 'pickLanguages')
            ? { ...m, cardProps: { picked: snapshot } } : m
        ));
      }
    }
    const langSummary = picked.map(p => LANG_LABELS[p] || p).join(', ') || 'Skip';
    setRcsMessages(prev => [...prev, { kind: 'text', role: 'user', text: langSummary, id: genId() }]);

    // Step 6: done
    await playRcsReply([
      { kind: 'typing', ms: 800 },
      { kind: 'text', text: `All set, ${name}. ✨` },
      { kind: 'typing', ms: 500 },
      { kind: 'text', text: "I'll be right here whenever you need me — just message anytime." },
    ]);

    // Wizard finished — close out the call: Jia bye + drop
    wizardActiveRef.current = false;
    setOrbState('speaking');
    try { await playClip('onb_jia_bye'); } catch(_) {}
    setOrbState('idle');
    setCallDropped(true); setShowEndedPill(true);
    if (timerRef.current) clearInterval(timerRef.current);
    setTimeout(() => setShowEndedPill(false), 3000);
  }, [playRcsReply]);

  const handleRcsMessage = useCallback(async (text) => {
    if (!text || !text.trim() || rcsDisabled) return;
    // If the wizard is awaiting input, route this to it directly.
    if (pendingRef.current) {
      const resolve = pendingRef.current;
      pendingRef.current = null;
      // Echo the typed text into the thread (chip codes are silent)
      if (!text.startsWith('__onb_')) {
        setRcsMessages(prev => [...prev, { id: genId(), role: 'user', kind: 'text', text: text.trim() }]);
      }
      setRcsInput('');
      resolve(text.trim());
      return;
    }
    setRcsMessages(prev => [...prev, { id: genId(), role: 'user', kind: 'text', text: text.trim() }]);
    setRcsInput('');
    await sleep(280);
    setRcsTyping(true);
    const reply = jiaRespond(text.trim());
    setRcsTyping(false);
    await playRcsReply(reply);
  }, [rcsDisabled, playRcsReply]);

  // Chip handler — covers wizard chip codes + free-text chips.
  const handleChipTap = useCallback((chip) => {
    // Wizard chip codes — resolve the pending promise without echoing.
    if (chip && chip.startsWith('__onb_')) {
      if (pendingRef.current) {
        const resolve = pendingRef.current;
        pendingRef.current = null;
        resolve(chip);
      }
      return;
    }
    handleRcsMessage(chip);
  }, [handleRcsMessage]);

  return (
    <div className="device">
      <a href="index.html" className="device-back-link" aria-label="Back to use case landing"
        style={{
          position: 'absolute', top: 50, left: 12, zIndex: 200,
          display: 'inline-flex', alignItems: 'center', gap: 5,
          padding: '7px 12px 7px 10px', borderRadius: 999,
          background: 'rgba(28,28,30,0.8)', color: '#F2F2F2',
          border: '1px solid rgba(255,255,255,0.18)', fontSize: 12, fontWeight: 700,
          textDecoration: 'none', letterSpacing: 0.01,
          backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)',
          fontFamily: 'JioType, system-ui',
        }}>← Back</a>
            <DynamicIsland
        expanded={(phase === 'call' || phase === 'pip') && (!callDropped || showEndedPill)}
        dropped={callDropped && showEndedPill}
        timer={phase === 'connecting' ? '00:00' : (phase === 'call' || phase === 'pip') ? callTime : '00:00'}
        onClick={callDropped ? undefined : expandCall}/>
      <StatusBar time={statusTime}/>

      {/* Render phase content */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden' }}>
        {phase === 'dialer' && <DialerScreen onCall={startCall}/>}
        {(phase === 'connecting' || phase === 'call') && (
          <CallScreen
            orbState={orbState} micGlow={micGlow}
            callTimer={phase === 'connecting' ? 'connecting…' : callTime}
            onMicTap={onMicTap} onEnd={endCall}/>
        )}
        {phase === 'pip' && <RcsScreen
          messages={rcsMessages} typing={rcsTyping}
          input={rcsInput} onInputChange={setRcsInput}
          onSubmit={handleRcsMessage} onChip={handleChipTap}
          disabled={wizardActiveRef.current ? !composerEnabled : rcsDisabled}
          composerPlaceholder={composerPlaceholder}
          onBack={callDropped ? restartDemo : expandCall}
          callActive={!callDropped}/>}
        {phase === 'pip' && overlay && <CallingOverlay place={overlay.place} phase={overlay.phase}/>}
        {phase === 'ended' && (
          <div style={{
            flex: 1, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 14,
            color: '#fff', textAlign: 'center', padding: 32,
            background: 'radial-gradient(ellipse at top, #0a0a0c 0%, #050505 80%)',
          }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: GOLD }}>Call ended</div>
            <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.7)' }}>Duration {callTime}</div>
            <button onClick={restartDemo} style={{
              marginTop: 8, padding: '12px 28px', borderRadius: 999,
              background: GOLD, border: 'none', color: '#0E0E10',
              fontFamily: 'inherit', fontWeight: 700, fontSize: 16, cursor: 'pointer',
            }}>Try the demo again</button>
          </div>
        )}
      </div>

      {/* RCS notification banner — appears mid-call when Jia mentions the visual.
          Tap to peek at RCS (PIP); auto-dismisses after a few seconds. */}
      {notification && (phase === 'call' || phase === 'connecting') && (
        <div onClick={() => {
          setNotification(null);
          setRcsViewed(true);
          if (phase === 'call') setPhase('pip');
        }} style={{
          position: 'absolute', top: 56, left: 12, right: 12, zIndex: 80,
          background: 'rgba(28,28,32,0.94)', backdropFilter: 'blur(14px)',
          border: '1px solid rgba(255,255,255,0.12)',
          borderRadius: 18, padding: '10px 14px',
          display: 'flex', alignItems: 'center', gap: 12,
          boxShadow: '0 10px 40px rgba(0,0,0,0.5)',
          animation: 'jia-in 320ms cubic-bezier(0.4, 0.0, 0.2, 1) both',
          cursor: 'pointer',
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: 8,
            background: `linear-gradient(145deg, ${GOLD_SOFT}, ${GOLD})`,
            display: 'grid', placeItems: 'center', flexShrink: 0,
            color: '#0E0E10', fontWeight: 900, fontSize: 16, letterSpacing: '-0.02em',
          }}>J</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: INK, letterSpacing: '-0.005em' }}>{notification.title}</div>
            <div style={{ fontSize: 12, color: INK_2, marginTop: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{notification.body}</div>
          </div>
          <div style={{ fontSize: 10, color: INK_3, flexShrink: 0 }}>now</div>
        </div>
      )}

      <div className="home-indicator"></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
