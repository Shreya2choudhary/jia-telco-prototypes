<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jia — Call Intelligence · Unknown caller (Messages)</title>
<style>
  @font-face { font-family: 'JioType'; font-weight: 500; font-style: normal; font-display: swap;

    src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%;
    font-family: 'JioType', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0A0A0B; color: #F2F2F2; overflow: hidden;

  body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 12px; }
  div::-webkit-scrollbar { display: none; }

  /* ── Animations ────────────────────────────────────────── */
  @keyframes jia-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes jia-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  @keyframes pulse-out {
    0%   { transform: scale(1);    opacity: 0.7; }
    100% { transform: scale(1.55); opacity: 0; }
  }
  @keyframes orb-idle {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.02); }
  }
  
  @keyframes wave { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.4); } }
  @keyframes mic-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(247,171,32,0.6); }
    50%      { box-shadow: 0 0 0 14px rgba(247,171,32,0); }
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes stream-caret { 0%,100% { opacity: 0.85; } 50% { opacity: 0.15; } }
  .stream-caret { display: inline-block; width: 2px; height: 0.95em;
    margin-left: 3px; vertical-align: -2px; border-radius: 2px;
    background: currentColor; animation: stream-caret 0.7s ease-in-out infinite; }
  @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse-out-overlay {
    0%   { transform: scale(1);    opacity: 0.7; }
    100% { transform: scale(1.6);  opacity: 0; }
  }

  /* ── iOS frame ──────────────────────────────────────────── */
  .device {
    width: 390px; height: 844px;
    border-radius: 54px;
    background: #000;
    border: 6px solid #1a1a1a;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06) inset;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
    transform-origin: center center;
  }

  /* Dynamic island */
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 122px; height: 36px; border-radius: 999px;
    background: #000; z-index: 100;
    transition: all 350ms cubic-bezier(0.4, 0.0, 0.2, 1);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;

  .island.expanded {
    width: 240px; height: 38px; background: #001a08; padding: 0 14px;

  .island-pill {

  .island-pill .left { display: flex; align-items: center; gap: 6px; }
  .island-pill .left svg { width: 14px; height: 14px; }
  .island-pill .timer { font-variant-numeric: tabular-nums; }

  /* Status bar */
  .status-bar {
    height: 54px; flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 16px 32px 0;
    color: #fff; font-size: 17px; font-weight: 600;
    z-index: 5; position: relative; pointer-events: none;

  .status-bar .right { width: 64px; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }

    height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    background: transparent;
  }
  .home-indicator::before {
    content: ''; width: 134px; height: 5px; border-radius: 999px; background: rgba(255,255,255,0.6);
  }
</style>

// ── Pre-generated Sarvam audio (Anushka = Jia, Abhilash = Rohit) ──
const AUDIO_CACHE = {};
const AUDIO_CLIPS = [
  'ci2_jia_screen', 'ci2_rohit_intro', 'ci2_jia_probe', 'ci2_rohit_more', 'ci2_jia_decline',
];
function preloadAudio() {
  AUDIO_CLIPS.forEach(name => {
    const a = new Audio(`audio/${name}.wav`);
    a.preload = 'auto';
    AUDIO_CACHE[name] = a;
  });
}
preloadAudio();
let currentAudio = null;
function playClip(name, { onPulse } = {}) {
  return new Promise(resolve => {
    const a = AUDIO_CACHE[name] || new Audio(`audio/${name}.wav`);
    if (currentAudio && currentAudio !== a) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(_){} }
    currentAudio = a;
    a.currentTime = 0;
    let pulseInt = null;
    const cleanup = () => { if (pulseInt) clearInterval(pulseInt); a.onended = a.onerror = null; resolve(); };
    a.onended = cleanup; a.onerror = cleanup;
    const p = a.play();
    if (p && p.catch) p.catch(cleanup);
    if (onPulse) pulseInt = setInterval(onPulse, 320);
  });
}
function stopAudio() {
  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(_){} currentAudio = null; }
}

// ── Auto-scale ─────────────────────────────────────────────────────
function useFitToViewport() {
  useEffect(() => {
    const fit = () => {
      const dev = document.querySelector('.device');
      if (!dev) return;
      const sw = (window.innerWidth - 24) / 390;
      const sh = (window.innerHeight - 24) / 856;
      const s = Math.min(1, sw, sh);
      dev.style.transform = `scale(${s})`;
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);
}

// ─────────────────────────────────────────────────────────────────

const ANANYA = { name: 'Rohit · Unknown', sub: '+91 98… · No saved contact', initial: '?', accent: '#1F4FD0' };
const CALLER = { name: 'Rohit', label: 'Unknown caller', phone: '+91 98765 43210', initial: 'R', accent: '#1F4FD0' };

function IncomingCallScreen({ onAccept, onDecline, ringCount, totalRings = 5 }) {

// LEGACY DialerScreen — unused, kept to avoid breaking refs in snapshot tools
function DialerScreen({ onCall }) {
  const [dialed, setDialed] = useState('');
  const [pressed, setPressed] = useState(null);
  const KEYS = [
    ['1', ''],     ['2', 'A B C'], ['3', 'D E F'],
    ['4', 'G H I'],['5', 'J K L'], ['6', 'M N O'],
    ['7', 'P Q R S'],['8', 'T U V'],['9', 'W X Y Z'],
    ['*', ''], ['0', '+'], ['#', ''],
  ];
  const press = (d) => {
    setDialed(prev => prev.length >= 12 ? prev : prev + d);
    setPressed(d);
    setTimeout(() => setPressed(p => p === d ? null : p), 140);
  };

  // Auto-type #5555
  useEffect(() => {
    let cancel = false;
    (async () => {
      await new Promise(r => setTimeout(r, 700));
      const seq = '#5555';
      for (const c of seq) {
        if (cancel) return;
        press(c);
        await new Promise(r => setTimeout(r, 240));
      }
    })();
    return () => { cancel = true; };
  }, []);

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: '#000', paddingBottom: 16 }}>
      <div style={{ flex: '0 0 auto', padding: '12px 24px 28px', display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 110 }}>
        <div style={{ fontSize: 44, fontWeight: 400, color: '#fff', minHeight: 56, fontVariantNumeric: 'tabular-nums' }}>{dialed}</div>
      </div>
      <div style={{
        flex: 1, display: 'grid',
        gridTemplateColumns: 'repeat(3, 76px)', gridAutoRows: '76px',
        gap: '14px 30px', justifyContent: 'center', alignContent: 'center',
        padding: '0 24px',
      }}>
        {KEYS.map(([d, l]) => (
          <button key={d}
            onClick={() => press(d)}
            style={{
              width: 76, height: 76,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              borderRadius: '50%',
              background: pressed === d ? 'rgba(255,255,255,0.36)' : 'rgba(255,255,255,0.18)',
              color: '#fff',
              border: 'none', cursor: 'pointer', fontFamily: 'inherit', padding: 0,
              transition: 'background 100ms',
            }}>
            <span style={{ fontSize: d === '*' || d === '#' ? 32 : 30, fontWeight: 400, lineHeight: 1 }}>{d}</span>
            <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.18em', marginTop: 3, color: '#fff', visibility: (d === '*' || d === '#') ? 'hidden' : 'visible' }}>{l || '\u00a0'}</span>
          </button>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', padding: '4px 30px 0' }}>
        <span/>
        <button onClick={() => { if (dialed) onCall(); }}
          style={{
            width: 70, height: 70, borderRadius: '50%', background: '#2DD66A', border: 'none',
            cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 6px 20px rgba(45,214,106,0.4)',
            gridColumn: 2,
          }}>
          <svg viewBox="0 0 24 24" width="32" height="32" fill="white">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </button>
        <button onClick={() => setDialed(d => d.slice(0, -1))} disabled={!dialed}
          style={{
            gridColumn: 3, justifySelf: 'end',
            width: 36, height: 36, border: 'none', background: 'none', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', opacity: dialed ? 0.6 : 0,
          }}>
          <svg viewBox="0 0 28 22" width="28" height="22" fill="white">
            <path d="M9 0H26a2 2 0 0 1 2 2v18a2 2 0 0 1-2 2H9L0 11 9 0z" opacity="0.4"/>
            <path d="M13 7l8 8M21 7l-8 8" stroke="white" strokeWidth="2" strokeLinecap="round" fill="none"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// CALL SCREEN (audio-only)
// ─────────────────────────────────────────────────────────────────
function Orb({ state }) {
  // state: 'idle' | 'speaking' | 'listening'
  const ringStyle = {
    position: 'absolute', inset: 0, borderRadius: '50%',
    background: state === 'listening'
      ? 'radial-gradient(circle at 30% 30%, #aee0ff, #4FC1FF 60%, #1a78b8 100%)'
      : 'radial-gradient(circle at 30% 30%, #FFC86B, #F7AB20 60%, #b06f00 100%)',
    boxShadow: state === 'listening'
      ? '0 0 80px rgba(79,193,255,0.55), 0 0 160px rgba(79,193,255,0.3), inset 0 6px 30px rgba(220,240,255,0.6), inset 0 -6px 30px rgba(20,80,140,0.3)'

    animation: 'orb-idle 4s ease-in-out infinite',
  };
  const pulseStyle = {
    position: 'absolute', inset: 0, borderRadius: '50%',
    border: `2px solid ${state === 'listening' ? 'rgba(79,193,255,0.6)' : 'rgba(247,171,32,0.6)'}`,

  return (

        <span key={i} style={{ ...pulseStyle, animation: `pulse-out 1.4s ${i*0.45}s ease-out infinite` }}/>
      ))}
      {state === 'listening' && [0,1,2].map(i => (
        <span key={i} style={{ ...pulseStyle, animation: `pulse-out 1.2s ${i*0.4}s ease-out infinite` }}/>

        position: 'relative', zIndex: 2,

    </div>
  );
}

// ── Scenarios for RCS chip interaction (Use case 3B · unknown caller) ──
const SCENARIOS = [
  {
    match: /^listen in/i,
    reply: () => [
      { kind: 'system-msg', text: "🎧 You're listening in — Rohit can't hear you." },
    ],
  },
  {
    match: /^join$/i,
    reply: () => [
      { kind: 'join-call' },
    ],
  },
  {
    match: /^decline$/i,
    reply: () => [
      { kind: 'mark-decline' },
    ],
  },
  {
    match: /^(block number)/i,
    reply: () => [
      { kind: 'typing', ms: 400 },
      { kind: 'text', text: "Blocked +91 98765 43210. Future calls from this number will go to voicemail automatically." },
    ],
  },
  {
    match: /^(report as spam)/i,
    reply: () => [
      { kind: 'typing', ms: 400 },
      { kind: 'text', text: "Reported. This number is now flagged across the Jio network as a sales caller — others will be warned too." },
    ],
  },
  {
    match: /^(mark as done|done)/i,
    reply: () => [
      { kind: 'typing', ms: 400 },
      { kind: 'text', text: "Marked as done — see you next time!" },
    ],
  },
];

function jiaRespond(text) {
  for (const s of SCENARIOS) {
    if (s.match.test(text)) return s.reply(text);
  }
  return [
    { kind: 'typing', ms: 400 },
    { kind: 'text', text: "Got it." },
  ];
}

// CONVERSATION SCRIPT — Use case 3B · Unknown caller
// ─────────────────────────────────────────────────────────────────
// Unknown number calls. Jia intercepts BEFORE the phone rings. User
// sees a notification at the top, taps it, watches the live transcript,
// reads enough to know it's a sales call, then taps Decline.
const CALL_SCRIPT = [
  ['notify-rcs'],   // RCS notification + initial system bubble
  ['turn', 'jia',    'ci2_jia_screen',  "Hello, this is Shreya's AI assistant. Shreya can't take calls right now. May I know who's calling and what this is regarding?"],
  ['turn', 'ananya', 'ci2_rohit_intro', "Good morning ma'am! This is Rohit calling from HDFC Bank. We have a special pre-approved offer on our Diners Club credit card for Shreya — lifetime free, with 5x reward points. May I take 2 minutes of her time?"],
  ['turn', 'jia',    'ci2_jia_probe',   "Got it, Rohit. A pre-approved credit card offer from HDFC. Shreya is busy right now, but I can pass on the message. Could you share the offer details so I can relay them?"],
  ['turn', 'ananya', 'ci2_rohit_more',  "Of course! The card has a ₹2,500 joining fee waived for the first year, 4 reward points per ₹150 spent, and complimentary airport lounge access. Would 6 PM today work for a callback?"],
  ['await-decline'], // pause: wait for user to tap Decline. If user does nothing for 8s, auto-decline.
  ['turn', 'jia',    'ci2_jia_decline', "Thanks for the details, Rohit. Shreya isn't interested in this offer. Please remove her number from your call list. Have a good day."],
  ['summary'],
];

const INITIAL_RCS = [
  { id: 'r1', role: 'system', kind: 'system',
    text: "Jia screened an unknown call · " + CALLER.phone },
  { id: 'r2', role: 'system', kind: 'chips',
    chips: ['Listen in', 'Join', 'Decline'] },
];

// ─────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────
function App() {
  useFitToViewport();
  const [phase, setPhase]         = useState('idle');        // 'idle' (lock screen) | 'call' | 'pip' | 'ended'
  const [ringCount, setRingCount] = useState(0);             // unused in 4B (no rings) but kept for shared scaffolding
  const [orbState, setOrbState]   = useState('idle');
  const [micGlow, setMicGlow]     = useState(false);
  const [scriptIdx, setScriptIdx] = useState(0);
  const [waitingUser, setWaitingUser] = useState(false);
  const [callTime, setCallTime]   = useState('connecting…');
  const [statusTime, setStatusTime] = useState(() => {
    const d = new Date();
    return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
  });
  // RCS state
  const [rcsMessages, setRcsMessages] = useState([]);
  const [rcsTyping,   setRcsTyping]   = useState(false);
  const [rcsInput,    setRcsInput]    = useState('');
  const [rcsDisabled, setRcsDisabled] = useState(false);
  const [overlay,     setOverlay]     = useState(null);
  const [callDropped, setCallDropped] = useState(false);
  const [showEndedPill, setShowEndedPill] = useState(false);
  const [notification, setNotification] = useState(null); // { title, body }
  const [rcsViewed, setRcsViewed] = useState(false); // track if user has opened RCS at least once
  const callStartRef = useRef(0);
  const timerRef     = useRef(null);
  const phaseRef     = useRef(phase);
  useEffect(() => { phaseRef.current = phase; }, [phase]);

  // status bar clock
  useEffect(() => {
    const t = setInterval(() => {
      const d = new Date();
      setStatusTime(d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0'));
    }, 30_000);
    return () => clearInterval(t);
  }, []);

  // call duration timer
  useEffect(() => {
    if (phase === 'call' || phase === 'pip') {
      if (!callStartRef.current) callStartRef.current = Date.now();
      timerRef.current = setInterval(() => {
        const s = Math.floor((Date.now() - callStartRef.current) / 1000);
        const m = Math.floor(s / 60), r = s % 60;
        setCallTime(String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0'));
      }, 500);
      return () => clearInterval(timerRef.current);
    }
  }, [phase]);

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  // Silently push the initial RCS messages (no typing animation — they're pre-shared)
  const pushInitialRcs = useCallback(async () => {
    setRcsMessages([]);
    for (const msg of INITIAL_RCS) {
      setRcsMessages(prev => [...prev, { ...msg, id: genId() }]);
      await sleep(120);
    }
  }, []);

  // Show the RCS notification banner during the call.
  // Stays visible until user taps it or the call ends.
  const showRcsNotification = useCallback(() => {
    setNotification({ title: 'Jia · Screening unknown caller', body: '+91 98765 43210 · open Messages 👇' });
  }, []);

  const advanceCallRef = useRef(null);

  // Recursive call advancer
  const advanceCall = useCallback(async (idx) => {
    if (phaseRef.current === 'ended') return;
    const turn = CALL_SCRIPT[idx];
    if (!turn) return;
    const [type, payload] = turn;

    if (type === 'notify-rcs') {
      pushInitialRcs();
      showRcsNotification();
      setScriptIdx(idx + 1);
      await sleep(200);
      if (phaseRef.current !== 'ended') advanceCall(idx + 1);
      return;
    }
    if (type === 'turn') {
      // RCS variant: play audio + drive orb, but do NOT push transcript bubbles.
      // RCS doesn't support live captions in real life — the user only sees the
      // 3-chip card and (later) a summary card.
      const [, speaker, clip] = turn;
      setOrbState(speaker === 'jia' ? 'speaking' : 'listening');
      const audio = AUDIO_CACHE[clip] || new Audio(`audio/${clip}.wav`);
      if (currentAudio && currentAudio !== audio) {
        try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(_) {}
      }
      currentAudio = audio;
      audio.currentTime = 0;
      if (!audio.duration || isNaN(audio.duration)) {
        await new Promise(r => {
          if (audio.readyState >= 1) return r();
          const onMd = () => { audio.removeEventListener('loadedmetadata', onMd); r(); };
          audio.addEventListener('loadedmetadata', onMd);
          setTimeout(r, 250);
        });
      }
      const dur = (audio.duration && !isNaN(audio.duration)) ? audio.duration * 1000 : 4000;
      const p = audio.play(); if (p && p.catch) p.catch(() => {});
      await new Promise(resolve => {
        const done = () => { audio.onended = audio.onerror = null; resolve(); };
        audio.onended = done; audio.onerror = done;
        setTimeout(done, dur + 800);
      });
      if (phaseRef.current === 'ended') return;
      setOrbState('idle');
      setScriptIdx(idx + 1);
      await sleep(450);
      if (phaseRef.current !== 'ended') advanceCall(idx + 1);
      return;
    }
    if (type === 'await-decline') {
      // Pause the script. Wait up to 8s for the user to tap Decline.
      // If they do, userDeclinedRef flips to true and we proceed.
      // If they don't, auto-trigger decline so the demo always lands.
      const start = Date.now();
      while (!userDeclinedRef.current && (Date.now() - start) < 8000) {
        if (phaseRef.current === 'ended') return;
        await sleep(120);
      }
      if (!userDeclinedRef.current) {
        // Auto-decline so the demo flows
        setUserDeclined(true);
      }
      // Push a system bubble + a faint "you declined" indicator
      setRcsMessages(prev => [...prev, {
        id: genId(), role: 'system', kind: 'system',
        text: "🚫 You declined the call · Jia will close it politely",
      }]);
      setScriptIdx(idx + 1);
      await sleep(500);
      if (phaseRef.current !== 'ended') advanceCall(idx + 1);
      return;
    }
    if (type === 'summary') {
      // Call ends, push summary card to RCS, drop the call
      setOrbState('idle');
      stopAudio();
      setNotification(null);
      await sleep(700);
      setRcsMessages(prev => [...prev, {
        id: genId(), role: 'system', kind: 'summary',
        title: "Sales call · HDFC Bank",
        body: "Pre-approved Diners Club credit card pitch from Rohit. You declined — this number is now flagged as sales/spam, future calls will be auto-blocked.",
        chips: ['Block number', 'Report as spam', 'Mark as done'],
      }]);
      setCallDropped(true);
      setShowEndedPill(true);
      if (timerRef.current) clearInterval(timerRef.current);
      setTimeout(() => setShowEndedPill(false), 3000);
      setScriptIdx(idx + 1);
      return;
    }
  }, [pushInitialRcs, showRcsNotification]);
  advanceCallRef.current = advanceCall;

  // Helper: stop the ring tone audio.
  // Track whether user manually declined (drives await-decline script branch)
  const [userDeclined, setUserDeclined] = useState(false);
  const userDeclinedRef = useRef(false);
  useEffect(() => { userDeclinedRef.current = userDeclined; }, [userDeclined]);

  // Idle → screening transition: phone is on lock screen for 1.8s, then Jia
  // intercepts the call (no ring at all, this is the whole point of 4B).
  useEffect(() => {
    if (phase !== 'idle') return;
    const t = setTimeout(() => {
      try {
        const warm = AUDIO_CACHE['ci2_jia_screen'];
        if (warm) { warm.muted = true; warm.play().then(() => { warm.pause(); warm.muted = false; warm.currentTime = 0; }).catch(()=>{}); }
      } catch(_) {}
      setPhase('call');
      callStartRef.current = Date.now();
      setRcsMessages([]); setOverlay(null);
      setCallDropped(false); setShowEndedPill(false);
      setNotification(null);
      setUserDeclined(false);
      advanceCallRef.current(0);
    }, 1800);
    return () => clearTimeout(t);
  }, [phase]);

  // Stubs kept so existing App handlers don't blow up (the lock screen has no buttons)
  const acceptIncomingCall = useCallback(() => {}, []);
  const declineIncomingCall = useCallback(() => {}, []);

  const onMicTap = useCallback(() => {
    if (!waitingUser) return;
    setWaitingUser(false); setMicGlow(false);
    advanceCallRef.current(scriptIdx);
  }, [waitingUser, scriptIdx]);

  const endCall = useCallback(() => {
    stopAudio();
    setPhase('ended');
    setMicGlow(false); setOrbState('idle');
    setOverlay(null);
  }, []);

  // Tap dynamic island in PIP → re-expand to call (only if call still active)
  const expandCall = () => {
    if (phase !== 'pip' || callDropped) return;
    setPhase('call');
    const next = CALL_SCRIPT[scriptIdx];
    if (next && next[0] === 'shreya') {
      setWaitingUser(true);
      setMicGlow(true);
    }
  };
  const restartDemo = () => {
    callStartRef.current = 0;
    setCallTime('connecting…');
    setRcsMessages([]); setOverlay(null); setRcsTyping(false);
    setCallDropped(false); setShowEndedPill(false);
    setNotification(null);
    setRingCount(0);
    setUserDeclined(false);
    setPhase('idle');
  };

  // RCS chip / composer interaction
  const playRcsReply = useCallback(async (reply) => {
    setRcsDisabled(true);
    for (const item of reply) {
      if (item.kind === 'typing') {
        setRcsTyping(true); await sleep(item.ms || 800); setRcsTyping(false);
        continue;
      }
      if (item.kind === 'system-msg') {
        setRcsMessages(prev => [...prev, { id: genId(), role: 'system', kind: 'system', text: item.text }]);
        await sleep(280);
        continue;
      }
      if (item.kind === 'join-call') {
        // User joins the call — stop audio, switch to user-on-call screen
        stopAudio();
        setRcsMessages(prev => [...prev, { id: genId(), role: 'system', kind: 'system', text: '📞 You joined the call. Jia handed it over.' }]);
        await sleep(400);
        setPhase('user-on-call');
        continue;
      }
      if (item.kind === 'decline-call') {
        stopAudio();
        setRcsMessages(prev => [...prev, { id: genId(), role: 'system', kind: 'system', text: '🚫 You declined the call. Jia won\'t pick up future calls from this number for an hour.' }]);
        await sleep(400);
        setCallDropped(true);
        setShowEndedPill(true);
        if (timerRef.current) clearInterval(timerRef.current);
        setTimeout(() => setShowEndedPill(false), 3000);
        continue;
      }
      if (item.kind === 'mark-decline') {
        // Just flag user as declined — script awaiter will pick it up + play Jia's polite decline.
        setUserDeclined(true);
        continue;
      }
      setRcsMessages(prev => [...prev, { ...item, role: 'assistant', id: genId() }]);
      await sleep(280);
    }
    setRcsDisabled(false);
  }, []);

  const handleRcsMessage = useCallback(async (text) => {
    if (!text || !text.trim() || rcsDisabled) return;
    setRcsMessages(prev => [...prev, { id: genId(), role: 'user', kind: 'text', text: text.trim() }]);
    setRcsInput('');
    await sleep(280);
    setRcsTyping(true);
    const reply = jiaRespond(text.trim());
    setRcsTyping(false);
    await playRcsReply(reply);
  }, [rcsDisabled, playRcsReply]);

  return (
    <div className="device">
      <a href="index.html" className="device-back-link" aria-label="Back to use case landing"
        style={{
          position: 'absolute', top: 50, left: 12, zIndex: 200,
          display: 'inline-flex', alignItems: 'center', gap: 5,
          padding: '7px 12px 7px 10px', borderRadius: 999,
          background: 'rgba(28,28,30,0.8)', color: '#F2F2F2',
          border: '1px solid rgba(255,255,255,0.18)', fontSize: 12, fontWeight: 700,
          textDecoration: 'none', letterSpacing: 0.01,
          backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)',
          fontFamily: 'JioType, system-ui',
        }}>← Back</a>
            <DynamicIsland
        expanded={(phase === 'call' || phase === 'pip') && (!callDropped || showEndedPill)}
        dropped={callDropped && showEndedPill}
        timer={phase === 'connecting' ? '00:00' : (phase === 'call' || phase === 'pip') ? callTime : '00:00'}
        onClick={callDropped ? undefined : expandCall}/>
      <StatusBar time={statusTime}/>

      {/* Render phase content */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden' }}>
        {phase === 'idle' && <LockScreen statusTime={statusTime}/>}
        {phase === 'user-on-call' && (
          <div style={{
            flex: 1, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 14,
            color: '#fff', textAlign: 'center', padding: 32,
            background: 'radial-gradient(ellipse at top, #0a0a0c 0%, #050505 80%)',
          }}>
            <div style={{ fontSize: 24, fontWeight: 700, color: '#F2F2F2' }}>You took the call</div>
            <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.65)', maxWidth: 260 }}>You're now on the call with Rohit. Jia handed it over.</div>
            <button onClick={() => setPhase('ended')} style={{
              marginTop: 20, width: 70, height: 70, borderRadius: '50%', background: '#FF3B30', border: 'none',
              cursor: 'pointer', display: 'grid', placeItems: 'center', boxShadow: '0 6px 20px rgba(255,59,48,0.4)',
            }}>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M21 15.46l-5.27-.61a1.25 1.25 0 0 0-1.06.36l-2.16 2.17a16 16 0 0 1-7.06-7.07l2.18-2.16a1.25 1.25 0 0 0 .36-1.06L7.39 1.83A1.25 1.25 0 0 0 6.16 1H3a2 2 0 0 0-2 2 22 22 0 0 0 22 22 2 2 0 0 0 2-2v-3.16a1.25 1.25 0 0 0-1-1.38z" transform="rotate(135 12 12)"/></svg>
            </button>
          </div>
        )}
        {(phase === 'connecting' || phase === 'call') && (
          <JiaHandlingScreen
            callTimer={phase === 'connecting' ? 'connecting…' : callTime}
            callerName={CALLER.phone}
            callerSub={CALLER.label}
            panelLabel="Messages"
            onListenIn={() => { /* default state — audio is already on */ }}
            onJoin={() => { stopAudio(); setPhase('user-on-call'); callStartRef.current = Date.now(); }}
            onDecline={endCall}
            onOpenPanel={() => setPhase('pip')}/>
        )}
        {phase === 'pip' && <RcsScreen
          messages={rcsMessages} typing={rcsTyping}
          input={rcsInput} onInputChange={setRcsInput}
          onSubmit={handleRcsMessage} onChip={handleRcsMessage}
          disabled={rcsDisabled} onBack={callDropped ? restartDemo : expandCall}
          callActive={!callDropped}/>}
        {phase === 'pip' && overlay && <CallingOverlay place={overlay.place} phase={overlay.phase}/>}
        {phase === 'ended' && (
          <div style={{
            flex: 1, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 14,
            color: '#fff', textAlign: 'center', padding: 32,
            background: 'radial-gradient(ellipse at top, #0a0a0c 0%, #050505 80%)',
          }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: GOLD }}>Call ended</div>
            <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.7)' }}>Duration {callTime}</div>
            <button onClick={restartDemo} style={{
              marginTop: 8, padding: '12px 28px', borderRadius: 999,
              background: GOLD, border: 'none', color: '#0E0E10',
              fontFamily: 'inherit', fontWeight: 700, fontSize: 16, cursor: 'pointer',
            }}>Try the demo again</button>
          </div>
        )}
      </div>

      {/* RCS notification banner — appears mid-call when Jia mentions the visual.
          Tap to peek at RCS (PIP); auto-dismisses after a few seconds. */}
      {notification && (phase === 'call' || phase === 'connecting') && (
        <div onClick={() => {
          setNotification(null);
          setRcsViewed(true);
          if (phase === 'call') setPhase('pip');
        }} style={{
          position: 'absolute', top: 56, left: 12, right: 12, zIndex: 80,
          background: 'rgba(28,28,32,0.94)', backdropFilter: 'blur(14px)',
          border: '1px solid rgba(255,255,255,0.12)',
          borderRadius: 18, padding: '10px 14px',
          display: 'flex', alignItems: 'center', gap: 12,
          boxShadow: '0 10px 40px rgba(0,0,0,0.5)',
          animation: 'jia-in 320ms cubic-bezier(0.4, 0.0, 0.2, 1) both',
          cursor: 'pointer',
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: 8,
            background: `linear-gradient(145deg, ${GOLD_SOFT}, ${GOLD})`,
            display: 'grid', placeItems: 'center', flexShrink: 0,
            color: '#0E0E10', fontWeight: 900, fontSize: 16, letterSpacing: '-0.02em',
          }}>J</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: INK, letterSpacing: '-0.005em' }}>{notification.title}</div>
            <div style={{ fontSize: 12, color: INK_2, marginTop: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{notification.body}</div>
          </div>
          <div style={{ fontSize: 10, color: INK_3, flexShrink: 0 }}>now</div>
        </div>
      )}

      <div className="home-indicator"></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
